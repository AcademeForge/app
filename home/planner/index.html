<!DOCTYPE html>
<html lang="en">
<head>
<script>
!function(){
  document.documentElement.setAttribute('data-theme',
    localStorage.getItem('af_dark_mode')==='1'?'dark':'light');
}();
</script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#1a1a2e"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Timezy · Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
:root{
  --ink:#1a1a2e;--ink2:#3d3d5c;--ink3:#8888aa;
  --sage:#4caf82;--sage2:#3a9068;--sage-faint:rgba(76,175,130,0.10);--sage-mid:rgba(76,175,130,0.18);
  --amber:#f5a623;--amber-faint:rgba(245,166,35,0.12);
  --err:#e05252;--err-faint:rgba(224,82,82,0.10);
  --bg:#f5f4ef;--surface:#ffffff;--card:#ffffff;
  --nav:rgba(245,244,239,0.96);--inp:#eeede8;
  --b1:rgba(26,26,46,0.08);--bc:rgba(26,26,46,0.12);
  --sh:0 2px 12px rgba(26,26,46,0.07),0 1px 3px rgba(26,26,46,0.04);
  --she:0 8px 32px rgba(26,26,46,0.12);
  --r1:10px;--r2:16px;--r3:22px;--r4:28px;--rf:9999px;
  --fd:'Instrument Serif',Georgia,serif;--fb:'DM Sans',system-ui,sans-serif;
  --nav-h:68px;--shell:430px;
  --dur:160ms;--ease:cubic-bezier(0.22,1,0.36,1);--spring:cubic-bezier(0.34,1.56,0.64,1);
}
[data-theme="dark"]{
  --ink:#ede9e0;--ink2:#a8a4b8;--ink3:#5c5878;
  --bg:#111118;--surface:#18181f;--card:#1e1e28;
  --nav:rgba(17,17,24,0.97);--inp:#24242e;
  --b1:rgba(237,233,224,0.07);--bc:rgba(237,233,224,0.11);
  --sh:0 2px 12px rgba(0,0,0,0.28),0 1px 3px rgba(0,0,0,0.18);
  --she:0 8px 32px rgba(0,0,0,0.40);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:15px;-webkit-text-size-adjust:100%;height:100%;height:100dvh;}
body{font-family:var(--fb);background:var(--bg);color:var(--ink);height:100%;height:100dvh;display:flex;justify-content:center;overflow:hidden;transition:background .2s,color .2s;}
button{font-family:var(--fb);cursor:pointer;border:none;background:none;color:inherit;}
a{text-decoration:none;color:inherit;}
html,body,*{-webkit-user-select:none;-moz-user-select:none;user-select:none;-webkit-touch-callout:none;}
input,textarea,select{-webkit-user-select:text;-moz-user-select:text;user-select:text;}
.shell{width:100%;max-width:var(--shell);height:100%;height:100dvh;background:var(--surface);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 0 1px var(--b1),var(--she);transition:background .2s;}
@media(min-width:700px){
  body{padding:28px 0 44px;height:auto;min-height:100dvh;overflow-y:auto;}
  .shell{border-radius:36px;height:calc(100dvh - 72px);max-height:900px;box-shadow:0 0 0 1px var(--bc),0 32px 80px rgba(0,0,0,.16);}
}

/* HEADER */
.hdr{height:56px;background:var(--nav);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;}
.hdr-back{width:34px;height:34px;border-radius:var(--r1);background:var(--inp);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;font-size:16px;transition:transform var(--dur) var(--spring);flex-shrink:0;}
.hdr-back:active{transform:scale(.92);}
.hdr-title{flex:1;font-family:var(--fd);font-size:17px;font-style:italic;color:var(--ink);}
.add-btn{padding:9px 16px;border-radius:var(--rf);background:var(--ink);color:var(--bg);font-weight:600;font-size:12.5px;transition:transform var(--dur) var(--spring);}
.add-btn:active{transform:scale(.95);}

/* MAIN LAYOUT */
.main-content{display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;}

/* LOGIN REQUIRED */
.login-required{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;height:100%;padding:32px 24px;text-align:center;}
.lr-icon{width:72px;height:72px;border-radius:var(--r3);background:var(--err-faint);border:1px solid rgba(224,82,82,.2);display:flex;align-items:center;justify-content:center;font-size:32px;}
.lr-title{font-family:var(--fd);font-size:24px;font-style:italic;color:var(--ink);}
.lr-sub{font-size:14px;color:var(--ink2);line-height:1.65;max-width:260px;}
.lr-btn{padding:13px 28px;border-radius:var(--rf);background:var(--ink);color:var(--bg);font-weight:600;font-size:14px;transition:transform var(--dur) var(--spring);}
.lr-btn:active{transform:scale(.97);}

/* ── CALENDAR ── */
.cal-strip{background:var(--nav);border-bottom:1px solid var(--b1);padding:12px 16px 14px;flex-shrink:0;transition:background .2s;}

.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-month-label{font-family:var(--fd);font-size:17px;font-style:italic;color:var(--ink);}
.cal-nav-group{display:flex;gap:6px;align-items:center;}
.cal-nav-btn{width:30px;height:30px;border-radius:var(--r1);background:var(--inp);border:1px solid var(--b1);font-size:15px;display:flex;align-items:center;justify-content:center;transition:background var(--dur);}
.cal-nav-btn:hover{background:var(--bc);}
.cal-nav-btn:active{transform:scale(.9);}
.cal-today-btn{padding:5px 12px;border-radius:var(--rf);background:var(--sage-faint);border:1px solid var(--sage-mid);font-size:11px;font-weight:700;color:var(--sage2);}

.cal-days-head{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
.cal-day-head{font-size:9.5px;font-weight:700;color:var(--ink3);text-align:center;text-transform:uppercase;letter-spacing:.04em;padding:2px 0;}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-cell{aspect-ratio:1;border-radius:var(--r1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:all var(--dur);position:relative;}
.cal-cell:active{transform:scale(.88);}
.cal-cell.other-month .cal-num{opacity:.3;}
.cal-cell.today{background:var(--inp);}
.cal-cell.today .cal-num{color:var(--sage2);font-weight:700;}
.cal-cell.selected{background:var(--ink);}
.cal-cell.selected .cal-num{color:var(--bg)!important;font-weight:700;}
.cal-num{font-size:12.5px;font-weight:600;color:var(--ink);line-height:1;}
.cal-dots{display:flex;gap:2px;justify-content:center;}
.cal-dot{width:4px;height:4px;border-radius:50%;}
.cal-dot.high{background:var(--err);}
.cal-dot.medium{background:var(--amber);}
.cal-dot.low{background:var(--sage);}
.cal-dot.done{background:var(--ink3);}

/* ── DAY PANEL ── */
.day-panel{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;overscroll-behavior-y:contain;-webkit-overflow-scrolling:touch;padding:0 16px calc(var(--nav-h)+20px+env(safe-area-inset-bottom,0px));}
.day-panel::-webkit-scrollbar{width:2px;}
.day-panel::-webkit-scrollbar-thumb{background:var(--bc);border-radius:99px;}

.day-header{padding:16px 0 12px;display:flex;align-items:flex-end;justify-content:space-between;}
.day-header-left{}
.day-heading{font-family:var(--fd);font-size:26px;font-style:italic;color:var(--ink);line-height:1.1;}
.day-subheading{font-size:12px;color:var(--ink3);font-weight:500;margin-top:3px;}
.day-badge{font-size:11px;font-weight:700;padding:5px 12px;border-radius:var(--rf);background:var(--inp);border:1px solid var(--b1);color:var(--ink2);white-space:nowrap;}

/* GROUP HEADINGS */
.group-head{display:flex;align-items:center;gap:8px;margin:16px 0 8px;}
.group-label{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;}
.group-line{flex:1;height:1px;background:var(--b1);}
.group-count{font-size:10px;font-weight:700;padding:2px 8px;border-radius:var(--rf);background:var(--inp);color:var(--ink3);}

/* PLANNER TASK CARDS */
.p-task{border-radius:var(--r2);background:var(--card);border:1px solid var(--b1);box-shadow:var(--sh);margin-bottom:8px;display:flex;overflow:hidden;animation:up .22s var(--ease) both;transition:box-shadow var(--dur);}
.p-task:hover{box-shadow:var(--she);}
.p-accent{width:3px;flex-shrink:0;}
.p-accent.high{background:var(--err);}
.p-accent.medium{background:var(--amber);}
.p-accent.low{background:var(--sage);}
.p-accent.done{background:var(--ink3);}
.p-body{flex:1;padding:12px 13px;min-width:0;}
.p-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:5px;line-height:1.4;word-break:break-word;}
.p-title.done{color:var(--ink3);text-decoration:line-through;}
.p-desc{font-size:12px;color:var(--ink2);font-weight:400;margin-bottom:7px;line-height:1.5;}
.p-meta{display:flex;flex-wrap:wrap;align-items:center;gap:5px;}
.p-tag{font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:var(--rf);}
.p-tag.high{background:var(--err-faint);color:var(--err);}
.p-tag.medium{background:var(--amber-faint);color:var(--amber);}
.p-tag.low{background:var(--sage-faint);color:var(--sage2);}
.p-tag.done{background:var(--sage-faint);color:var(--sage2);}
.p-time{font-size:10px;font-weight:600;color:var(--ink3);background:var(--inp);padding:3px 8px;border-radius:var(--rf);}
.p-check-col{width:48px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.p-check-btn{width:26px;height:26px;border-radius:9px;border:2px solid var(--bc);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:all .18s;}
.p-check-btn.done{background:var(--sage);border-color:var(--sage);color:#fff;}

/* EMPTY STATE */
.empty-day{text-align:center;padding:40px 20px;}
.empty-day-icon{font-size:42px;opacity:.45;margin-bottom:12px;}
.empty-day-title{font-family:var(--fd);font-size:19px;font-style:italic;color:var(--ink);margin-bottom:5px;}
.empty-day-sub{font-size:13px;color:var(--ink3);font-weight:500;line-height:1.6;margin-bottom:16px;}
.empty-day-cta{padding:11px 22px;border-radius:var(--rf);background:var(--ink);color:var(--bg);font-weight:600;font-size:13px;transition:transform var(--dur) var(--spring);}
.empty-day-cta:active{transform:scale(.97);}

.skel-list{display:flex;flex-direction:column;gap:9px;padding-top:14px;}
.skel{border-radius:var(--r2);background:linear-gradient(90deg,var(--inp) 25%,var(--b1) 50%,var(--inp) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:var(--shell);z-index:999;height:var(--nav-h);background:var(--nav);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--b1);display:flex;align-items:center;padding:0 8px;padding-bottom:env(safe-area-inset-bottom,0px);}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;height:100%;padding:8px 4px;border-radius:var(--r1);}
.bnav-btn.active{background:var(--sage-faint);}
.bnav-icon{font-size:19px;line-height:1;transition:transform var(--dur) var(--spring);}
.bnav-btn.active .bnav-icon{transform:scale(1.08);}
.bnav-btn:active .bnav-icon{transform:scale(.88);}
.bnav-label{font-size:10px;font-weight:600;color:var(--ink3);transition:color var(--dur);}
.bnav-btn.active .bnav-label{color:var(--sage2);font-weight:700;}

/* MODALS */
.modal-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.50);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:0;}
@media(min-width:480px){.modal-overlay{align-items:center;padding:20px;}}
.modal-sheet{width:100%;max-width:460px;border-radius:24px 24px 0 0;background:var(--surface);border:1px solid var(--bc);box-shadow:var(--she);overflow:hidden;animation:sheetUp .26s var(--spring) both;max-height:92vh;display:flex;flex-direction:column;}
@media(min-width:480px){.modal-sheet{border-radius:24px;animation:modalIn .24s var(--spring) both;}}
@keyframes sheetUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes modalIn{from{opacity:0;transform:scale(.94);}to{opacity:1;transform:scale(1);}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--b1);flex-shrink:0;}
.modal-head h4{font-family:var(--fd);font-size:17px;font-style:italic;color:var(--ink);}
.modal-close{font-size:24px;color:var(--ink3);cursor:pointer;line-height:1;}
.modal-body{padding:16px 18px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;}
.field-label{font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:6px;display:block;}
.field-input{width:100%;padding:12px 14px;border-radius:var(--r2);background:var(--inp);border:1.5px solid var(--bc);color:var(--ink);font-size:13.5px;font-weight:500;outline:none;transition:border-color var(--dur);}
.field-input:focus{border-color:var(--sage);}
.field-textarea{resize:vertical;min-height:80px;font-family:var(--fb);}
.priority-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.priority-opt{padding:11px 6px;border-radius:var(--r2);border:2px solid var(--bc);text-align:center;cursor:pointer;transition:all var(--dur);}
.priority-opt.high.sel{border-color:var(--err);background:var(--err-faint);}
.priority-opt.medium.sel{border-color:var(--amber);background:var(--amber-faint);}
.priority-opt.low.sel{border-color:var(--sage);background:var(--sage-faint);}
.priority-opt-icon{font-size:18px;display:block;margin-bottom:3px;}
.priority-opt-lbl{font-size:11px;font-weight:600;color:var(--ink2);}
.modal-msg{font-size:12px;font-weight:600;min-height:14px;}
.modal-save{width:100%;padding:14px;border-radius:var(--r2);background:var(--ink);color:var(--bg);font-weight:700;font-size:14px;transition:transform var(--dur) var(--spring),opacity var(--dur);}
.modal-save:active{transform:scale(.98);}
.modal-save:disabled{opacity:.5;cursor:not-allowed;}

/* TOAST */
.toast-wrap{position:fixed;left:50%;bottom:calc(var(--nav-h)+14px);transform:translateX(-50%);z-index:999999;width:min(92vw,400px);pointer-events:none;}
.toast{display:flex;align-items:flex-start;gap:10px;background:var(--surface);color:var(--ink);border:1px solid var(--bc);border-radius:14px;padding:11px 14px;box-shadow:0 4px 22px rgba(0,0,0,.12);pointer-events:auto;animation:toastIn .22s var(--ease) both;}
.toast.ok{border-left:3px solid var(--sage);}
.toast.info{border-left:3px solid var(--ink2);}
.toast.err{border-left:3px solid var(--err);}
.toast-body p:first-child{font-size:12px;font-weight:700;}
.toast-body p:last-child{font-size:11px;color:var(--ink2);margin-top:1px;}
.toast-x{font-size:16px;color:var(--ink3);cursor:pointer;margin-left:auto;}

@keyframes up{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes toastIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.hidden{display:none!important;}
</style>
</head>
<body>
<div class="shell">
  <header class="hdr">
    <button class="hdr-back" onclick="window.history.back()">←</button>
    <span class="hdr-title">Task Planner</span>
    <button class="add-btn" onclick="openTaskModal()">+ New Task</button>
  </header>

  <!-- LOGIN REQUIRED -->
  <div id="loginRequired" class="login-required hidden">
    <div class="lr-icon">🔒</div>
    <div class="lr-title">Login Required</div>
    <div class="lr-sub">You need to be logged in to AcademeForge to use the Planner.</div>
    <button class="lr-btn" onclick="window.location.href='../student/index.html'">Go to Login</button>
  </div>

  <!-- MAIN -->
  <div id="mainContent" class="main-content hidden">

    <!-- CALENDAR STRIP -->
    <div class="cal-strip" id="calStrip">
      <div class="cal-header">
        <span class="cal-month-label" id="calMonthLabel">June 2026</span>
        <div class="cal-nav-group">
          <button class="cal-nav-btn" onclick="prevMonth()" title="Previous month">‹</button>
          <button class="cal-today-btn" onclick="goToday()">Today</button>
          <button class="cal-nav-btn" onclick="nextMonth()" title="Next month">›</button>
        </div>
      </div>
      <div class="cal-days-head">
        <div class="cal-day-head">Su</div>
        <div class="cal-day-head">Mo</div>
        <div class="cal-day-head">Tu</div>
        <div class="cal-day-head">We</div>
        <div class="cal-day-head">Th</div>
        <div class="cal-day-head">Fr</div>
        <div class="cal-day-head">Sa</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- DAY PANEL -->
    <div class="day-panel" id="dayPanel">
      <div class="day-header">
        <div class="day-header-left">
          <div class="day-heading" id="dayHeading">Today</div>
          <div class="day-subheading" id="daySubheading"></div>
        </div>
        <span class="day-badge" id="dayBadge">0 tasks</span>
      </div>
      <div id="dayTasksWrap">
        <div class="skel-list">
          <div class="skel" style="height:80px"></div>
          <div class="skel" style="height:80px"></div>
          <div class="skel" style="height:80px"></div>
        </div>
      </div>
    </div>

  </div>

  <nav class="bnav">
    <button class="bnav-btn" onclick="window.location.href='../index.html'">
      <span class="bnav-icon">🏠</span><span class="bnav-label">Home</span>
    </button>
    <button class="bnav-btn" onclick="window.location.href='../dashboard/index.html'">
      <span class="bnav-icon">✏️</span><span class="bnav-label">Tasks</span>
    </button>
    <button class="bnav-btn active">
      <span class="bnav-icon">📅</span><span class="bnav-label">Planner</span>
    </button>
  </nav>
</div>

<!-- TASK MODAL -->
<div id="taskModal" class="modal-overlay hidden">
  <div class="modal-sheet">
    <div class="modal-head">
      <h4>New Task</h4>
      <button class="modal-close" onclick="closeTaskModal()">×</button>
    </div>
    <div class="modal-body">
      <div>
        <label class="field-label">Task Title *</label>
        <input id="mTitle" class="field-input" type="text" placeholder="What needs to be done?" maxlength="200"/>
      </div>
      <div>
        <label class="field-label">Description</label>
        <textarea id="mDesc" class="field-input field-textarea" placeholder="Add details (optional)…" maxlength="1000"></textarea>
      </div>
      <div>
        <label class="field-label">Priority</label>
        <div class="priority-row">
          <div class="priority-opt high sel" onclick="setPriority('high',this)"><span class="priority-opt-icon">🔴</span><span class="priority-opt-lbl">High</span></div>
          <div class="priority-opt medium"   onclick="setPriority('medium',this)"><span class="priority-opt-icon">🟡</span><span class="priority-opt-lbl">Medium</span></div>
          <div class="priority-opt low"      onclick="setPriority('low',this)"><span class="priority-opt-icon">🟢</span><span class="priority-opt-lbl">Low</span></div>
        </div>
      </div>
      <div>
        <label class="field-label">Due Date</label>
        <input id="mDue" class="field-input" type="datetime-local"/>
      </div>
      <div id="mMsg" class="modal-msg"></div>
      <button id="mSaveBtn" class="modal-save" onclick="submitTask()">Save Task</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
'use strict';
const SUPA_URL = "https://afooyyydhlwngzssgqih.supabase.co";
const FN_URL   = SUPA_URL + "/functions/v1/timezy-tasks-af";
const CACHE_KEY = 'af_timezy_planner_v1';
const CACHE_TTL = 5 * 60 * 1000;

function cacheGet(k){try{const r=localStorage.getItem(k);if(!r)return null;const o=JSON.parse(r);if(Date.now()-o.ts>CACHE_TTL)return null;return o.data;}catch{return null;}}
function cacheSet(k,d){try{localStorage.setItem(k,JSON.stringify({ts:Date.now(),data:d}));}catch{}}

const $=id=>document.getElementById(id);
const esc=t=>String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const safe=(v,fb='')=>(v===null||v===undefined||v==='') ? fb : v;

function syncTheme(){document.documentElement.setAttribute('data-theme',localStorage.getItem('af_dark_mode')==='1'?'dark':'light');}
syncTheme();
window.addEventListener('storage',e=>{if(e.key==='af_dark_mode')syncTheme();});

let _tt=null;
function showToast(msg,type='info',title=''){
  const w=$('toastWrap');w.innerHTML='';if(_tt){clearTimeout(_tt);_tt=null;}
  const lbls={ok:'Done',info:'Info',err:'Error'};
  const el=document.createElement('div');el.className='toast '+type;
  el.innerHTML=`<div class="toast-body"><p>${title||lbls[type]}</p><p>${msg}</p></div><span class="toast-x" onclick="this.parentElement.remove()">×</span>`;
  w.appendChild(el);_tt=setTimeout(()=>el&&el.remove(),2800);
}

/* STATE */
let allTasks=[];
let calYear=new Date().getFullYear();
let calMonth=new Date().getMonth();
const today=toDateKey(new Date());
let selectedDate=today;
let selectedPriority='high';

function toDateKey(d){
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function taskDateKey(t){
  if(!t.due_date) return null;
  return toDateKey(new Date(t.due_date));
}

const studentUuid=()=>localStorage.getItem('af_student_uuid')||'';
const studentName=()=>safe(localStorage.getItem('af_student_name'),'');

async function api(body){
  const res=await fetch(FN_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...body,student_uuid:studentUuid()})});
  const data=await res.json();if(!data.ok)throw new Error(data.message||'Failed');return data;
}

/* TASK MAP */
function buildTaskMap(){
  const map={};
  allTasks.forEach(t=>{
    const k=taskDateKey(t);
    if(k){if(!map[k])map[k]=[];map[k].push(t);}
  });
  return map;
}

/* CALENDAR */
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

function renderCalendar(){
  const taskMap=buildTaskMap();
  $('calMonthLabel').textContent=`${MONTHS[calMonth]} ${calYear}`;
  const grid=$('calGrid');grid.innerHTML='';

  const first=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();

  // Prev month cells
  for(let i=0;i<first;i++){
    const pm=calMonth===0?11:calMonth-1;
    const py=calMonth===0?calYear-1:calYear;
    const k=`${py}-${String(pm+1).padStart(2,'0')}-${String(prevDays-first+i+1).padStart(2,'0')}`;
    grid.appendChild(makeCell(prevDays-first+i+1,k,true,taskMap[k]||[]));
  }
  // Current month cells
  for(let d=1;d<=days;d++){
    const k=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    grid.appendChild(makeCell(d,k,false,taskMap[k]||[]));
  }
  // Next month filler
  const rem=(first+days)%7;
  if(rem){
    const nm=calMonth===11?0:calMonth+1;
    const ny=calMonth===11?calYear+1:calYear;
    for(let d=1;d<=7-rem;d++){
      const k=`${ny}-${String(nm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      grid.appendChild(makeCell(d,k,true,taskMap[k]||[]));
    }
  }
}

function makeCell(num,key,otherMonth,tasks){
  const el=document.createElement('div');
  let cls='cal-cell';
  if(otherMonth) cls+=' other-month';
  if(key===today) cls+=' today';
  if(key===selectedDate) cls+=' selected';
  el.className=cls;
  el.onclick=()=>{selectedDate=key;renderCalendar();renderDayPanel();};

  const numEl=document.createElement('div');numEl.className='cal-num';numEl.textContent=num;el.appendChild(numEl);

  if(tasks.length){
    const dots=document.createElement('div');dots.className='cal-dots';
    tasks.slice(0,3).forEach(t=>{
      const d=document.createElement('div');
      d.className='cal-dot '+(t.completed?'done':t.priority||'medium');
      dots.appendChild(d);
    });
    el.appendChild(dots);
  }
  return el;
}

function prevMonth(){
  if(calMonth===0){calMonth=11;calYear--;}else calMonth--;
  renderCalendar();
}
function nextMonth(){
  if(calMonth===11){calMonth=0;calYear++;}else calMonth++;
  renderCalendar();
}
function goToday(){
  calYear=new Date().getFullYear();
  calMonth=new Date().getMonth();
  selectedDate=today;
  renderCalendar();renderDayPanel();
}

/* DAY PANEL — shows ONLY tasks for selectedDate */
function renderDayPanel(){
  const taskMap=buildTaskMap();
  const dayTasks=taskMap[selectedDate]||[];

  // Update heading
  const dt=new Date(selectedDate+'T12:00:00');
  let heading='';
  const offset=Math.round((new Date(selectedDate)-new Date(today))/(1000*60*60*24));
  if(offset===0) heading='Today';
  else if(offset===1) heading='Tomorrow';
  else if(offset===-1) heading='Yesterday';
  else heading=dt.toLocaleDateString('en-IN',{weekday:'long'});

  $('dayHeading').textContent=heading;
  $('daySubheading').textContent=dt.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  $('dayBadge').textContent=dayTasks.length+' task'+(dayTasks.length!==1?'s':'');

  if(!dayTasks.length){
    $('dayTasksWrap').innerHTML=`<div class="empty-day">
      <div class="empty-day-icon">📭</div>
      <div class="empty-day-title">Nothing here</div>
      <div class="empty-day-sub">No tasks scheduled for this day.<br>Create one with this date as the due date.</div>
      <button class="empty-day-cta" onclick="openTaskModalWithDate('${selectedDate}')">+ Add Task</button>
    </div>`;
    return;
  }

  const pending=dayTasks.filter(t=>!t.completed);
  const done=dayTasks.filter(t=>t.completed);

  let html='';
  if(pending.length){
    html+=`<div class="group-head">
      <span class="group-label">Pending</span>
      <div class="group-line"></div>
      <span class="group-count">${pending.length}</span>
    </div>`;
    html+=pending.map(t=>renderPlannerTask(t)).join('');
  }
  if(done.length){
    html+=`<div class="group-head" style="margin-top:${pending.length?'10px':'0'}">
      <span class="group-label">Completed</span>
      <div class="group-line"></div>
      <span class="group-count">${done.length}</span>
    </div>`;
    html+=done.map(t=>renderPlannerTask(t)).join('');
  }
  $('dayTasksWrap').innerHTML=html;
}

function renderPlannerTask(t){
  const pr=t.priority||'medium';
  const timeStr=t.due_date?new Date(t.due_date).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true}):null;
  return`<div class="p-task">
    <div class="p-accent ${t.completed?'done':pr}"></div>
    <div class="p-body">
      <div class="p-title${t.completed?' done':''}">${esc(t.title)}</div>
      ${t.description?`<div class="p-desc">${esc(t.description)}</div>`:''}
      <div class="p-meta">
        <span class="p-tag ${t.completed?'done':pr}">${t.completed?'Done':pr}</span>
        ${timeStr?`<span class="p-time">⏰ ${timeStr}</span>`:''}
      </div>
    </div>
    <div class="p-check-col">
      <div class="p-check-btn${t.completed?' done':''}" onclick="toggleTask('${t.id}',${!t.completed})">
        ${t.completed?'✓':''}
      </div>
    </div>
  </div>`;
}

/* TOGGLE */
async function toggleTask(id,completed){
  const t=allTasks.find(x=>x.id===id);if(!t)return;
  t.completed=completed;
  renderCalendar();renderDayPanel();
  try{
    await api({action:'toggle_complete',task_id:id,completed});
    cacheSet(CACHE_KEY,allTasks);
    clearOtherCaches();
    showToast(completed?'Task marked done.':'Task reopened.',completed?'ok':'info');
  }catch(e){
    t.completed=!completed;renderCalendar();renderDayPanel();
    showToast('Could not update task.','err');
  }
}

/* LOAD */
async function loadTasks(){
  const uuid=studentUuid();
  if(!uuid){$('dayTasksWrap').innerHTML='<p style="text-align:center;padding:20px;color:var(--ink3);">No session found.</p>';return;}
  const cached=cacheGet(CACHE_KEY);
  if(cached){allTasks=cached;renderCalendar();renderDayPanel();return;}
  try{
    const d=await api({action:'get_tasks'});
    allTasks=d.tasks||[];
    cacheSet(CACHE_KEY,allTasks);
    renderCalendar();renderDayPanel();
  }catch(e){
    $('dayTasksWrap').innerHTML='<p style="text-align:center;padding:20px;color:var(--err);font-weight:700;">Could not load tasks.</p>';
  }
}

/* PRIORITY */
function setPriority(p,el){
  selectedPriority=p;
  document.querySelectorAll('.priority-opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
}

/* MODALS */
function openTaskModal(){
  selectedPriority='high';
  $('mTitle').value='';$('mDesc').value='';$('mMsg').textContent='';
  $('mDue').value=selectedDate?selectedDate+'T09:00':'';
  document.querySelectorAll('.priority-opt').forEach(o=>{o.classList.remove('sel');if(o.classList.contains('high'))o.classList.add('sel');});
  $('taskModal').classList.remove('hidden');
  setTimeout(()=>$('mTitle').focus(),80);
}

function openTaskModalWithDate(dateKey){
  selectedPriority='high';
  $('mTitle').value='';$('mDesc').value='';$('mMsg').textContent='';
  $('mDue').value=dateKey+'T09:00';
  document.querySelectorAll('.priority-opt').forEach(o=>{o.classList.remove('sel');if(o.classList.contains('high'))o.classList.add('sel');});
  $('taskModal').classList.remove('hidden');
  setTimeout(()=>$('mTitle').focus(),80);
}

function closeTaskModal(){$('taskModal').classList.add('hidden');}

async function submitTask(){
  const title=($('mTitle').value||'').trim();
  const msg=$('mMsg');
  if(!title||title.length<2){msg.textContent='Enter a title (min. 2 characters).';msg.style.color='var(--err)';return;}
  const btn=$('mSaveBtn');btn.disabled=true;msg.textContent='Saving…';msg.style.color='var(--ink3)';
  try{
    const d=await api({action:'create_task',title,description:$('mDesc').value.trim(),priority:selectedPriority,due_date:$('mDue').value||null,student_name:studentName()});
    allTasks.unshift(d.task);
    cacheSet(CACHE_KEY,allTasks);
    clearOtherCaches();
    // Navigate calendar to the new task's date
    if(d.task.due_date){
      const newKey=toDateKey(new Date(d.task.due_date));
      calYear=parseInt(newKey.split('-')[0]);
      calMonth=parseInt(newKey.split('-')[1])-1;
      selectedDate=newKey;
    }
    renderCalendar();renderDayPanel();
    msg.textContent='✓ Task created!';msg.style.color='var(--sage)';
    showToast('Task created!','ok');
    setTimeout(closeTaskModal,500);
  }catch(e){
    msg.textContent=e.message||'Save failed.';msg.style.color='var(--err)';
  }finally{btn.disabled=false;}
}

function clearOtherCaches(){
  try{localStorage.removeItem('af_timezy_home_v1');localStorage.removeItem('af_timezy_dash_v1');}catch{}
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeTaskModal();});
document.getElementById('taskModal')?.addEventListener('click',function(e){if(e.target===this)closeTaskModal();});
document.addEventListener('contextmenu',e=>e.preventDefault());

document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('af_student_logged_in')!=='true'){
    $('loginRequired').classList.remove('hidden');return;
  }
  const mc=$('mainContent');
  mc.classList.remove('hidden');
  loadTasks();
});
</script>
