<!DOCTYPE html>
<html lang="en">
<head>
<script>
!function(){
  document.documentElement.setAttribute('data-theme',
    localStorage.getItem('af_dark_mode')==='1'?'dark':'light');
}();
</script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1"/>
<meta name="theme-color" content="#0c0b1d"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>Lecture Player · AcademeForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Sora:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
/* ── VARIABLES ── */
:root{
  --p:#4f46e5;--p2:#3730a3;--pl:#818cf8;
  --acc:#06b6d4;--ok:#22c55e;--err:#ef4444;--warn:#f59e0b;
  --bg:#0c0b1d;--surface:#120f2a;--card:rgba(30,27,60,.95);
  --inp:#1e1b3c;
  --t1:#f0eeff;--t2:#a5a3c2;--tm:#6b6a8a;
  --b1:rgba(129,140,248,.12);--bc:rgba(129,140,248,.18);
  --r1:8px;--r2:12px;--r3:16px;--r4:24px;--rf:9999px;
  --fd:'Sora',sans-serif;--fb:'Nunito',sans-serif;
  --ctrl-h:64px;
  --seek-h:4px;
  --seek-thumb:16px;
  --topbar-h:56px;
}
[data-theme="light"]{
  --bg:#0c0b1d;--surface:#120f2a;--card:rgba(30,27,60,.95);
  --t1:#f0eeff;--t2:#a5a3c2;--tm:#6b6a8a;
  --inp:#1e1b3c;
  --b1:rgba(129,140,248,.12);--bc:rgba(129,140,248,.18);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:15px;-webkit-text-size-adjust:100%;height:100%;height:100dvh;background:#000;}
body{
  font-family:var(--fb);background:var(--bg);color:var(--t1);
  height:100%;height:100dvh;overflow:hidden;
  display:flex;flex-direction:column;
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
}
button{font-family:var(--fb);cursor:pointer;border:none;background:none;color:inherit;}
input{font-family:var(--fb);}

/* ── TOPBAR ── */
.topbar{
  position:relative;z-index:20;
  height:var(--topbar-h);
  background:rgba(12,11,29,.96);
  border-bottom:1px solid var(--b1);
  display:flex;align-items:center;gap:10px;
  padding:0 12px;
  padding-top:env(safe-area-inset-top,0px);
  flex-shrink:0;
}
.back-btn{
  width:38px;height:38px;min-width:38px;
  border-radius:var(--r2);
  display:grid;place-items:center;
  font-size:20px;
  background:rgba(129,140,248,.10);
  border:1px solid var(--b1);
  flex-shrink:0;
}
.back-btn:active{opacity:.6;transform:scale(.93);}
.topbar-info{flex:1;min-width:0;}
.topbar-label{font-size:10px;color:var(--pl);font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-bottom:1px;}
.topbar-title{
  font-family:var(--fd);font-size:14px;font-weight:800;
  color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.speed-pill{
  height:30px;padding:0 11px;
  border-radius:var(--rf);
  font-size:12px;font-weight:900;
  background:rgba(79,70,229,.18);
  border:1px solid rgba(129,140,248,.25);
  color:var(--pl);
  white-space:nowrap;flex-shrink:0;
}
.speed-pill:active{background:rgba(79,70,229,.35);}

/* ── VIDEO WRAP ── */
.video-area{
  flex:1;
  position:relative;
  background:#000;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  min-height:0;
}
#yt-container{
  position:absolute;inset:0;
  pointer-events:none;
}
#yt-container iframe{
  width:100%;height:100%;
  border:none;display:block;
}

/* Tap zones overlay */
.tap-zones{
  position:absolute;inset:0;
  display:grid;grid-template-columns:1fr 1fr 1fr;
  z-index:10;
}
.tap-zone{height:100%;}

/* ── YouTube branding mask ──
   Sits above the iframe but below the tap zones / overlays.
   Purely visual — covers the spot where YouTube renders its
   watermark / "Watch on YouTube" link so it never shows on screen. */
.yt-mask{
  position:absolute;
  background:#000;
  pointer-events:none;
  z-index:6;
}
.yt-mask-br{
  right:0;bottom:0;
  width:78px;height:48px;
  border-top-left-radius:10px;
}

/* Buffering spinner */
.spinner-wrap{
  position:absolute;inset:0;
  display:none;align-items:center;justify-content:center;
  z-index:15;pointer-events:none;
}
.spinner-wrap.show{display:flex;}
.spinner{
  width:44px;height:44px;
  border:4px solid rgba(129,140,248,.20);
  border-top-color:var(--pl);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Double-tap ripple */
.dbl-ripple{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  width:80px;height:80px;
  border-radius:50%;
  background:rgba(129,140,248,.22);
  pointer-events:none;z-index:12;
  opacity:0;
  transition:transform .3s ease,opacity .3s ease;
}
.dbl-ripple.left-rip{left:25%;}
.dbl-ripple.right-rip{left:75%;}
.dbl-ripple.show{transform:translate(-50%,-50%) scale(1);opacity:1;}
.dbl-ripple-label{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) translateY(0);
  font-size:11px;font-weight:900;color:#fff;
  pointer-events:none;z-index:13;
  text-align:center;opacity:0;
  transition:opacity .25s ease,transform .3s ease;
}
.dbl-ripple-label.show{opacity:1;transform:translate(-50%,-50%) translateY(-44px);}

/* Center play icon */
.center-icon{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  z-index:11;pointer-events:none;opacity:0;
  transition:opacity .2s ease;
}
.center-icon.flash{opacity:1;}
.center-icon svg{filter:drop-shadow(0 2px 8px rgba(0,0,0,.5));}

/* ── CONTROLS ── */
.controls{
  background:rgba(12,11,29,.97);
  border-top:1px solid var(--b1);
  padding:0 12px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));
  flex-shrink:0;
}

/* Seek row */
.seek-row{
  padding:10px 0 4px;
  display:flex;align-items:center;gap:8px;
}
.time-text{
  font-size:11px;font-weight:800;color:var(--t2);
  white-space:nowrap;min-width:80px;
  font-variant-numeric:tabular-nums;
}
.time-text span{color:var(--tm);}
.seek-wrap{
  flex:1;
  display:flex;align-items:center;
  position:relative;height:24px;
}
.seek-track{
  position:relative;width:100%;height:var(--seek-h);
  border-radius:99px;background:rgba(129,140,248,.16);
  cursor:pointer;
}
.seek-buf{
  position:absolute;top:0;left:0;height:100%;
  border-radius:99px;background:rgba(129,140,248,.22);
  pointer-events:none;
  transition:width .3s linear;
}
.seek-fill{
  position:absolute;top:0;left:0;height:100%;
  border-radius:99px;
  background:linear-gradient(90deg,var(--p),var(--pl));
  pointer-events:none;
}
.seek-thumb{
  position:absolute;top:50%;
  width:var(--seek-thumb);height:var(--seek-thumb);
  border-radius:50%;
  background:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.4);
  transform:translate(-50%,-50%);
  pointer-events:none;
  transition:transform .1s ease;
}
.seek-wrap:active .seek-thumb{transform:translate(-50%,-50%) scale(1.3);}

/* Main ctrl row */
.ctrl-row{
  display:flex;align-items:center;justify-content:space-between;
  height:var(--ctrl-h);gap:4px;
}
.ctrl-btn{
  width:46px;height:46px;min-width:46px;
  display:grid;place-items:center;
  border-radius:var(--r2);font-size:22px;
  transition:background .12s,transform .12s;
}
.ctrl-btn:active{background:rgba(129,140,248,.12);transform:scale(.88);}
.ctrl-btn.play-pause-btn{
  width:52px;height:52px;min-width:52px;
  border-radius:var(--r3);
  background:linear-gradient(135deg,var(--p),var(--p2));
  box-shadow:0 4px 18px rgba(79,70,229,.45);
  font-size:24px;
}
.ctrl-btn.play-pause-btn:active{transform:scale(.92);}

.skip-label{
  font-size:9px;font-weight:900;color:var(--tm);
  display:block;text-align:center;margin-top:-2px;letter-spacing:.03em;
}
.ctrl-btn-wrap{display:flex;flex-direction:column;align-items:center;}

/* Speed panel */
.speed-panel{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:var(--surface);
  border-top:1px solid var(--bc);
  border-radius:var(--r4) var(--r4) 0 0;
  padding:0 0 calc(16px + env(safe-area-inset-bottom,0px));
  z-index:50;
  box-shadow:0 -8px 40px rgba(0,0,0,.5);
  transform:translateX(-50%) translateY(100%);
  transition:transform .28s cubic-bezier(.34,1.1,.64,1);
}
.speed-panel.open{transform:translateX(-50%) translateY(0);}
.speed-panel-handle{
  width:40px;height:4px;border-radius:99px;
  background:var(--bc);margin:12px auto 4px;
}
.speed-panel-title{
  font-family:var(--fd);font-size:14px;font-weight:800;
  text-align:center;color:var(--t1);padding:4px 0 12px;
  border-bottom:1px solid var(--b1);margin:0 16px 4px;
}
.speed-option{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 20px;font-size:14px;font-weight:800;color:var(--t2);
}
.speed-option:active{background:rgba(129,140,248,.07);}
.speed-option.active{color:var(--pl);}
.speed-option .check{font-size:16px;opacity:0;}
.speed-option.active .check{opacity:1;}
.speed-overlay{
  position:fixed;inset:0;z-index:49;
  background:rgba(0,0,0,.5);
  display:none;
}
.speed-overlay.open{display:block;}

/* Fullscreen adjustments */
.fs-mode .topbar{display:none;}
.fs-mode .video-area{flex:1;height:100%;}
.fs-mode body{overflow:hidden;}
.fs-mode .controls{
  background:linear-gradient(to top, rgba(8,7,20,.92), rgba(8,7,20,.55) 70%, transparent);
  border-top:none;
}

/* Landscape */
@media(orientation:landscape) and (max-height:500px){
  .topbar{height:44px;}
  .controls{padding:4px 16px 4px;}
  .seek-row{padding:6px 0 2px;}
  .ctrl-row{height:52px;}
  .ctrl-btn{width:40px;height:40px;}
  .ctrl-btn.play-pause-btn{width:44px;height:44px;}
}

/* Toast */
.player-toast{
  position:fixed;bottom:calc(var(--ctrl-h) + 60px + env(safe-area-inset-bottom,0px));
  left:50%;transform:translateX(-50%);
  background:rgba(30,27,60,.96);color:var(--t1);
  border:1px solid var(--bc);border-radius:var(--r2);
  padding:8px 16px;font-size:12px;font-weight:800;
  z-index:60;
  opacity:0;transition:opacity .2s ease;
  pointer-events:none;
  white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.player-toast.show{opacity:1;}

/* Error state */
.player-error{
  position:absolute;inset:0;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;z-index:20;text-align:center;padding:24px;
  background:var(--bg);
}
.player-error.show{display:flex;}
.player-error-icon{font-size:48px;}
.player-error h2{font-family:var(--fd);font-size:18px;font-weight:900;color:var(--err);}
.player-error p{font-size:13px;color:var(--t2);font-weight:600;line-height:1.6;}
.retry-btn{
  margin-top:8px;padding:11px 24px;border-radius:var(--r2);
  background:linear-gradient(135deg,var(--p),var(--p2));
  color:#fff;font-size:13px;font-weight:900;
  box-shadow:0 4px 16px rgba(79,70,229,.35);
}
.retry-btn:active{transform:scale(.96);}

/* End-of-lecture overlay (hides YouTube's end-screen / suggestions) */
.end-overlay{
  position:absolute;inset:0;
  background:rgba(8,7,20,.96);
  display:none;
  flex-direction:column;align-items:center;justify-content:center;
  gap:10px;z-index:30;text-align:center;padding:24px;
}
.end-overlay.show{display:flex;}
.end-overlay-icon{font-size:46px;}
.end-overlay h2{font-family:var(--fd);font-size:18px;font-weight:900;color:var(--t1);}
.end-overlay p{font-size:13px;color:var(--t2);font-weight:600;line-height:1.6;max-width:280px;}
.end-overlay .replay-btn{
  margin-top:6px;padding:11px 26px;border-radius:var(--r2);
  background:linear-gradient(135deg,var(--p),var(--p2));
  color:#fff;font-size:13px;font-weight:900;
  box-shadow:0 4px 16px rgba(79,70,229,.35);
}
.end-overlay .replay-btn.secondary{background:rgba(129,140,248,.15);box-shadow:none;}
.end-overlay .replay-btn:active{transform:scale(.96);}
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <button class="back-btn" id="backBtn" onclick="goBack()" aria-label="Go back">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  </button>
  <div class="topbar-info">
    <div class="topbar-label">AcademeForge</div>
    <div class="topbar-title" id="lectureTitle">Loading lecture…</div>
  </div>
  <button class="speed-pill" id="speedPillBtn" onclick="openSpeedPanel()" aria-label="Playback speed">1×</button>
</header>

<!-- VIDEO AREA -->
<div class="video-area" id="videoArea">
  <div id="yt-container">
    <!-- YouTube iframe injected here by API -->
  </div>

  <!-- Tap zones for seek/play -->
  <div class="tap-zones" id="tapZones">
    <div class="tap-zone" id="tzLeft"></div>
    <div class="tap-zone" id="tzCenter"></div>
    <div class="tap-zone" id="tzRight"></div>
  </div>

  <!-- YouTube branding mask (covers watermark / "Watch on YouTube" corner link) -->
  <div class="yt-mask yt-mask-br" aria-hidden="true"></div>

  <!-- Buffering -->
  <div class="spinner-wrap" id="spinner">
    <div class="spinner"></div>
  </div>

  <!-- Double-tap ripples -->
  <div class="dbl-ripple left-rip" id="leftRipple"></div>
  <div class="dbl-ripple right-rip" id="rightRipple"></div>
  <div class="dbl-ripple-label" id="leftLabel">-10s</div>
  <div class="dbl-ripple-label" id="rightLabel">+10s</div>

  <!-- Center play/pause flash -->
  <div class="center-icon" id="centerIcon">
    <svg id="centerSvg" width="72" height="72" viewBox="0 0 72 72" fill="none">
      <circle cx="36" cy="36" r="34" fill="rgba(0,0,0,.45)" stroke="rgba(255,255,255,.2)" stroke-width="2"/>
      <polygon id="playIconPath" points="28,22 54,36 28,50" fill="#fff"/>
      <g id="pauseIconPath" style="display:none">
        <rect x="25" y="21" width="8" height="30" rx="2" fill="#fff"/>
        <rect x="39" y="21" width="8" height="30" rx="2" fill="#fff"/>
      </g>
    </svg>
  </div>

  <!-- End of lecture -->
  <div class="end-overlay" id="endOverlay">
    <div class="end-overlay-icon">✅</div>
    <h2>Lecture Completed</h2>
    <p>Great job! You can replay this lecture or head back to the chapter list.</p>
    <button class="replay-btn" onclick="replayLecture()">↻ Replay</button>
    <button class="replay-btn secondary" onclick="goBack()">← Back to Chapters</button>
  </div>

  <!-- Error -->
  <div class="player-error" id="playerError">
    <div class="player-error-icon">📡</div>
    <h2>Video Unavailable</h2>
    <p id="errorMsg">Could not load the lecture video. Check your internet connection and try again.</p>
    <button class="retry-btn" onclick="retryLoad()">↻ Retry</button>
    <button class="retry-btn" style="background:rgba(129,140,248,.15);box-shadow:none;margin-top:4px;" onclick="goBack()">← Go Back</button>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls" id="controls">
  <!-- Seek row -->
  <div class="seek-row">
    <div class="time-text" id="timeDisplay">0:00 <span>/ 0:00</span></div>
    <div class="seek-wrap" id="seekWrap" aria-label="Seek bar">
      <div class="seek-track" id="seekTrack">
        <div class="seek-buf" id="seekBuf" style="width:0%"></div>
        <div class="seek-fill" id="seekFill" style="width:0%"></div>
        <div class="seek-thumb" id="seekThumb" style="left:0%"></div>
      </div>
    </div>
  </div>
  <!-- Main controls row -->
  <div class="ctrl-row">
    <div class="ctrl-btn-wrap">
      <button class="ctrl-btn" onclick="skipBack()" aria-label="Skip back 10 seconds">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-3.29"/>
        </svg>
      </button>
      <span class="skip-label">10s</span>
    </div>
    <button class="ctrl-btn play-pause-btn" id="playPauseBtn" onclick="togglePlay()" aria-label="Play / Pause">
      <span id="playPauseIcon">▶</span>
    </button>
    <div class="ctrl-btn-wrap">
      <button class="ctrl-btn" onclick="skipForward()" aria-label="Skip forward 10 seconds">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-.49-3.29"/>
        </svg>
      </button>
      <span class="skip-label">10s</span>
    </div>
    <button class="ctrl-btn" onclick="toggleFullscreen()" aria-label="Fullscreen" id="fsBtn">
      <svg id="fsIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
      </svg>
    </button>
  </div>
</div>

<!-- SPEED PANEL OVERLAY -->
<div class="speed-overlay" id="speedOverlay" onclick="closeSpeedPanel()"></div>
<div class="speed-panel" id="speedPanel" role="dialog" aria-label="Playback speed">
  <div class="speed-panel-handle"></div>
  <div class="speed-panel-title">Playback Speed</div>
  <div id="speedOptions"></div>
</div>

<!-- TOAST -->
<div class="player-toast" id="playerToast"></div>

<script>
'use strict';

/* ── URL PARAMS ── */
const params   = new URLSearchParams(location.search);
const videoId  = params.get('v') || '';
const rawTitle = params.get('title') || 'Lecture';
const backUrl  = params.get('back') || '';

document.getElementById('lectureTitle').textContent = decodeURIComponent(rawTitle);
document.title = decodeURIComponent(rawTitle) + ' · AcademeForge';

/* ── NAVIGATION ── */
function goBack() {
  if (backUrl) { location.href = decodeURIComponent(backUrl); return; }
  if (history.length > 1) { history.back(); } else { location.href = '/student/index.html'; }
}

/* ── STATE ── */
let player         = null;
let isPlaying      = false;
let isDragging     = false;
let currentSpeed   = 1;
let seekInterval   = null;
let tapTimer       = null;
let tapCount       = { left:0, right:0 };
let isFullscreen   = false;
const SPEEDS       = [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2];

/* ── TOAST ── */
let toastTimer;
function showToast(msg, dur) {
  const t = document.getElementById('playerToast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), dur||1400);
}

/* ── ERROR ── */
function showError(msg) {
  document.getElementById('errorMsg').textContent = msg || 'Could not load the lecture video.';
  document.getElementById('playerError').classList.add('show');
  document.getElementById('spinner').classList.remove('show');
}
function hideError() { document.getElementById('playerError').classList.remove('show'); }

function retryLoad() {
  hideError();
  if (player && player.loadVideoById) {
    player.loadVideoById(videoId);
  } else {
    initPlayer();
  }
}

/* ── FORMAT TIME ── */
function fmtTime(sec) {
  if (!sec || isNaN(sec) || !isFinite(sec)) return '0:00';
  const s = Math.floor(sec), m = Math.floor(s/60), r = s%60;
  return m + ':' + (r<10?'0':'') + r;
}

/* ── SEEK BAR ── */
function updateSeekBar() {
  if (!player || isDragging) return;
  try {
    const cur = player.getCurrentTime() || 0;
    const dur = player.getDuration() || 0;
    const buf = player.getVideoLoadedFraction() || 0;
    const pct = dur ? (cur/dur)*100 : 0;
    document.getElementById('seekFill').style.width  = pct + '%';
    document.getElementById('seekThumb').style.left  = pct + '%';
    document.getElementById('seekBuf').style.width   = (buf*100) + '%';
    document.getElementById('timeDisplay').innerHTML =
      fmtTime(cur) + ' <span>/ ' + fmtTime(dur) + '</span>';
  } catch(_) {}
}

function startSeekInterval() {
  stopSeekInterval();
  seekInterval = setInterval(updateSeekBar, 500);
}
function stopSeekInterval() {
  if (seekInterval) { clearInterval(seekInterval); seekInterval=null; }
}

/* ── SEEK INTERACTION ── */
(function initSeek() {
  const wrap  = document.getElementById('seekWrap');
  const track = document.getElementById('seekTrack');

  function getSeekPct(e) {
    const rect  = track.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  }
  function applySeek(pct) {
    document.getElementById('seekFill').style.width  = (pct*100) + '%';
    document.getElementById('seekThumb').style.left  = (pct*100) + '%';
    if (player) {
      const dur = player.getDuration() || 0;
      const t   = pct * dur;
      document.getElementById('timeDisplay').innerHTML =
        fmtTime(t) + ' <span>/ ' + fmtTime(dur) + '</span>';
    }
  }
  function seekStart(e) {
    isDragging = true;
    stopSeekInterval();
    applySeek(getSeekPct(e));
  }
  function seekMove(e) {
    if (!isDragging) return;
    e.preventDefault();
    applySeek(getSeekPct(e));
  }
  function seekEnd(e) {
    if (!isDragging) return;
    const pct = getSeekPct(e.changedTouches ? {clientX:e.changedTouches[0].clientX} : e);
    isDragging = false;
    if (player) { player.seekTo(pct * (player.getDuration()||0), true); }
    if (isPlaying) startSeekInterval();
  }
  track.addEventListener('mousedown',  seekStart);
  document.addEventListener('mousemove', seekMove);
  document.addEventListener('mouseup',   seekEnd);
  track.addEventListener('touchstart', seekStart, {passive:true});
  document.addEventListener('touchmove', seekMove, {passive:false});
  document.addEventListener('touchend',  seekEnd,  {passive:true});
})();

/* ── PLAY / PAUSE ── */
function togglePlay() {
  if (!player) return;
  try {
    const state = player.getPlayerState();
    if (state === 1) { player.pauseVideo(); } else { player.playVideo(); }
    flashCenterIcon(state === 1);
  } catch(_) {}
}
function setPlayIcon(playing) {
  document.getElementById('playPauseIcon').textContent = playing ? '⏸' : '▶';
  isPlaying = playing;
}
function flashCenterIcon(pausing) {
  const el    = document.getElementById('centerIcon');
  const play  = document.getElementById('playIconPath');
  const pause = document.getElementById('pauseIconPath');
  if (pausing) { play.style.display = 'none'; pause.style.display = ''; }
  else         { play.style.display = '';     pause.style.display = 'none'; }
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 420);
}

/* ── SKIP ── */
function skipBack() {
  if (!player) return;
  const t = Math.max(0, (player.getCurrentTime()||0) - 10);
  player.seekTo(t, true);
  showToast('⏪ -10s');
  triggerRipple('left');
}
function skipForward() {
  if (!player) return;
  const dur = player.getDuration() || 0;
  const t   = Math.min(dur, (player.getCurrentTime()||0) + 10);
  player.seekTo(t, true);
  showToast('⏩ +10s');
  triggerRipple('right');
}

/* ── RIPPLE ── */
function triggerRipple(side) {
  const ripId  = side==='left' ? 'leftRipple'  : 'rightRipple';
  const lblId  = side==='left' ? 'leftLabel'   : 'rightLabel';
  const rip    = document.getElementById(ripId);
  const lbl    = document.getElementById(lblId);
  rip.classList.remove('show'); lbl.classList.remove('show');
  void rip.offsetWidth;
  rip.classList.add('show'); lbl.classList.add('show');
  setTimeout(() => { rip.classList.remove('show'); lbl.classList.remove('show'); }, 500);
}

/* ── TAP ZONE DOUBLE-TAP ── */
(function initTapZones() {
  const tzLeft   = document.getElementById('tzLeft');
  const tzCenter = document.getElementById('tzCenter');
  const tzRight  = document.getElementById('tzRight');

  function handleTap(side) {
    if (side === 'center') { togglePlay(); return; }
    tapCount[side]++;
    clearTimeout(tapTimer);
    if (tapCount[side] >= 2) {
      if (side === 'left')  { skipBack(); }
      if (side === 'right') { skipForward(); }
      tapCount[side] = 0;
    } else {
      tapTimer = setTimeout(() => {
        if (tapCount[side] === 1) { togglePlay(); }
        tapCount[side] = 0;
      }, 260);
    }
  }

  tzLeft.addEventListener('click',   () => handleTap('left'));
  tzCenter.addEventListener('click', () => handleTap('center'));
  tzRight.addEventListener('click',  () => handleTap('right'));
})();

/* ── SPEED ── */
function buildSpeedOptions() {
  const cont = document.getElementById('speedOptions');
  cont.innerHTML = SPEEDS.map(s => `
    <div class="speed-option${s===currentSpeed?' active':''}" onclick="setSpeed(${s})" data-speed="${s}">
      <span>${s===1?'Normal (1×)':s+'×'}</span>
      <span class="check">✓</span>
    </div>`).join('');
}
function openSpeedPanel() {
  buildSpeedOptions();
  document.getElementById('speedPanel').classList.add('open');
  document.getElementById('speedOverlay').classList.add('open');
}
function closeSpeedPanel() {
  document.getElementById('speedPanel').classList.remove('open');
  document.getElementById('speedOverlay').classList.remove('open');
}
function setSpeed(rate) {
  currentSpeed = rate;
  if (player) { try { player.setPlaybackRate(rate); } catch(_) {} }
  document.getElementById('speedPillBtn').textContent = rate===1?'1×':rate+'×';
  buildSpeedOptions();
  showToast('Speed: ' + (rate===1?'Normal':rate+'×'));
  closeSpeedPanel();
}

/* ── FULLSCREEN ── */
function toggleFullscreen() {
  const el = document.documentElement;
  if (!isFullscreen) {
    const rq = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
    if (rq) { rq.call(el); }
    // Fallback for WebView
    document.body.style.position = 'fixed';
    document.body.style.inset = '0';
    document.documentElement.classList.add('fs-mode');
    screen.orientation && screen.orientation.lock && screen.orientation.lock('landscape').catch(()=>{});
    isFullscreen = true;
    updateFsIcon();
  } else {
    const ex = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen;
    if (ex) { ex.call(document); }
    document.body.style.position = '';
    document.body.style.inset = '';
    document.documentElement.classList.remove('fs-mode');
    screen.orientation && screen.orientation.unlock && screen.orientation.unlock();
    isFullscreen = false;
    updateFsIcon();
  }
}
function updateFsIcon() {
  const el = document.getElementById('fsIcon');
  el.innerHTML = isFullscreen
    ? '<path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>'
    : '<path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>';
}
function syncFsState(active) {
  isFullscreen = !!active;
  document.documentElement.classList.toggle('fs-mode', isFullscreen);
  if (!isFullscreen) {
    document.body.style.position = '';
    document.body.style.inset = '';
    screen.orientation && screen.orientation.unlock && screen.orientation.unlock();
  }
  updateFsIcon();
}
document.addEventListener('fullscreenchange',       () => syncFsState(document.fullscreenElement));
document.addEventListener('webkitfullscreenchange', () => syncFsState(document.webkitFullscreenElement));

/* ── YOUTUBE PLAYER ── */
window.onYouTubeIframeAPIReady = function() { initPlayer(); };

function initPlayer() {
  if (!videoId) { showError('No video ID provided in the URL.'); return; }
  hideError();
  document.getElementById('endOverlay').classList.remove('show');
  document.getElementById('spinner').classList.add('show');

  if (player) {
    try { player.destroy(); } catch(_) {}
    player = null;
  }

  const div = document.createElement('div');
  div.id = 'yt-player';
  const cont = document.getElementById('yt-container');
  cont.innerHTML = '';
  cont.appendChild(div);

  player = new YT.Player('yt-player', {
    videoId: videoId,
    playerVars: {
      autoplay:       1,
      controls:       0,
      disablekb:      1,
      rel:            0,
      modestbranding: 1,
      playsinline:    1,
      iv_load_policy: 3,
      fs:             0,
      enablejsapi:    1,
      origin:         location.origin || '*',
    },
    events: {
      onReady:       onPlayerReady,
      onStateChange: onPlayerStateChange,
      onError:       onPlayerError,
    }
  });
}

function onPlayerReady(e) {
  document.getElementById('spinner').classList.remove('show');
  try {
    e.target.setPlaybackRate(currentSpeed);
    const dur = e.target.getDuration() || 0;
    document.getElementById('timeDisplay').innerHTML =
      '0:00 <span>/ ' + fmtTime(dur) + '</span>';
  } catch(_) {}
}

function onPlayerStateChange(e) {
  const S = YT.PlayerState;
  switch(e.data) {
    case S.PLAYING:
      setPlayIcon(true);
      document.getElementById('spinner').classList.remove('show');
      document.getElementById('endOverlay').classList.remove('show');
      startSeekInterval();
      hideError();
      break;
    case S.PAUSED:
      setPlayIcon(false);
      stopSeekInterval();
      updateSeekBar();
      break;
    case S.BUFFERING:
      document.getElementById('spinner').classList.add('show');
      break;
    case S.ENDED:
      setPlayIcon(false);
      stopSeekInterval();
      updateSeekBar();
      document.getElementById('spinner').classList.remove('show');
      showToast('Lecture completed ✅', 2000);
      document.getElementById('endOverlay').classList.add('show');
      break;
    case S.UNSTARTED:
    case S.CUED:
      document.getElementById('spinner').classList.remove('show');
      break;
  }
}

function replayLecture() {
  document.getElementById('endOverlay').classList.remove('show');
  if (player) {
    try { player.seekTo(0, true); player.playVideo(); } catch(_) {}
  }
}

function onPlayerError(e) {
  document.getElementById('spinner').classList.remove('show');
  const codes = {
    2:  'Invalid video ID.',
    5:  'Video cannot be played in this environment.',
    100:'Video not found or removed.',
    101:'Video embedding is disabled by the owner.',
    150:'Video embedding is disabled by the owner.',
  };
  showError(codes[e.data] || 'Video could not be loaded (Error ' + e.data + ').');
}

/* ── LOAD YT API ── */
(function loadYTAPI() {
  if (window.YT && window.YT.Player) { initPlayer(); return; }
  const s = document.createElement('script');
  s.src = 'https://www.youtube.com/iframe_api';
  s.onerror = () => showError('Player could not load. Check your internet connection.');
  document.head.appendChild(s);
})();

/* ── KEYBOARD ── */
document.addEventListener('keydown', e => {
  switch(e.key) {
    case ' ': case 'k': e.preventDefault(); togglePlay(); break;
    case 'ArrowLeft':   e.preventDefault(); skipBack();    break;
    case 'ArrowRight':  e.preventDefault(); skipForward(); break;
    case 'f':           toggleFullscreen(); break;
    case 'Escape':      if(isFullscreen) toggleFullscreen(); break;
  }
});

/* ── SWIPE BACK ── */
(function() {
  let sx=0, sy=0;
  document.addEventListener('touchstart', e => {
    if (!e.touches.length) return;
    sx = e.touches[0].clientX; sy = e.touches[0].clientY;
  }, {passive:true});
  document.addEventListener('touchend', e => {
    if (!e.changedTouches.length) return;
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    if (Math.abs(dx) > Math.abs(dy) && dx > 90 && sx < 60 && !isFullscreen) goBack();
  }, {passive:true});
})();
</script>
