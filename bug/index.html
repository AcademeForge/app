<!DOCTYPE html>
<html lang="en">
<head>
<script>
!function(){
  document.documentElement.setAttribute('data-theme',
    localStorage.getItem('af_dark_mode')==='1'?'dark':'light');
}();
</script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#4f46e5"/>
<title>My Bug Reports · AcademeForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Sora:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════════════════════
   DESIGN TOKENS — lightweight (no blur, fewer shadows)
   ════════════════════════════════════════════════════════ */
:root {
  --p:#4f46e5;--p2:#3730a3;
  --acc:#06b6d4;--ok:#22c55e;--err:#ef4444;--warn:#f59e0b;
  --bg:#eef0fb;--surface:#fff;--card:#fff;
  --inp:#f4f5fb;
  --grp:rgba(79,70,229,0.06);--grph:rgba(79,70,229,0.12);
  --t1:#0f0e2a;--t2:#4b5563;--tm:#9ca3af;
  --b1:rgba(79,70,229,0.12);--bc:rgba(79,70,229,0.16);
  --sh:0 1px 6px rgba(15,14,42,0.06);
  --r2:12px;--r3:18px;--r4:20px;--rf:9999px;
  --fd:'Sora',sans-serif;--fb:'Nunito',sans-serif;
  --hdr-h:56px;--shell:430px;
  --dur:120ms;

  --s-open:#f59e0b;   --s-open-bg:rgba(245,158,11,.10);  --s-open-bd:rgba(245,158,11,.25);
  --s-prog:#3b82f6;   --s-prog-bg:rgba(59,130,246,.10);  --s-prog-bd:rgba(59,130,246,.25);
  --s-res:#22c55e;    --s-res-bg:rgba(34,197,94,.10);    --s-res-bd:rgba(34,197,94,.25);
  --s-rej:#ef4444;    --s-rej-bg:rgba(239,68,68,.10);    --s-rej-bd:rgba(239,68,68,.25);
  --s-cls:#6b7280;    --s-cls-bg:rgba(107,114,128,.10);  --s-cls-bd:rgba(107,114,128,.25);

  --pr-low:#22c55e;  --pr-low-bg:rgba(34,197,94,.09);
  --pr-med:#f59e0b;  --pr-med-bg:rgba(245,158,11,.09);
  --pr-hi:#ef4444;   --pr-hi-bg:rgba(239,68,68,.09);
  --pr-crit:#7c3aed; --pr-crit-bg:rgba(124,58,237,.09);
}

[data-theme="dark"] {
  --bg:#0b0a1e;--surface:#100e26;--card:#15122e;
  --inp:#1a1735;
  --grp:rgba(129,140,248,0.08);--grph:rgba(129,140,248,0.15);
  --t1:#ede9ff;--t2:#a09dbf;--tm:#635f83;
  --b1:rgba(129,140,248,0.12);--bc:rgba(129,140,248,0.18);
  --sh:0 1px 6px rgba(0,0,0,0.25);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:15px;-webkit-text-size-adjust:100%;}
body{
  font-family:var(--fb);background:var(--bg);color:var(--t1);
  display:flex;justify-content:center;min-height:100vh;
}
button{font-family:var(--fb);cursor:pointer;border:none;background:none;color:inherit;}
a{text-decoration:none;color:inherit;}
input,select,textarea{font-family:var(--fb);}

.shell{
  width:100%;max-width:var(--shell);min-height:100vh;
  background:var(--surface);display:flex;flex-direction:column;
}
@media(min-width:700px){
  body{padding:24px 0;min-height:100vh;}
  .shell{border-radius:20px;box-shadow:0 4px 24px rgba(79,70,229,.10);min-height:calc(100vh - 48px);}
}

/* ── Header ── */
.hdr{
  position:sticky;top:0;z-index:100;height:var(--hdr-h);
  background:var(--surface);border-bottom:1px solid var(--b1);
  display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;
}
.hdr-back,.hdr-refresh{
  width:32px;height:32px;border-radius:10px;background:var(--grp);
  border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:background var(--dur);
}
.hdr-back:hover,.hdr-refresh:hover{background:var(--grph);}
.hdr-title{flex:1;font-family:var(--fd);font-size:15px;font-weight:800;color:var(--t1);}
.hdr-refresh.spinning{animation:spin .7s linear infinite;}

/* ── Page ── */
.page{
  flex:1;padding:14px 13px 28px;
}

/* ── Tabs ── */
.tab-bar{
  display:flex;gap:6px;background:var(--grp);border:1px solid var(--b1);
  border-radius:var(--r3);padding:5px;margin-bottom:14px;
}
.tab-btn{
  flex:1;padding:9px 6px;border-radius:var(--r2);font-size:12px;font-weight:800;
  color:var(--tm);transition:background var(--dur),color var(--dur);text-align:center;
}
.tab-btn.active{background:var(--surface);color:var(--p);box-shadow:var(--sh);}

/* ── Summary strip ── */
.summary-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.sum-cell{
  background:var(--card);border:1px solid var(--bc);border-radius:var(--r3);
  padding:11px 8px;text-align:center;
}
.sum-cell .num{font-family:var(--fd);font-size:20px;font-weight:900;color:var(--p);line-height:1;}
.sum-cell .lbl{font-size:9.5px;font-weight:800;color:var(--tm);text-transform:uppercase;letter-spacing:.05em;margin-top:3px;}

/* ── Controls ── */
.controls{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.search-row{
  display:flex;align-items:center;gap:8px;background:var(--inp);
  border:1.5px solid var(--bc);border-radius:var(--rf);padding:9px 14px;
}
.search-row input{flex:1;background:none;border:none;outline:none;color:var(--t1);font-size:13px;font-weight:700;}
.search-row input::placeholder{color:var(--tm);}
.search-icon{font-size:15px;color:var(--tm);flex-shrink:0;}
.filter-sort{display:flex;gap:8px;}
.fs-sel{
  flex:1;padding:9px 10px;border-radius:var(--rf);background:var(--inp);
  border:1.5px solid var(--bc);color:var(--t1);font-size:12px;font-weight:700;
  outline:none;-webkit-appearance:none;appearance:none;cursor:pointer;
}

/* ── Skeleton ── */
.skeleton-card{
  border-radius:var(--r4);background:var(--card);border:1px solid var(--bc);
  height:120px;margin-bottom:10px;
}

/* ── Report card ── */
.report-card{
  border-radius:var(--r4);background:var(--card);border:1px solid var(--bc);
  box-shadow:var(--sh);overflow:hidden;margin-bottom:10px;
}
.rc-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px 9px;border-bottom:1px solid var(--b1);gap:8px;
}
.rc-cat{font-family:var(--fd);font-size:12px;font-weight:800;color:var(--t1);display:flex;align-items:center;gap:6px;}
.rc-cat-icon{font-size:17px;}
.rc-id{font-size:9.5px;font-weight:700;color:var(--tm);font-family:monospace;display:flex;align-items:center;gap:5px;}
.rc-copy{
  font-size:12px;color:var(--p);padding:3px 7px;border-radius:6px;
  background:rgba(79,70,229,.08);border:1px solid rgba(79,70,229,.16);
}
.rc-body{padding:11px 14px;display:flex;flex-direction:column;gap:8px;}
.rc-badges{display:flex;flex-wrap:wrap;gap:6px;}
.badge{font-size:10.5px;font-weight:800;padding:4px 10px;border-radius:var(--rf);letter-spacing:.03em;flex-shrink:0;}
.badge.s-open{color:var(--s-open);background:var(--s-open-bg);border:1px solid var(--s-open-bd);}
.badge.s-in_progress{color:var(--s-prog);background:var(--s-prog-bg);border:1px solid var(--s-prog-bd);}
.badge.s-resolved{color:var(--s-res);background:var(--s-res-bg);border:1px solid var(--s-res-bd);}
.badge.s-rejected{color:var(--s-rej);background:var(--s-rej-bg);border:1px solid var(--s-rej-bd);}
.badge.s-closed{color:var(--s-cls);background:var(--s-cls-bg);border:1px solid var(--s-cls-bd);}
.badge.pr-low{color:var(--pr-low);background:var(--pr-low-bg);border:1px solid rgba(34,197,94,.22);}
.badge.pr-medium{color:var(--pr-med);background:var(--pr-med-bg);border:1px solid rgba(245,158,11,.22);}
.badge.pr-high{color:var(--pr-hi);background:var(--pr-hi-bg);border:1px solid rgba(239,68,68,.22);}
.badge.pr-critical{color:var(--pr-crit);background:var(--pr-crit-bg);border:1px solid rgba(124,58,237,.22);}
.rc-note{
  font-size:12px;font-weight:700;color:var(--t2);background:var(--grp);
  border-radius:var(--r2);padding:8px 11px;border-left:3px solid var(--p);line-height:1.5;
}
.rc-meta{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.rc-meta-item{font-size:10.5px;color:var(--tm);font-weight:700;display:flex;align-items:center;gap:4px;}
.rc-flags{display:flex;gap:6px;flex-wrap:wrap;}
.flag{font-size:10px;font-weight:800;padding:3px 8px;border-radius:var(--rf);}
.flag.read{color:var(--ok);background:rgba(34,197,94,.09);border:1px solid rgba(34,197,94,.22);}
.flag.unread{color:var(--tm);background:var(--grp);border:1px solid var(--b1);}
.flag.solved{color:var(--ok);background:rgba(34,197,94,.09);border:1px solid rgba(34,197,94,.22);}
.flag.pending{color:var(--warn);background:rgba(245,158,11,.09);border:1px solid rgba(245,158,11,.22);}

/* ── Submit form ── */
.form-card{
  border-radius:var(--r4);background:var(--card);border:1px solid var(--bc);
  box-shadow:var(--sh);overflow:hidden;margin-bottom:12px;
}
.form-card-head{display:flex;align-items:center;gap:10px;padding:14px 16px 12px;border-bottom:1px solid var(--b1);}
.form-card-icon{
  width:36px;height:36px;border-radius:11px;flex-shrink:0;
  background:linear-gradient(135deg,var(--p),var(--acc));
  display:flex;align-items:center;justify-content:center;font-size:17px;
}
.form-card-title{font-family:var(--fd);font-size:13.5px;font-weight:800;color:var(--t1);}
.form-card-sub{font-size:11px;color:var(--tm);font-weight:600;margin-top:1px;}
.form-body{padding:16px;display:flex;flex-direction:column;gap:13px;}
.f-field{display:flex;flex-direction:column;gap:5px;}
.f-label{font-size:11px;font-weight:800;color:var(--t1);text-transform:uppercase;letter-spacing:.05em;}
.f-req{color:var(--err);margin-left:2px;}
.f-input,.f-select,.f-textarea{
  width:100%;padding:11px 13px;border-radius:var(--r2);background:var(--inp);
  border:1.5px solid var(--bc);color:var(--t1);font-size:13.5px;font-weight:700;
  outline:none;transition:border-color var(--dur);
}
.f-input:focus,.f-select:focus,.f-textarea:focus{border-color:var(--p);}
.f-input::placeholder,.f-textarea::placeholder{color:var(--tm);}
.f-textarea{resize:vertical;min-height:90px;line-height:1.55;}
.f-select{-webkit-appearance:none;appearance:none;cursor:pointer;}
.f-hint{font-size:10.5px;color:var(--tm);font-weight:600;}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.f-msg{font-size:12px;font-weight:700;min-height:14px;}
.f-msg.ok{color:var(--ok);}
.f-msg.err{color:var(--err);}
.submit-btn{
  width:100%;padding:13px;border-radius:var(--r2);
  background:linear-gradient(135deg,var(--p),var(--p2));
  color:#fff;font-weight:900;font-size:14px;
  transition:opacity var(--dur);
}
.submit-btn:active{opacity:.85;}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;}

/* ── States ── */
.state-box{text-align:center;padding:36px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;}
.state-emoji{font-size:44px;line-height:1;}
.state-title{font-family:var(--fd);font-size:16px;font-weight:900;color:var(--t1);}
.state-sub{font-size:13px;color:var(--tm);font-weight:700;max-width:280px;text-align:center;line-height:1.5;}
.state-btn{
  margin-top:6px;padding:10px 22px;border-radius:var(--rf);
  background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;
  font-weight:900;font-size:13px;
}

/* ── Pagination ── */
.pag-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:6px;}
.pag-btn{
  padding:9px 18px;border-radius:var(--rf);font-size:12px;font-weight:800;
  background:var(--grp);border:1px solid var(--b1);color:var(--t1);
}
.pag-btn:disabled{opacity:.4;cursor:not-allowed;}
.pag-info{font-size:12px;font-weight:700;color:var(--tm);}

/* ── Toast ── */
.toast-wrap{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:999999;width:min(92vw,400px);pointer-events:none;}
.toast{
  display:flex;align-items:flex-start;gap:10px;background:var(--surface);
  color:var(--t1);border:1px solid var(--bc);border-radius:14px;
  padding:11px 13px;box-shadow:0 4px 18px rgba(0,0,0,.12);pointer-events:auto;
}
.toast.ok{border-left:3px solid var(--ok);}
.toast.info{border-left:3px solid var(--p);}
.toast.err{border-left:3px solid var(--err);}
.toast.warn{border-left:3px solid var(--warn);}
.toast-body p:first-child{font-size:12px;font-weight:800;}
.toast-body p:last-child{font-size:11px;color:var(--t2);margin-top:1px;}
.toast-x{font-size:16px;color:var(--tm);cursor:pointer;margin-left:auto;}

@keyframes spin{to{transform:rotate(360deg);}}
.hidden{display:none!important;}
</style>
</head>
<body>

<div class="shell" id="shell">

  <header class="hdr">
    <button class="hdr-back" onclick="goBack()" aria-label="Go back">←</button>
    <span class="hdr-title" id="hdrTitle">My Bug Reports</span>
    <button class="hdr-refresh hidden" id="refreshBtn" onclick="onRefresh()" aria-label="Refresh">↻</button>
  </header>

  <div class="page" id="mainPage">

    <div class="tab-bar" id="tabBar">
      <button class="tab-btn active" id="tabSubmit" onclick="switchTab('submit')">🐛 Report a Bug</button>
      <button class="tab-btn" id="tabStatus" onclick="switchTab('status')">📋 My Reports</button>
    </div>

    <!-- SUBMIT PANEL -->
    <div id="panelSubmit">
      <div class="form-card">
        <div class="form-card-head">
          <div class="form-card-icon">🐛</div>
          <div>
            <div class="form-card-title">Report a Bug</div>
            <div class="form-card-sub">Help us improve AcademeForge</div>
          </div>
        </div>
        <div class="form-body">

          <div class="f-row">
            <div class="f-field">
              <label class="f-label">Your Name<span class="f-req">*</span></label>
              <input id="fName" class="f-input" type="text" placeholder="Full name" maxlength="80" autocomplete="name"/>
            </div>
            <div class="f-field">
              <label class="f-label">Email<span class="f-req">*</span></label>
              <input id="fEmail" class="f-input" type="email" placeholder="you@example.com" maxlength="120" autocomplete="email"/>
            </div>
          </div>

          <div class="f-row">
            <div class="f-field">
              <label class="f-label">Category<span class="f-req">*</span></label>
              <select id="fCategory" class="f-select">
                <option value="">Select…</option>
                <option value="login">Login</option>
                <option value="navigation">Navigation</option>
                <option value="dark_mode">Dark Mode</option>
                <option value="notification">Notification</option>
                <option value="payment">Payment</option>
                <option value="ui">UI / Design</option>
                <option value="performance">Performance</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="f-field">
              <label class="f-label">Priority</label>
              <select id="fPriority" class="f-select">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
                <option value="critical">Critical</option>
              </select>
            </div>
          </div>

          <div class="f-field">
            <label class="f-label">Description<span class="f-req">*</span></label>
            <textarea id="fDescription" class="f-textarea" rows="4"
              placeholder="Describe the bug in detail. What happened? What did you expect? (10–1200 chars)"
              maxlength="1200"></textarea>
            <span class="f-hint" id="descCount">0 / 1200</span>
          </div>

          <div class="f-field">
            <label class="f-label">Steps to Reproduce</label>
            <textarea id="fSteps" class="f-textarea" rows="3"
              placeholder="1. Go to…&#10;2. Click on…&#10;3. See error"
              maxlength="1200"></textarea>
          </div>

          <div id="submitMsg" class="f-msg"></div>
          <button id="submitBtn" class="submit-btn" onclick="submitReport()">Submit Bug Report</button>

        </div>
      </div>
    </div><!-- /panelSubmit -->

    <!-- STATUS PANEL -->
    <div id="panelStatus" class="hidden">

      <div class="summary-strip" id="summaryStrip" style="display:none;">
        <div class="sum-cell"><div class="num" id="sumTotal">0</div><div class="lbl">Total</div></div>
        <div class="sum-cell"><div class="num" id="sumOpen" style="color:var(--s-open)">0</div><div class="lbl">Open</div></div>
        <div class="sum-cell"><div class="num" id="sumProg" style="color:var(--s-prog)">0</div><div class="lbl">In Progress</div></div>
        <div class="sum-cell"><div class="num" id="sumRes" style="color:var(--s-res)">0</div><div class="lbl">Resolved</div></div>
      </div>

      <div class="controls" id="controls" style="display:none;">
        <div class="search-row">
          <span class="search-icon">🔍</span>
          <input id="searchInp" type="text" placeholder="Search by category or status…" oninput="onSearch()" aria-label="Search reports"/>
        </div>
        <div class="filter-sort">
          <select id="filterSel" class="fs-sel" onchange="onFilter()" aria-label="Filter by status">
            <option value="">All Statuses</option>
            <option value="open">Open</option>
            <option value="in_progress">In Progress</option>
            <option value="resolved">Resolved</option>
            <option value="closed">Closed</option>
            <option value="rejected">Rejected</option>
          </select>
          <select id="sortSel" class="fs-sel" onchange="onSort()" aria-label="Sort reports">
            <option value="desc">Newest First</option>
            <option value="asc">Oldest First</option>
          </select>
        </div>
      </div>

      <div id="statusContent"></div>

      <div class="pag-row hidden" id="pagRow">
        <button class="pag-btn" id="pagPrev" onclick="goPage(-1)" disabled>← Prev</button>
        <span class="pag-info" id="pagInfo"></span>
        <button class="pag-btn" id="pagNext" onclick="goPage(1)">Next →</button>
      </div>

    </div><!-- /panelStatus -->

  </div><!-- /mainPage -->

  <!-- SESSION EXPIRED -->
  <div id="sessionScreen" class="state-box hidden" style="flex:1;display:flex;align-items:center;justify-content:center;">
    <div>
      <div class="state-emoji">🔐</div>
      <div class="state-title">Session Expired</div>
      <div class="state-sub">We couldn't find your account details. Please log in again to continue.</div>
      <button class="state-btn" onclick="window.location.href='../student/index.html'">Log In Again</button>
    </div>
  </div>

</div><!-- /shell -->

<div class="toast-wrap" id="toastWrap"></div>

<script>
'use strict';

/* CONFIG */
const API_BASE = 'https://afooyyydhlwngzssgqih.supabase.co/functions/v1/bug-reports-unified';
const SUBMIT_URL = API_BASE;
const STATUS_URL = API_BASE + '/status';

const CACHE_KEY = 'af_bug_reports_cache_v1';
const CACHE_TTL = 10 * 60 * 1000;
const PAGE_LIMIT = 20;

/* STATE */
let currentTab   = 'submit';
let allReports   = [];
let filteredList = [];
let currentPage  = 1;
let isLoading    = false;

/* UTILS */
const $  = id => document.getElementById(id);
const esc = t  => String(t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function fmtDate(iso) {
  if (!iso) return '—';
  try {
    return new Date(iso).toLocaleString('en-IN', {
      day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit', hour12:true,
    });
  } catch { return iso; }
}
function relTime(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  const d = Math.floor(h / 24);
  if (d < 30) return `${d}d ago`;
  return fmtDate(iso).split(',')[0];
}

/* THEME */
function syncTheme() {
  const dark = localStorage.getItem('af_dark_mode') === '1';
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
}
syncTheme();
window.addEventListener('storage', e => { if (e.key === 'af_dark_mode') syncTheme(); });

/* TOAST */
let _toastTimer = null;
function showToast(msg, type = 'info', title = '') {
  const wrap = $('toastWrap');
  wrap.innerHTML = '';
  if (_toastTimer) { clearTimeout(_toastTimer); _toastTimer = null; }
  const labels = { ok: 'Done', info: 'Info', err: 'Error', warn: 'Notice' };
  const div = document.createElement('div');
  div.className = 'toast ' + type;
  div.innerHTML = `<div class="toast-body"><p>${title || labels[type] || 'Info'}</p><p>${esc(msg)}</p></div>
    <span class="toast-x" onclick="this.parentElement.remove()">×</span>`;
  wrap.appendChild(div);
  _toastTimer = setTimeout(() => div && div.remove(), 3200);
}

/* CACHE — namespaced per student_uuid */
function cacheKeyFor(uuid) { return CACHE_KEY + ':' + (uuid || 'anon'); }
function cacheSet(uuid, data) {
  try { localStorage.setItem(cacheKeyFor(uuid), JSON.stringify({ ts: Date.now(), data })); } catch(_) {}
}
function cacheGet(uuid) {
  try {
    const raw = localStorage.getItem(cacheKeyFor(uuid));
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (Date.now() - obj.ts > CACHE_TTL) return null;
    return obj.data;
  } catch { return null; }
}
function cacheClear(uuid) {
  try { localStorage.removeItem(cacheKeyFor(uuid)); } catch(_) {}
}

/* SESSION
   Both `uuid` and `email` are sent to /status. The backend validates their
   format and uses the pair to determine ownership of bug reports — no JWT
   is used, matching the existing AcademeForge session model. */
function getSession() {
  return {
    loggedIn:  localStorage.getItem('af_student_logged_in') === 'true',
    uuid:      localStorage.getItem('af_student_uuid')  || '',
    id:        localStorage.getItem('af_student_id')    || '',
    email:     localStorage.getItem('af_student_email') || '',
    name:      localStorage.getItem('af_student_name')  || '',
    mobile:    localStorage.getItem('af_student_mobile') || localStorage.getItem('af_student_phone') || '',
  };
}

/* TAB SWITCHING */
function switchTab(tab) {
  currentTab = tab;
  $('tabSubmit').classList.toggle('active', tab === 'submit');
  $('tabStatus').classList.toggle('active', tab === 'status');
  $('panelSubmit').classList.toggle('hidden', tab !== 'submit');
  $('panelStatus').classList.toggle('hidden', tab !== 'status');
  $('refreshBtn').classList.toggle('hidden', tab !== 'status');
  $('hdrTitle').textContent = tab === 'submit' ? 'Report a Bug' : 'My Reports';
  if (tab === 'status') loadStatus(false);
}

/* COPY ID */
function copyId(id) {
  navigator.clipboard.writeText(id).then(() => {
    showToast('Report ID copied to clipboard.', 'ok', 'Copied!');
  }).catch(() => {
    showToast('Could not copy. Please copy manually: ' + id, 'warn', 'Manual copy');
  });
}

/* META */
const CAT_META = {
  login:        { icon: '🔐', label: 'Login' },
  navigation:   { icon: '🧭', label: 'Navigation' },
  dark_mode:    { icon: '🌙', label: 'Dark Mode' },
  notification: { icon: '🔔', label: 'Notification' },
  payment:      { icon: '💳', label: 'Payment' },
  ui:           { icon: '🎨', label: 'UI / Design' },
  performance:  { icon: '⚡', label: 'Performance' },
  other:        { icon: '🔧', label: 'Other' },
};
function catLabel(cat) { return CAT_META[cat] || { icon: '🐛', label: cat || 'Unknown' }; }

const STATUS_LABEL = {
  open: 'Open', in_progress: 'In Progress', resolved: 'Resolved', rejected: 'Rejected', closed: 'Closed',
};
const PRIORITY_LABEL = {
  low: 'Low Priority', medium: 'Medium Priority', high: 'High Priority', critical: 'Critical',
};

/* RENDER CARD */
function renderCard(r) {
  const cat   = catLabel(r.category);
  const sKey  = (r.status || 'open').toLowerCase().replace(/\s+/g,'_');
  const prKey = (r.priority || 'medium').toLowerCase();
  const shortId = (r.id || '').toString().slice(0, 8).toUpperCase();

  return `
  <div class="report-card">
    <div class="rc-head">
      <div class="rc-cat"><span class="rc-cat-icon">${esc(cat.icon)}</span>${esc(cat.label)}</div>
      <div class="rc-id">
        <span>#${esc(shortId)}</span>
        <button class="rc-copy" onclick="copyId('${esc(r.id || '')}')" aria-label="Copy report ID">⎘</button>
      </div>
    </div>
    <div class="rc-body">
      <div class="rc-badges">
        <span class="badge s-${sKey}">${esc(STATUS_LABEL[sKey] || sKey)}</span>
        <span class="badge pr-${prKey}">${esc(PRIORITY_LABEL[prKey] || prKey)}</span>
      </div>
      ${r.status_note ? `<div class="rc-note">💬 ${esc(r.status_note)}</div>` : ''}
      <div class="rc-flags">
        <span class="flag ${r.team_read ? 'read' : 'unread'}">${r.team_read ? '✓ Seen by Team' : '⏳ Pending Review'}</span>
        <span class="flag ${r.request_solved ? 'solved' : 'pending'}">${r.request_solved ? '✅ Solved' : '🔄 In Process'}</span>
      </div>
      <div class="rc-meta">
        <span class="rc-meta-item">📅 ${esc(relTime(r.created_at))}</span>
        ${r.updated_at && r.updated_at !== r.created_at ? `<span class="rc-meta-item">🔄 Updated ${esc(relTime(r.updated_at))}</span>` : ''}
      </div>
    </div>
  </div>`;
}

function renderSkeletons(n = 3) {
  let html = '';
  for (let i = 0; i < n; i++) html += `<div class="skeleton-card"></div>`;
  return html;
}

/* FILTER / SEARCH / SORT */
function applyFilters() {
  const query  = ($('searchInp').value || '').toLowerCase().trim();
  const status = $('filterSel').value;
  const order  = $('sortSel').value;

  filteredList = allReports.filter(r => {
    if (status && r.status !== status) return false;
    if (query) {
      const haystack = [r.category, r.status, r.priority, r.status_note].join(' ').toLowerCase();
      if (!haystack.includes(query)) return false;
    }
    return true;
  });

  filteredList.sort((a, b) => {
    const ta = new Date(a.created_at).getTime();
    const tb = new Date(b.created_at).getTime();
    return order === 'asc' ? ta - tb : tb - ta;
  });
}

function updateSummary(reports) {
  if (!reports || !reports.length) { $('summaryStrip').style.display = 'none'; return; }
  $('summaryStrip').style.display = '';
  $('sumTotal').textContent = reports.length;
  $('sumOpen').textContent  = reports.filter(r => r.status === 'open').length;
  $('sumProg').textContent  = reports.filter(r => r.status === 'in_progress').length;
  $('sumRes').textContent   = reports.filter(r => r.status === 'resolved').length;
}

function renderStatusList() {
  const content = $('statusContent');
  applyFilters();

  if (!filteredList.length) {
    const hasData = allReports.length > 0;
    content.innerHTML = `
      <div class="state-box">
        <div class="state-emoji">${hasData ? '🔍' : '📭'}</div>
        <div class="state-title">${hasData ? 'No Matches Found' : 'No Reports Yet'}</div>
        <div class="state-sub">${hasData
          ? 'Try changing your filter or search term.'
          : 'You haven\'t submitted any bug reports yet. Switch to "Report a Bug" to get started!'
        }</div>
        ${!hasData ? `<button class="state-btn" onclick="switchTab('submit')">Report a Bug →</button>` : ''}
      </div>`;
    $('pagRow').classList.add('hidden');
    return;
  }

  const totalPages = Math.ceil(filteredList.length / PAGE_LIMIT);
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * PAGE_LIMIT;
  const slice = filteredList.slice(start, start + PAGE_LIMIT);

  content.innerHTML = slice.map(r => renderCard(r)).join('');

  if (filteredList.length > PAGE_LIMIT) {
    $('pagRow').classList.remove('hidden');
    $('pagPrev').disabled = currentPage <= 1;
    $('pagNext').disabled = currentPage >= totalPages;
    $('pagInfo').textContent = `Page ${currentPage} of ${totalPages}`;
  } else {
    $('pagRow').classList.add('hidden');
  }
}

/* LOAD STATUS — auth via (student_uuid, email) pair */
async function loadStatus(forceRefresh = false) {
  if (isLoading) return;

  const session = getSession();
  const content = $('statusContent');

  if (!session.uuid || !session.email) {
    content.innerHTML = `
      <div class="state-box">
        <div class="state-emoji">🔐</div>
        <div class="state-title">Login Required</div>
        <div class="state-sub">Your session doesn't have valid account details. Please log in again.</div>
        <button class="state-btn" onclick="window.location.href='../student/index.html'">Log In</button>
      </div>`;
    return;
  }

  if (!forceRefresh) {
    const cached = cacheGet(session.uuid);
    if (cached) {
      allReports = cached;
      updateSummary(allReports);
      $('controls').style.display = '';
      renderStatusList();
      silentRefresh(session);
      return;
    }
  }

  isLoading = true;
  content.innerHTML = renderSkeletons(3);
  $('controls').style.display = 'none';
  $('summaryStrip').style.display = 'none';
  $('pagRow').classList.add('hidden');
  setRefreshSpinning(true);

  try {
    const reports = await fetchReports(session);
    allReports = reports;
    cacheSet(session.uuid, reports);
    updateSummary(allReports);
    $('controls').style.display = '';
    currentPage = 1;
    renderStatusList();
  } catch (err) {
    if (err.code === 401) {
      content.innerHTML = `
        <div class="state-box">
          <div class="state-emoji">🔐</div>
          <div class="state-title">Session Expired</div>
          <div class="state-sub">${esc(err.message || 'Please log in again to view your reports.')}</div>
          <button class="state-btn" onclick="window.location.href='../student/index.html'">Log In Again</button>
        </div>`;
    } else {
      content.innerHTML = `
        <div class="state-box">
          <div class="state-emoji">📡</div>
          <div class="state-title">Could Not Load Reports</div>
          <div class="state-sub">${esc(err.message || 'A network error occurred. Please check your connection.')}</div>
          <button class="state-btn" onclick="loadStatus(true)">Try Again</button>
        </div>`;
    }
    showToast(err.message || 'Failed to load reports.', 'err', 'Error');
  } finally {
    isLoading = false;
    setRefreshSpinning(false);
  }
}

async function silentRefresh(session) {
  try {
    const reports = await fetchReports(session);
    allReports = reports;
    cacheSet(session.uuid, reports);
    updateSummary(allReports);
    $('controls').style.display = '';
    renderStatusList();
  } catch { /* silent */ }
}

/** API call with timeout + one retry. Sends student_uuid + email only. */
async function fetchReports(session, attempt = 1) {
  const MAX_ATTEMPTS = 2;
  const TIMEOUT_MS   = 12000;

  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), TIMEOUT_MS);

  try {
    const res = await fetch(STATUS_URL, {
      method:  'POST',
      signal:  controller.signal,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        student_uuid: session.uuid,
        email: session.email,
        limit: 100,
        page: 1,
      }),
    });

    clearTimeout(timer);
    let data;
    try { data = await res.json(); } catch { data = {}; }

    if (res.status === 401) {
      const e = new Error(data.message || 'Authentication required. Please log in again.');
      e.code = 401;
      throw e;
    }
    if (res.status === 429) throw new Error(data.message || 'Too many requests. Please wait a moment and try again.');
    if (!res.ok)            throw new Error(data.message || `Server error (${res.status}).`);
    if (!data.success)      throw new Error(data.message || 'Unexpected server response.');

    return Array.isArray(data.reports) ? data.reports : [];

  } catch (err) {
    clearTimeout(timer);
    if (err.code === 401) throw err;
    if (err.name === 'AbortError') throw new Error('Request timed out. Please check your connection.');
    if (attempt < MAX_ATTEMPTS) {
      await new Promise(r => setTimeout(r, attempt * 800));
      return fetchReports(session, attempt + 1);
    }
    throw err;
  }
}

/* FILTER / SEARCH / SORT HANDLERS */
let _searchDebounce = null;
function onSearch() {
  clearTimeout(_searchDebounce);
  _searchDebounce = setTimeout(() => { currentPage = 1; renderStatusList(); }, 200);
}
function onFilter() { currentPage = 1; renderStatusList(); }
function onSort()   { currentPage = 1; renderStatusList(); }

function goPage(dir) {
  currentPage = Math.max(1, currentPage + dir);
  renderStatusList();
  $('statusContent').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* REFRESH */
function setRefreshSpinning(on) { $('refreshBtn').classList.toggle('spinning', on); }
function onRefresh() {
  const session = getSession();
  cacheClear(session.uuid);
  currentPage = 1;
  loadStatus(true);
  showToast('Refreshing your reports…', 'info', 'Refreshing');
}

/* SUBMIT REPORT — sends student_uuid so the row can be tied to this account */
async function submitReport() {
  const btn = $('submitBtn');
  const msg = $('submitMsg');

  const name        = ($('fName').value        || '').trim();
  const email       = ($('fEmail').value        || '').trim().toLowerCase();
  const category    = $('fCategory').value;
  const priority    = $('fPriority').value || 'medium';
  const description = ($('fDescription').value || '').trim();
  const steps       = ($('fSteps').value        || '').trim();

  const setMsg = (type, text) => {
    msg.className = 'f-msg' + (type ? ' ' + type : '');
    msg.textContent = text;
  };

  if (!name || name.length < 2)  { setMsg('err', 'Please enter your full name (min. 2 characters).'); return; }
  if (!email || !email.includes('@')) { setMsg('err', 'Please enter a valid email address.'); return; }
  if (!category)                 { setMsg('err', 'Please select a bug category.'); return; }
  if (description.length < 10)  { setMsg('err', 'Description must be at least 10 characters.'); return; }

  btn.disabled = true;
  setMsg('', 'Submitting your report…');

  try {
    const session = getSession();
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 15000);

    const res = await fetch(SUBMIT_URL, {
      method:  'POST',
      signal:  controller.signal,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        reporterName:    name,
        reporterEmail:   email,
        category,
        priority,
        description,
        stepsToReproduce: steps,
        pageUrl:         location.href,
        activeSection:   'bug-reports',
        student_uuid:    session.uuid || null,
        deviceInfo: {
          userAgent:        navigator.userAgent,
          language:         navigator.language,
          platform:         navigator.platform,
          viewportWidth:    window.innerWidth,
          viewportHeight:   window.innerHeight,
          devicePixelRatio: window.devicePixelRatio,
          timezone:         Intl.DateTimeFormat().resolvedOptions().timeZone,
          online:           navigator.onLine,
        },
      }),
    });

    clearTimeout(timer);
    let data;
    try { data = await res.json(); } catch { data = {}; }

    if (!res.ok || !data.ok) throw new Error(data.error || `Submission failed (${res.status}).`);

    setMsg('ok', `✓ Report submitted! ID: #${(data.reportId || '').toString().slice(0,8).toUpperCase()}`);
    showToast('Your bug report has been submitted. Thank you!', 'ok', 'Submitted!');

    $('fDescription').value = '';
    $('fSteps').value = '';
    $('fCategory').value = '';
    $('descCount').textContent = '0 / 1200';

    cacheClear(session.uuid);

    setTimeout(() => { switchTab('status'); }, 2200);

  } catch (err) {
    if (err.name === 'AbortError') {
      setMsg('err', 'Request timed out. Please check your connection and try again.');
    } else {
      setMsg('err', err.message || 'Submission failed. Please try again.');
    }
    showToast(err.message || 'Submission failed.', 'err', 'Error');
  } finally {
    btn.disabled = false;
  }
}

/* DESCRIPTION COUNTER */
function initDescCounter() {
  const ta  = $('fDescription');
  const cnt = $('descCount');
  if (!ta || !cnt) return;
  ta.addEventListener('input', () => {
    const len = ta.value.length;
    cnt.textContent = `${len} / 1200`;
    cnt.style.color = len > 1100 ? 'var(--err)' : 'var(--tm)';
  });
}

function goBack() { window.history.back(); }

/* INIT */
document.addEventListener('DOMContentLoaded', () => {
  const session = getSession();

  if (!session.loggedIn) {
    window.location.href = '../student/index.html';
    return;
  }

  // Both uuid and email are required — they're the only values the
  // backend accepts for /status.
  if (!session.uuid || !session.email) {
    $('mainPage').classList.add('hidden');
    $('sessionScreen').classList.remove('hidden');
    return;
  }

  if (session.name)  $('fName').value  = session.name;
  if (session.email) $('fEmail').value = session.email;

  initDescCounter();
  switchTab('submit');
});
</script>
