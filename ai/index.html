<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function(){
  document.documentElement.setAttribute('data-theme',
    localStorage.getItem('af_dark_mode')==='1'?'dark':'light');
})();
</script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#6366f1"/>
<title>AF Nexus · AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --p:#6366f1;--p2:#4f46e5;--p3:#4338ca;--pl:#a5b4fc;
  --acc:#0ea5e9;--acc2:#0284c7;--rose:#f43f5e;--amber:#f59e0b;
  --ok:#10b981;--err:#ef4444;--dev:#f97316;
  --bg:#eef0fb;--surface:#ffffff;--card:rgba(255,255,255,.92);
  --nav:rgba(255,255,255,.94);--inp:#f3f4fd;--grp:rgba(99,102,241,.07);
  --t1:#0f0e23;--t2:#4b5569;--tm:#9499b7;
  --b1:rgba(99,102,241,.11);--bc:rgba(99,102,241,.16);--bi:#d4d7f0;
  --sh:0 2px 16px rgba(99,102,241,.09),0 1px 3px rgba(0,0,0,.05);
  --she:0 10px 40px rgba(99,102,241,.16),0 2px 8px rgba(0,0,0,.07);
  --shb:0 4px 18px rgba(99,102,241,.32);
  --r1:8px;--r2:12px;--r3:18px;--r4:26px;--rf:9999px;
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Plus Jakarta Sans',sans-serif;
  --nav-h:64px;--hdr-h:56px;--shell:430px;
  --ease:cubic-bezier(.22,1,.36,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
}
[data-theme="dark"]{
  --bg:#0a0917;--surface:#100e24;--card:rgba(24,21,52,.90);
  --nav:rgba(16,14,36,.97);--inp:#1a1740;--grp:rgba(165,180,252,.07);
  --t1:#eceaff;--t2:#9997be;--tm:#5f5d80;
  --b1:rgba(165,180,252,.11);--bc:rgba(165,180,252,.17);--bi:rgba(165,180,252,.18);
  --sh:0 2px 16px rgba(0,0,0,.30);--she:0 10px 40px rgba(0,0,0,.48);
  --shb:0 4px 18px rgba(99,102,241,.44);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;-webkit-text-size-adjust:100%;}
body{
  font-family:var(--font-body);background:var(--bg);color:var(--t1);
  min-height:100dvh;display:flex;justify-content:center;
  overflow-x:hidden;transition:background .18s,color .18s;
}
button{font-family:var(--font-body);cursor:pointer;border:none;background:none;color:inherit;}
a{text-decoration:none;color:inherit;}
textarea{font-family:var(--font-body);}

/* SHELL */
.shell{
  width:100%;max-width:var(--shell);min-height:100dvh;
  background:var(--surface);display:flex;flex-direction:column;
  position:relative;box-shadow:0 0 0 1px var(--b1),var(--she);
  overflow:hidden;transition:background .18s;
}
@media(min-width:700px){
  body{padding:32px 0 48px;align-items:flex-start;}
  .shell{border-radius:40px;min-height:calc(100dvh - 80px);max-height:900px;overflow-y:hidden;}
}

/* HEADER */
.hdr{
  position:sticky;top:0;z-index:200;height:var(--hdr-h);
  background:var(--nav);
  backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--b1);
  display:flex;align-items:center;padding:0 14px;gap:10px;
  transition:background .18s;flex-shrink:0;
}
.hdr-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.hdr-logo{
  width:36px;height:36px;border-radius:11px;flex-shrink:0;
  overflow:hidden;display:grid;place-items:center;
  box-shadow:0 2px 10px rgba(99,102,241,.35);
  background:linear-gradient(135deg,var(--p),var(--acc));
}
.hdr-logo img{width:100%;height:100%;object-fit:cover;border-radius:11px;}
.hdr-info{min-width:0;}
.hdr-title{
  font-family:var(--font-display);font-size:15px;font-weight:800;color:var(--t1);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;
}
.hdr-sub{
  font-size:10.5px;color:var(--p);font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;
}
.hdr-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.hdr-btn{
  height:34px;padding:0 13px;border-radius:var(--r2);
  font-size:12px;font-weight:800;
  display:flex;align-items:center;gap:5px;
  transition:transform .15s var(--spring),opacity .12s;white-space:nowrap;
}
.hdr-btn:active{transform:scale(.95);}
.hdr-btn-ghost{background:var(--grp);border:1px solid var(--b1);color:var(--t2);}
.hdr-icon-btn{
  width:34px;height:34px;border-radius:var(--r2);
  background:var(--grp);border:1px solid var(--b1);
  display:grid;place-items:center;font-size:16px;color:var(--t2);
  transition:transform .15s var(--spring),background .12s;
}
.hdr-icon-btn:active{transform:scale(.93);}

/* MODE BAR */
.modebar{
  height:46px;padding:0 14px;
  display:flex;align-items:center;gap:6px;
  border-bottom:1px solid var(--b1);
  background:var(--surface);flex-shrink:0;
  transition:background .18s;
}
.mode-pill{
  height:31px;padding:0 13px;border-radius:var(--rf);
  font-size:12px;font-weight:700;color:var(--tm);
  background:transparent;border:1px solid transparent;
  transition:all .18s var(--ease);
}
.mode-pill.active-af{
  background:linear-gradient(135deg,var(--p),var(--acc));
  color:#fff;box-shadow:0 2px 10px rgba(99,102,241,.28);border-color:transparent;
}
.mode-pill.active-dev{
  background:linear-gradient(135deg,var(--dev),#ea580c);
  color:#fff;box-shadow:0 2px 10px rgba(249,115,22,.28);border-color:transparent;
}
.mode-pill:not(.active-af):not(.active-dev):hover{background:var(--grp);border-color:var(--b1);color:var(--t2);}

/* SESSION BANNER */
.session-banner{
  margin:10px 12px 0;
  padding:10px 14px;
  border-radius:var(--r2);
  font-size:12.5px;font-weight:700;
  display:flex;align-items:center;gap:8px;
  border:1px solid;
  animation:cardIn .28s var(--ease) both;
}
.session-banner.warn{
  background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.25);color:var(--amber);
}
.session-banner.err{
  background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.22);color:var(--err);
}
.session-banner.hidden{display:none;}

/* CHAT AREA */
.chat-area{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:12px 12px calc(var(--nav-h) + 76px + env(safe-area-inset-bottom,0px));
  display:flex;flex-direction:column;gap:10px;
}
.chat-area::-webkit-scrollbar{width:3px;}
.chat-area::-webkit-scrollbar-thumb{background:var(--bc);border-radius:99px;}

/* WELCOME */
.welcome-box{
  margin:20px auto;max-width:300px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  animation:cardIn .35s var(--ease) both;
}
.welcome-icon{
  width:64px;height:64px;border-radius:20px;overflow:hidden;
  box-shadow:0 4px 20px rgba(99,102,241,.3);
}
.welcome-icon img{width:100%;height:100%;object-fit:cover;}
.welcome-box h2{font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--t1);}
.welcome-box p{font-size:13px;color:var(--t2);line-height:1.65;}
.welcome-tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.wtag{
  height:28px;padding:0 12px;border-radius:var(--rf);
  font-size:11.5px;font-weight:700;color:var(--tm);
  background:var(--grp);border:1px solid var(--b1);
}

/* MESSAGE BUBBLES */
.msg-row{display:flex;gap:9px;animation:cardIn .22s var(--ease) both;}
.msg-row.user{flex-direction:row-reverse;}
.av{
  width:32px;height:32px;min-width:32px;border-radius:10px;
  display:grid;place-items:center;font-size:12px;font-weight:800;
  flex-shrink:0;align-self:flex-start;margin-top:2px;
}
.av-ai{background:linear-gradient(135deg,var(--p),var(--acc));color:#fff;}
.av-ai.dev{background:linear-gradient(135deg,var(--dev),#ea580c);}
.av-user{background:var(--grp);border:1px solid var(--bc);color:var(--t2);}
.bubble{
  max-width:82%;padding:11px 14px;border-radius:var(--r2);
  font-size:13.5px;line-height:1.7;word-break:break-word;
  white-space:pre-wrap;
}
.bubble-ai{
  background:var(--card);border:1px solid var(--bc);
  border-top-left-radius:4px;
  box-shadow:var(--sh);
}
.bubble-user{
  background:linear-gradient(135deg,var(--p),var(--p2));
  color:#fff;border-top-right-radius:4px;
}
.msg-meta{font-size:10.5px;color:var(--tm);margin-top:3px;font-weight:600;}
.msg-row.user .msg-meta{text-align:right;}
.mode-badge{
  display:inline-block;font-size:10px;font-weight:800;
  padding:1px 6px;border-radius:5px;margin-right:4px;
}
.mode-badge.af24{background:rgba(99,102,241,.12);color:var(--p);}
.mode-badge.dev39{background:rgba(249,115,22,.12);color:var(--dev);}

/* THINKING */
.thinking-row{display:flex;gap:9px;}
.thinking-bub{
  background:var(--card);border:1px solid var(--bc);
  border-radius:var(--r2);border-top-left-radius:4px;
  padding:10px 14px;box-shadow:var(--sh);
}
.dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--tm);margin:0 2px;animation:dotBounce 1.2s infinite;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dotBounce{0%,100%{transform:translateY(0);opacity:.5;}50%{transform:translateY(-5px);opacity:1;}}

/* INPUT AREA */
.input-area{
  position:fixed;
  bottom:var(--nav-h);
  left:50%;transform:translateX(-50%);
  width:100%;max-width:var(--shell);
  background:var(--nav);
  backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);
  border-top:1px solid var(--b1);
  padding:10px 12px;padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));
  z-index:150;
}
.input-wrap{
  display:flex;align-items:flex-end;gap:8px;
  background:var(--inp);border:1.5px solid var(--bc);border-radius:var(--r2);
  padding:8px 8px 8px 13px;
  transition:border-color .15s,box-shadow .15s;
}
.input-wrap:focus-within{border-color:var(--p);box-shadow:0 0 0 3px rgba(99,102,241,.10);}
.input-wrap.dev-mode:focus-within{border-color:var(--dev);box-shadow:0 0 0 3px rgba(249,115,22,.10);}
#msgInput{
  flex:1;background:transparent;border:none;outline:none;resize:none;
  font-size:13.5px;line-height:1.55;color:var(--t1);
  min-height:36px;max-height:100px;overflow-y:auto;
}
#msgInput::placeholder{color:var(--tm);}
#msgInput:disabled{opacity:.5;}
.send-btn{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--p),var(--p3));color:#fff;
  display:grid;place-items:center;font-size:16px;
  box-shadow:0 2px 10px rgba(99,102,241,.28);
  transition:transform .15s var(--spring),opacity .12s;
}
.send-btn.dev-send{background:linear-gradient(135deg,var(--dev),#ea580c);box-shadow:0 2px 10px rgba(249,115,22,.28);}
.send-btn:disabled{opacity:.32;cursor:not-allowed;box-shadow:none;}
.send-btn:not(:disabled):active{transform:scale(.93);}
.char-hint{font-size:10px;color:var(--tm);font-weight:700;text-align:right;margin-top:4px;}
.char-hint.warn{color:var(--err);}

/* STATE */
.state-msg{
  margin:30px auto;max-width:280px;text-align:center;color:var(--tm);
  font-size:13.5px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:12px;
}
.state-msg .icon{font-size:40px;animation:bob 3s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.spinner{width:24px;height:24px;border-radius:50%;border:3px solid var(--b1);border-top-color:var(--p);animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* LOCKED */
.locked-box{display:none;place-items:center;min-height:60vh;padding:24px;}
.locked-box.visible{display:grid;}
.locked-card{
  width:100%;max-width:300px;background:var(--card);border:1px solid var(--bc);
  border-radius:var(--r4);padding:30px 22px;text-align:center;box-shadow:var(--sh);
}
.locked-icon{
  width:56px;height:56px;margin:0 auto 14px;border-radius:var(--r3);
  display:grid;place-items:center;font-size:24px;
  background:rgba(244,63,94,.10);border:1px solid rgba(244,63,94,.20);
}
.locked-card h2{font-family:var(--font-display);font-size:18px;font-weight:800;color:var(--err);margin-bottom:8px;}
.locked-card p{font-size:13px;color:var(--t2);line-height:1.65;margin-bottom:20px;}
.login-btn{
  width:100%;min-height:44px;border-radius:var(--r2);
  font-size:14px;font-weight:800;color:#fff;
  background:linear-gradient(135deg,var(--p),var(--p3));
  box-shadow:var(--shb);transition:opacity .15s,transform .15s;
}
.login-btn:active{transform:scale(.98);}

/* BOTTOM NAV */
.bnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:var(--shell);z-index:999;height:var(--nav-h);
  background:var(--nav);
  backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);
  border-top:1px solid var(--b1);display:flex;align-items:center;
  padding:0 4px;padding-bottom:env(safe-area-inset-bottom,0px);
}
.bnav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;height:100%;border-radius:var(--r2);padding:8px 4px;position:relative;
  transition:all .12s var(--ease);
}
.bnav-btn::before{
  content:'';position:absolute;top:7px;left:50%;transform:translateX(-50%);
  width:0;height:2.5px;background:linear-gradient(90deg,var(--p),var(--acc));
  border-radius:99px;transition:width .2s var(--spring);
}
.bnav-btn.active::before{width:26px;}
.bnav-icon{font-size:21px;line-height:1;transition:transform .15s var(--spring);}
.bnav-btn.active .bnav-icon{transform:scale(1.1);}
.bnav-btn:active .bnav-icon{transform:scale(.88);}
.bnav-label{font-size:10px;font-weight:700;color:var(--tm);transition:color .12s;}
.bnav-btn.active .bnav-label{color:var(--p);}

/* MODALS */
.modal-ov{
  position:fixed;inset:0;z-index:9000;
  display:flex;align-items:flex-end;justify-content:center;
  background:rgba(0,0,0,.48);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  opacity:0;visibility:hidden;transition:opacity .22s,visibility .22s;
}
.modal-ov.open{opacity:1;visibility:visible;}
.modal-card{
  width:100%;max-width:var(--shell);background:var(--surface);
  border-radius:var(--r4) var(--r4) 0 0;
  border:1px solid var(--bc);border-bottom:none;box-shadow:var(--she);
  transform:translateY(100%);transition:transform .30s var(--spring);
  display:flex;flex-direction:column;max-height:90dvh;overflow:hidden;
}
.modal-ov.open .modal-card{transform:translateY(0);}
.modal-drag{width:36px;height:4px;background:var(--bi);border-radius:99px;margin:10px auto 0;}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 12px;border-bottom:1px solid var(--b1);flex-shrink:0;
}
.modal-head h3{font-family:var(--font-display);font-size:16px;font-weight:800;color:var(--t1);}
.modal-close{
  width:30px;height:30px;border-radius:var(--r1);
  background:var(--grp);display:grid;place-items:center;
  font-size:18px;color:var(--tm);transition:background .12s;
}
.modal-close:hover{background:var(--b1);}
.modal-body{padding:14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex:1;}

/* PROFILE MODAL */
.profile-avatar{
  width:72px;height:72px;border-radius:20px;
  background:linear-gradient(135deg,var(--p),var(--acc));
  display:grid;place-items:center;font-size:26px;font-weight:800;color:#fff;
  margin:0 auto 4px;letter-spacing:.03em;
  box-shadow:0 4px 18px rgba(99,102,241,.35);
}
.profile-name{
  font-family:var(--font-display);font-size:20px;font-weight:800;
  color:var(--t1);text-align:center;
}
.profile-row{
  display:flex;align-items:center;gap:12px;
  background:var(--grp);border:1px solid var(--b1);
  border-radius:var(--r2);padding:12px 14px;
}
.profile-row-icon{font-size:18px;flex-shrink:0;}
.profile-row-content{min-width:0;flex:1;}
.profile-row-label{font-size:10.5px;color:var(--tm);font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.profile-row-val{font-size:13.5px;color:var(--t1);font-weight:600;margin-top:2px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat-card{
  background:var(--grp);border:1px solid var(--b1);border-radius:var(--r2);
  padding:12px;text-align:center;
}
.stat-val{font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--p);}
.stat-lbl{font-size:10.5px;color:var(--tm);font-weight:700;margin-top:2px;}
.usage-bar-wrap{background:var(--grp);border:1px solid var(--b1);border-radius:var(--r2);padding:12px 14px;}
.usage-bar-label{display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px;font-weight:700;color:var(--t2);}
.usage-bar-track{height:8px;background:var(--b1);border-radius:99px;overflow:hidden;}
.usage-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--p),var(--acc));transition:width .4s var(--ease);}
.usage-bar-fill.warn-fill{background:linear-gradient(90deg,var(--amber),#d97706);}
.usage-bar-fill.err-fill{background:linear-gradient(90deg,var(--err),#dc2626);}
.session-info{font-size:11px;color:var(--tm);font-weight:600;margin-top:6px;text-align:center;}

/* TOAST */
.toast-wrap{
  position:fixed;left:50%;bottom:calc(var(--nav-h) + 14px);
  transform:translateX(-50%);z-index:99999;
  width:min(90vw,400px);pointer-events:none;
}
.toast{
  display:flex;align-items:flex-start;gap:10px;background:var(--surface);color:var(--t1);
  border:1px solid var(--bc);border-radius:14px;padding:11px 14px;
  box-shadow:var(--she);animation:toastIn .22s ease;pointer-events:auto;
}
.toast-ok{border-left:4px solid var(--ok);}
.toast-err{border-left:4px solid var(--err);}
.toast-info{border-left:4px solid var(--p);}
.toast-body{flex:1;}
.toast-title{font-size:12.5px;font-weight:800;margin-bottom:1px;}
.toast-msg{font-size:11.5px;color:var(--t2);}
.toast-x{font-size:16px;color:var(--tm);cursor:pointer;}
@keyframes toastIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes cardIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

.hidden{display:none!important;}
html,body,*{-webkit-user-select:none;-moz-user-select:none;user-select:none;-webkit-touch-callout:none;}
textarea,input{-webkit-user-select:text;-moz-user-select:text;user-select:text;}
</style>
</head>
<body>
<div class="shell" id="shell">

  <!-- HEADER -->
  <header class="hdr" id="hdr">
    <div class="hdr-left">
      <div class="hdr-logo">
        <img src="../IMG/AF LOGO 2.jpeg" alt="AF" onerror="this.style.display='none';this.parentElement.textContent='AF'"/>
      </div>
      <div class="hdr-info">
        <div class="hdr-title">AcademeForge AI</div>
        <div class="hdr-sub">✦ Free Version</div>
      </div>
    </div>
    <div class="hdr-right hidden" id="hdrActions">
      <button class="hdr-btn hdr-btn-ghost" id="btnNewChat" onclick="aiNewChat()">
        <span>✍</span><span>New</span>
      </button>
      <button class="hdr-btn hdr-btn-ghost" id="btnProfile" onclick="aiOpenProfile()">
        <span>👤</span><span>Profile</span>
      </button>
    </div>
  </header>

  <!-- MODE BAR -->
  <div class="modebar hidden" id="modeBar">
    <button class="mode-pill active-af" id="pillAF" onclick="aiSetMode('af24')">🎓 AF 2.4</button>

<script>
/* ── SUPABASE ── */
const SUPABASE_URL = "https://afooyyydhlwngzssgqih.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmb295eXlkaGx3bmd6c3NncWloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NDQxMjgsImV4cCI6MjA5NDIyMDEyOH0.KG0XO0oP_2MpewHoIwTtbrKg5FkyOYRUtVzLH1MSJiE";
const EDGE_URL     = SUPABASE_URL + "/functions/v1/af-ask-ai";

/* ── SESSION LIMITS ── */
const TOTAL_TOKEN_LIMIT   = 15000;
const SESSION_TOKEN_LIMIT = Math.floor(TOTAL_TOKEN_LIMIT / 4); // 3750 per session
const TOTAL_REQ_LIMIT     = 20; // total daily requests
const SESSION_REQ_LIMIT   = 5;  // per session
const SESSION_COOLDOWN_H  = 6;  // hours between sessions

/* ── HELPERS ── */
const $       = id => document.getElementById(id);
const show    = id => $(id) && $(id).classList.remove('hidden');
const hide    = id => $(id) && $(id).classList.add('hidden');
const isLoggedIn = () => !!(localStorage.getItem('af_student_email') || localStorage.getItem('af_student_mobile'));
const sKey    = () => localStorage.getItem('af_student_email') || localStorage.getItem('af_student_mobile') || '';
const sName   = () => localStorage.getItem('af_student_name') || 'Student';
const sMobile = () => localStorage.getItem('af_student_mobile') || '';
const sEmail  = () => localStorage.getItem('af_student_email') || '';
function initials(n){return String(n||'AF').trim().split(/\s+/).slice(0,2).map(v=>v.charAt(0).toUpperCase()).join('');}
function esc(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function timeAgo(v){
  if(!v) return '';
  try{
    const d=Math.floor((Date.now()-new Date(v).getTime())/1000);
    if(d<60) return 'just now';
    if(d<3600) return Math.floor(d/60)+'m ago';
    if(d<86400) return Math.floor(d/3600)+'h ago';
    return new Date(v).toLocaleDateString();
  }catch(e){return '';}
}

/* ── THEME ── */
function syncTheme(){document.documentElement.setAttribute('data-theme',localStorage.getItem('af_dark_mode')==='1'?'dark':'light');}
syncTheme();
window.addEventListener('storage',e=>{if(e.key==='af_dark_mode') syncTheme();});

/* ── TOAST ── */
let _tTimer=null;
function showToast(msg,type='info',title=''){
  const w=$('toastWrap'); w.innerHTML='';
  if(_tTimer){clearTimeout(_tTimer);_tTimer=null;}
  const labels={ok:'Done',err:'Error',info:'Notice'};
  const d=document.createElement('div');
  d.className='toast toast-'+type;
  d.innerHTML=`<div class="toast-body"><div class="toast-title">${title||labels[type]||'Info'}</div><div class="toast-msg">${msg}</div></div><span class="toast-x" onclick="this.parentElement.remove()">×</span>`;
  w.appendChild(d);
  _tTimer=setTimeout(()=>{d.style.animation='toastIn .22s ease reverse';setTimeout(()=>d.remove(),220);},3200);
}

/* ── NAV ── */
function goToLogin(){sessionStorage.setItem('af_last_tab','student');window.location.href='../';}

/* ── STATE ── */
let _mode = 'af24';
let _messages = []; // [{role,content,mode,time}]
let _loading = false;
let _curConvId = null;
let _usageData = null; // cached from server

/* ── SESSION STATE (stored per student in localStorage) ── */
function getSessionKey(){ return 'af_ai_session_' + btoa(sKey()).replace(/=/g,''); }
function getSession(){
  try{
    const raw = localStorage.getItem(getSessionKey());
    if(!raw) return newSession();
    return JSON.parse(raw);
  }catch(e){ return newSession(); }
}
function newSession(){
  return {
    sessionStart: null,
    sessionTokens: 0,
    sessionReqs: 0,
    totalTokens: 0,
    totalReqs: 0,
    dayReset: new Date().toISOString().split('T')[0]
  };
}
function saveSession(s){ try{localStorage.setItem(getSessionKey(), JSON.stringify(s));}catch(e){} }
function resetDayIfNeeded(s){
  const today = new Date().toISOString().split('T')[0];
  if(s.dayReset !== today){
    s.totalTokens = 0; s.totalReqs = 0;
    s.sessionTokens = 0; s.sessionReqs = 0;
    s.sessionStart = null; s.dayReset = today;
  }
  return s;
}

/* Session cooldown: returns ms left, or 0 if can start */
function sessionCooldownMs(s){
  if(!s.sessionStart) return 0;
  const elapsed = Date.now() - new Date(s.sessionStart).getTime();
  const cooldown = SESSION_COOLDOWN_H * 3600 * 1000;
  return Math.max(0, cooldown - elapsed);
}
function canStartSession(s){
  if(s.totalTokens >= TOTAL_TOKEN_LIMIT) return {ok:false,reason:'total_tokens'};
  if(s.totalReqs >= TOTAL_REQ_LIMIT) return {ok:false,reason:'total_reqs'};
  const cd = sessionCooldownMs(s);
  if(cd > 0) return {ok:false,reason:'cooldown',ms:cd};
  return {ok:true};
}
function canSendInSession(s){
  if(s.sessionTokens >= SESSION_TOKEN_LIMIT) return false;
  if(s.sessionReqs >= SESSION_REQ_LIMIT) return false;
  return true;
}
function startSession(s){
  s.sessionStart = new Date().toISOString();
  s.sessionTokens = 0; s.sessionReqs = 0;
  return s;
}
function formatCooldown(ms){
  const h = Math.floor(ms/3600000);
  const m = Math.ceil((ms%3600000)/60000);
  if(h>0) return `${h}h ${m}m`;
  return `${m}m`;
}

/* ── EDGE CALL ── */
async function edgeCall(payload){
  try{
    if(!navigator.onLine) return {ok:false,error:'No internet connection.'};
    const key = sKey();
    const res = await fetch(EDGE_URL, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-af-student-key': key
      },
      body: JSON.stringify({...payload, student_key: key, student_name: sName()})
    });
    const data = await res.json();
    return data;
  }catch(e){ return {ok:false,error:e.message||'Request failed.'}; }
}

/* ── BANNER ── */
function updateBanner(s){
  const el = $('sessionBanner');
  if(!el) return;
  const cd = sessionCooldownMs(s);
  const totalDone = s.totalTokens >= TOTAL_TOKEN_LIMIT || s.totalReqs >= TOTAL_REQ_LIMIT;

  if(totalDone){
    el.className = 'session-banner err';
    el.innerHTML = '🚫 Daily limit reached. Come back tomorrow!';
    show('sessionBanner');
    $('msgInput') && ($('msgInput').disabled = true);
    $('sendBtn') && ($('sendBtn').disabled = true);
    return;
  }
  if(cd > 0){
    el.className = 'session-banner warn';
    el.innerHTML = `⏳ Free session limit reached. Next session in <strong>${formatCooldown(cd)}</strong>`;
    show('sessionBanner');
    $('msgInput') && ($('msgInput').disabled = true);
    $('sendBtn') && ($('sendBtn').disabled = true);
    // auto-refresh when cooldown expires
    setTimeout(()=>{ let s2=getSession(); s2=resetDayIfNeeded(s2); updateBanner(s2); enableInput(); }, cd+1000);
    return;
  }
  if(s.sessionTokens >= SESSION_TOKEN_LIMIT || s.sessionReqs >= SESSION_REQ_LIMIT){
    // session just ended — need cooldown
    el.className = 'session-banner warn';
    el.innerHTML = `⏳ Session tokens used up. Next session in <strong>${SESSION_COOLDOWN_H}h</strong>`;
    show('sessionBanner');
    $('msgInput') && ($('msgInput').disabled = true);
    $('sendBtn') && ($('sendBtn').disabled = true);
    return;
  }
  // all good
  el.classList.add('hidden');
  enableInput();
}
function enableInput(){
  if(!$('msgInput')) return;
  let s = getSession(); s = resetDayIfNeeded(s);
  const ok = canStartSession(s).ok || (s.sessionStart && canSendInSession(s));
  $('msgInput').disabled = false;
}

/* ── INIT ── */
async function init(){
  if(!isLoggedIn()){
    hide('chatArea'); hide('modeBar'); hide('inputArea'); hide('hdrActions');
    $('lockedBox').classList.add('visible');
    return;
  }
  show('chatArea'); show('modeBar'); show('inputArea'); show('hdrActions');
  $('lockedBox').classList.remove('visible');
  aiSetMode('af24');

  let s = getSession(); s = resetDayIfNeeded(s);
  updateBanner(s);

  // Load existing conversation if any
  if(_curConvId){
    await aiLoadConv(_curConvId);
  } else {
    renderWelcome();
  }
}

/* ── MODE ── */
function aiSetMode(m){
  _mode = m;
  $('pillAF').className = 'mode-pill' + (m==='af24' ? ' active-af' : '');
  $('pillDev').className = 'mode-pill' + (m==='dev39' ? ' active-dev' : '');
  $('inputWrap').className = 'input-wrap' + (m==='dev39'?' dev-mode':'');
  $('sendBtn').className = 'send-btn' + (m==='dev39'?' dev-send':'');
  $('msgInput').placeholder = m==='dev39' ? 'Dev 3.9 — what are you building?' : 'Ask AF 2.4…';
}

/* ── NEW CHAT ── */
function aiNewChat(){
  _messages = []; _curConvId = null;
  $('msgList').innerHTML = '';
  renderWelcome();
  showToast('New chat started','info','✦');
}

/* ── WELCOME ── */
function renderWelcome(){
  const wb = $('welcomeBox');
  if(wb) wb.style.display = '';
}
function hideWelcome(){
  const wb = $('welcomeBox');
  if(wb) wb.style.display = 'none';
}

/* ── LOAD CONV ── */
async function aiLoadConv(convId){
  hideWelcome();
  const box = $('msgList'); box.innerHTML = '<div class="state-msg"><div class="spinner"></div></div>';
  const res = await edgeCall({action:'load_conversation',conversation_id:convId});
  box.innerHTML = '';
  if(!res || !res.messages || !res.messages.length){renderWelcome();return;}
  res.messages.forEach(m=>renderMessage(m.role,m.content,m.mode||_mode,false));
  scrollBottom();
}

/* ── TYPING ── */
function aiTyping(){
  const v = $('msgInput').value;
  const l = v.length;
  const over = l > 500;
  $('charHint').textContent = l + ' / 500';
  $('charHint').className = 'char-hint' + (over ? ' warn' : '');
  $('sendBtn').disabled = over || l === 0 || _loading;
  autoResize();
}

function autoResize(){
  const el = $('msgInput');
  if(!el) return;
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

/* ── SEND ── */
async function aiSend(){
  const content = $('msgInput').value.trim();
  if(!content || _loading) return;

  let s = getSession(); s = resetDayIfNeeded(s);

  // Check / start session
  const check = canStartSession(s);
  if(!s.sessionStart || !canSendInSession(s)){
    if(!check.ok && check.reason === 'cooldown'){
      showToast('Session cooldown active. Wait '+formatCooldown(check.ms),'err','⏳');
      return;
    }
    if(!check.ok && (check.reason==='total_tokens'||check.reason==='total_reqs')){
      showToast('Daily limit reached. Come back tomorrow!','err','🚫');
      return;
    }
    // Start new session
    s = startSession(s);
    saveSession(s);
  }

  if(!canSendInSession(s)){
    updateBanner(s);
    return;
  }

  _loading = true;
  $('sendBtn').disabled = true;
  $('msgInput').value = '';
  $('charHint').textContent = '0 / 500';
  autoResize();
  hideWelcome();

  renderMessage('user', content, _mode, true);
  const thinkEl = showThinking();

  try{
    const payload = {action:'ask', question:content, mode:_mode};
    if(_curConvId) payload.conversation_id = _curConvId;

    const res = await edgeCall(payload);
    removeThinking(thinkEl);

    if(!res || res.error){
      if(res && res.limitReached){
        s.totalTokens = TOTAL_TOKEN_LIMIT;
        saveSession(s); updateBanner(s);
      } else {
        showToast((res && res.error)||'Request failed.','err','Error');
        renderMessage('assistant','Sorry, I ran into an error. Please try again.',_mode,true);
      }
      return;
    }

    // Update session stats
    const tokensUsed = res.tokensThisCall || Math.ceil((content.length + (res.answer||'').length) / 4);
    s.sessionTokens = (s.sessionTokens||0) + tokensUsed;
    s.totalTokens   = (s.totalTokens||0) + tokensUsed;
    s.sessionReqs   = (s.sessionReqs||0) + 1;
    s.totalReqs     = (s.totalReqs||0) + 1;
    saveSession(s);

    if(res.conversation_id) _curConvId = res.conversation_id;
    renderMessage('assistant', res.answer, _mode, true);
    updateBanner(s);
    scrollBottom();

    // Cache usage for profile
    _usageData = {
      sessionTokens: s.sessionTokens,
      totalTokens: s.totalTokens,
      sessionReqs: s.sessionReqs,
      totalReqs: s.totalReqs,
      sessionTokenLimit: SESSION_TOKEN_LIMIT,
      totalTokenLimit: TOTAL_TOKEN_LIMIT,
    };

  }catch(e){
    removeThinking(thinkEl);
    showToast('Network error. Please try again.','err','Error');
  }finally{
    _loading = false;
    const s2 = getSession();
    if(canSendInSession(s2) && canStartSession(s2).ok){
      $('sendBtn').disabled = false;
    }
  }
}

/* ── RENDER MESSAGE ── */
function renderMessage(role, content, mode, doScroll){
  const isUser = role === 'user';
  const row = document.createElement('div');
  row.className = 'msg-row ' + (isUser ? 'user' : 'ai');
  row.style.animationDelay = '0s';

  const av = document.createElement('div');
  if(isUser){
    av.className = 'av av-user';
    av.textContent = initials(sName());
  } else {
    av.className = 'av av-ai' + (mode==='dev39'?' dev':'');
    av.textContent = mode==='dev39'?'🔥':'🎓';
  }

  const right = document.createElement('div');
  right.style.minWidth='0';right.style.flex='1';

  const bub = document.createElement('div');
  bub.className = 'bubble ' + (isUser ? 'bubble-user' : 'bubble-ai');
  bub.textContent = content;

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  if(!isUser){
    const badge = `<span class="mode-badge ${mode}">${mode==='dev39'?'DEV 3.9':'AF 2.4'}</span>`;
    meta.innerHTML = badge + 'AcademeForge AI · just now';
  } else {
    meta.textContent = sName() + ' · just now';
  }

  right.appendChild(bub);
  right.appendChild(meta);
  row.appendChild(av);
  row.appendChild(right);
  $('msgList').appendChild(row);
  if(doScroll) scrollBottom();
}

/* ── THINKING ── */
function showThinking(){
  const row = document.createElement('div');
  row.className = 'thinking-row';
  const av = document.createElement('div');
  av.className = 'av av-ai' + (_mode==='dev39'?' dev':'');
  av.textContent = _mode==='dev39'?'🔥':'🎓';
  const bub = document.createElement('div');
  bub.className = 'thinking-bub';
  bub.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  row.appendChild(av); row.appendChild(bub);
  $('msgList').appendChild(row);
  scrollBottom();
  return row;
}
function removeThinking(el){if(el?.parentNode) el.parentNode.removeChild(el);}

/* ── SCROLL ── */
function scrollBottom(){
  const ca = $('chatArea');
  if(ca) ca.scrollTo({top:ca.scrollHeight,behavior:'smooth'});
}

/* ── PROFILE ── */
function aiOpenProfile(){
  const modal = $('profileModal');
  modal.classList.add('open');
  renderProfileBody();
}
function aiCloseProfile(){
  $('profileModal').classList.remove('open');
}
function renderProfileBody(){
  const s = resetDayIfNeeded(getSession());
  const body = $('profileBody');
  const name = sName(), mobile = sMobile(), email = sEmail();
  const totalTok = s.totalTokens || 0;
  const totalReq = s.totalReqs || 0;
  const sessTok = s.sessionTokens || 0;
  const sessReq = s.sessionReqs || 0;
  const tokPct = Math.min(100, Math.round((totalTok/TOTAL_TOKEN_LIMIT)*100));
  const sessTokenPct = Math.min(100, Math.round((sessTok/SESSION_TOKEN_LIMIT)*100));
  const fillClass = tokPct>=90?'err-fill':tokPct>=70?'warn-fill':'';
  const cd = sessionCooldownMs(s);
  const sessInfo = cd>0 ? `Next session in ${formatCooldown(cd)}` : (s.sessionStart ? 'Session active' : 'No session started yet');

  body.innerHTML = `
    <div style="text-align:center;padding-bottom:4px;">
      <div class="profile-avatar">${initials(name)}</div>
      <div class="profile-name">${esc(name)}</div>
    </div>
    ${mobile?`<div class="profile-row"><span class="profile-row-icon">📱</span><div class="profile-row-content"><div class="profile-row-label">Mobile</div><div class="profile-row-val">${esc(mobile)}</div></div></div>`:''}
    ${email?`<div class="profile-row"><span class="profile-row-icon">✉️</span><div class="profile-row-content"><div class="profile-row-label">Email</div><div class="profile-row-val">${esc(email)}</div></div></div>`:''}
    <div class="profile-row"><span class="profile-row-icon">🤖</span><div class="profile-row-content"><div class="profile-row-label">Mode</div><div class="profile-row-val">${_mode==='dev39'?'Dev 3.9 Pro':'AF 2.4 Student Mentor'}</div></div></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${TOTAL_REQ_LIMIT-totalReq<0?0:TOTAL_REQ_LIMIT-totalReq}</div><div class="stat-lbl">Requests Left</div></div>
      <div class="stat-card"><div class="stat-val">${SESSION_REQ_LIMIT-sessReq<0?0:SESSION_REQ_LIMIT-sessReq}</div><div class="stat-lbl">This Session</div></div>
    </div>
    <div class="usage-bar-wrap">
      <div class="usage-bar-label"><span>Daily Token Usage</span><span>${totalTok.toLocaleString()} / ${TOTAL_TOKEN_LIMIT.toLocaleString()}</span></div>
      <div class="usage-bar-track"><div class="usage-bar-fill ${fillClass}" style="width:${tokPct}%"></div></div>
    </div>
    <div class="usage-bar-wrap">
      <div class="usage-bar-label"><span>Session Tokens</span><span>${sessTok.toLocaleString()} / ${SESSION_TOKEN_LIMIT.toLocaleString()}</span></div>
      <div class="usage-bar-track"><div class="usage-bar-fill" style="width:${sessTokenPct}%"></div></div>
      <div class="session-info">${sessInfo} · 4 sessions/day · 6h cooldown</div>
    </div>
  `;
}

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape' && $('profileModal').classList.contains('open')) aiCloseProfile();
  if(e.key==='Enter' && !e.shiftKey && document.activeElement===$('msgInput')){
    e.preventDefault(); aiSend();
  }
});

/* ── BOOT ── */
document.addEventListener('DOMContentLoaded', init);
window.addEventListener('storage',e=>{
  if(['af_student_email','af_student_mobile','af_student_name'].includes(e.key)) init();
});
</script>
