<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function(){
  document.documentElement.setAttribute('data-theme',
    localStorage.getItem('af_dark_mode')==='1'?'dark':'light');
})();
</script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#6366f1"/>
<title>AF Nexus · Community</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --p:#6366f1;--p2:#4f46e5;--p3:#4338ca;--pl:#a5b4fc;
  --acc:#0ea5e9;--acc2:#0284c7;--rose:#f43f5e;--amber:#f59e0b;
  --ok:#10b981;--err:#ef4444;
  --bg:#eef0fb;--surface:#ffffff;--card:rgba(255,255,255,.92);
  --nav:rgba(255,255,255,.94);--inp:#f3f4fd;--grp:rgba(99,102,241,.07);
  --t1:#0f0e23;--t2:#4b5569;--tm:#9499b7;
  --b1:rgba(99,102,241,.11);--bc:rgba(99,102,241,.16);--bi:#d4d7f0;
  --sh:0 2px 16px rgba(99,102,241,.09),0 1px 3px rgba(0,0,0,.05);
  --she:0 10px 40px rgba(99,102,241,.16),0 2px 8px rgba(0,0,0,.07);
  --shb:0 4px 18px rgba(99,102,241,.32);
  --r1:8px;--r2:12px;--r3:18px;--r4:26px;--rf:9999px;
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Plus Jakarta Sans',sans-serif;
  --nav-h:64px;--hdr-h:56px;--shell:430px;
  --ease:cubic-bezier(.22,1,.36,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
}
[data-theme="dark"]{
  --bg:#0a0917;--surface:#100e24;--card:rgba(24,21,52,.90);
  --nav:rgba(16,14,36,.97);--inp:#1a1740;--grp:rgba(165,180,252,.07);
  --t1:#eceaff;--t2:#9997be;--tm:#5f5d80;
  --b1:rgba(165,180,252,.11);--bc:rgba(165,180,252,.17);--bi:rgba(165,180,252,.18);
  --sh:0 2px 16px rgba(0,0,0,.30);--she:0 10px 40px rgba(0,0,0,.48);
  --shb:0 4px 18px rgba(99,102,241,.44);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;-webkit-text-size-adjust:100%;height:100%;height:100dvh;}
body{
  font-family:var(--font-body);background:var(--bg);color:var(--t1);
  height:100%;height:100dvh;display:flex;justify-content:center;
  overflow:hidden;transition:background .18s,color .18s;
}
button{font-family:var(--font-body);cursor:pointer;border:none;background:none;color:inherit;}
a{text-decoration:none;color:inherit;}

/* SHELL */
.shell{
  width:100%;max-width:var(--shell);height:100%;height:100dvh;
  background:var(--surface);display:flex;flex-direction:column;
  position:relative;box-shadow:0 0 0 1px var(--b1),var(--she);
  overflow:hidden;transition:background .18s;
}
@media(min-width:700px){
  body{padding:24px 0 40px;height:auto;min-height:100dvh;overflow-y:auto;}
  .shell{border-radius:40px;height:calc(100dvh - 64px);max-height:880px;}
}

/* HEADER */
.hdr{
  position:sticky;top:0;z-index:200;height:var(--hdr-h);
  background:var(--nav);
  backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--b1);
  display:flex;align-items:center;padding:0 14px;gap:10px;
  transition:background .18s;flex-shrink:0;
}
.hdr-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.hdr-logo{
  width:36px;height:36px;border-radius:11px;flex-shrink:0;
  background:linear-gradient(135deg,var(--p),var(--acc));
  display:grid;place-items:center;font-size:17px;
  box-shadow:0 2px 10px rgba(99,102,241,.35);
}
.hdr-info{min-width:0;}
.hdr-title{
  font-family:var(--font-display);font-size:15px;font-weight:800;color:var(--t1);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;
}
.hdr-sub{
  font-size:10.5px;color:var(--tm);font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;
}
.hdr-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.hdr-btn{
  height:34px;padding:0 13px;border-radius:var(--r2);
  font-size:12px;font-weight:800;
  display:flex;align-items:center;gap:5px;
  transition:transform .15s var(--spring),opacity .12s;white-space:nowrap;
}
.hdr-btn:active{transform:scale(.95);}
.hdr-btn-ghost{background:var(--grp);border:1px solid var(--b1);color:var(--t2);}
.hdr-icon-btn{
  width:34px;height:34px;border-radius:var(--r2);
  background:var(--grp);border:1px solid var(--b1);
  display:grid;place-items:center;font-size:16px;color:var(--t2);
  transition:transform .15s var(--spring),background .12s;
}
.hdr-icon-btn:active{transform:scale(.93);}

/* SUBBAR — shared by filter-bar AND my-posts-bar */
.subbar{
  height:46px;padding:0 14px;
  display:flex;align-items:center;gap:6px;
  border-bottom:1px solid var(--b1);
  background:var(--surface);flex-shrink:0;
  transition:background .18s;
}

/* filter pills inside subbar */
.filter-pill{
  height:31px;padding:0 13px;border-radius:var(--rf);
  font-size:12px;font-weight:700;color:var(--tm);
  background:transparent;border:1px solid transparent;
  transition:all .18s var(--ease);
}
.filter-pill.active{
  background:linear-gradient(135deg,var(--p),var(--acc));
  color:#fff;box-shadow:0 2px 10px rgba(99,102,241,.28);border-color:transparent;
}
.filter-pill:not(.active):hover{background:var(--grp);border-color:var(--b1);color:var(--t2);}
.live-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--ok);margin-left:auto;flex-shrink:0;
  box-shadow:0 0 7px rgba(16,185,129,.6);
  animation:livePulse 2.2s ease-in-out infinite;
}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.85);}}

/* my-posts bar content */
.mp-title{
  display:flex;align-items:center;gap:8px;flex:1;
}
.mp-title span:first-child{font-size:16px;}
.mp-title strong{
  font-family:var(--font-display);font-size:14px;font-weight:800;color:var(--t1);
}
.mp-back{
  height:32px;padding:0 14px;border-radius:var(--rf);
  font-size:12px;font-weight:800;color:var(--p);
  background:rgba(99,102,241,.10);border:1px solid rgba(99,102,241,.20);
  display:flex;align-items:center;gap:5px;flex-shrink:0;
  transition:background .14s,transform .14s var(--spring);
}
.mp-back:hover{background:rgba(99,102,241,.16);}
.mp-back:active{transform:scale(.95);}

/* FEED */
.feed{
  flex:1;overflow-y:scroll;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
  padding:12px 12px calc(var(--nav-h) + 88px + env(safe-area-inset-bottom,0px));
  min-height:0;-webkit-transform:translateZ(0);transform:translateZ(0);
}
.feed::-webkit-scrollbar{width:3px;}
.feed::-webkit-scrollbar-thumb{background:var(--bc);border-radius:99px;}

/* STATE */
.state-msg{
  margin:40px auto;max-width:280px;text-align:center;color:var(--tm);
  font-size:13.5px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:12px;
}
.state-msg .icon{font-size:42px;animation:bob 3s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.spinner{
  width:26px;height:26px;border-radius:50%;
  border:3px solid var(--b1);border-top-color:var(--p);
  animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* POST CARD */
.post-card{
  background:var(--card);border:1px solid var(--bc);border-radius:var(--r3);
  padding:15px;margin-bottom:10px;box-shadow:var(--sh);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  animation:cardIn .28s var(--ease) both;
  transition:transform .18s,box-shadow .18s,border-color .18s;
}
.post-card:hover{transform:translateY(-2px);box-shadow:var(--she);border-color:rgba(99,102,241,.25);}
@keyframes cardIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.post-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:11px;}
.post-author{display:flex;align-items:center;gap:10px;min-width:0;}
.avatar{
  width:38px;height:38px;min-width:38px;border-radius:12px;
  display:grid;place-items:center;font-size:13px;font-weight:800;color:#fff;
  background:linear-gradient(135deg,var(--p),var(--acc));flex-shrink:0;letter-spacing:.02em;
}
.post-meta strong{
  display:block;font-size:13.5px;font-weight:700;color:var(--t1);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px;
}
.post-meta small{display:block;margin-top:2px;font-size:11px;color:var(--tm);font-weight:500;}
.menu-dot{
  width:30px;height:30px;min-width:30px;border-radius:var(--r1);
  display:grid;place-items:center;font-size:16px;color:var(--tm);
  background:var(--grp);transition:background .12s,color .12s;
}
.menu-dot:hover{background:var(--b1);color:var(--t2);}
.post-text{
  font-size:13.5px;line-height:1.72;color:var(--t2);
  white-space:pre-wrap;word-break:break-word;margin-bottom:12px;
}
.post-actions{display:flex;align-items:center;gap:7px;padding-top:11px;border-top:1px solid var(--b1);}
.action-btn{
  height:32px;padding:0 13px;border-radius:var(--rf);
  font-size:12px;font-weight:700;color:var(--t2);
  background:var(--grp);border:1px solid var(--b1);
  display:flex;align-items:center;gap:5px;
  transition:all .15s var(--ease);letter-spacing:.01em;
}
.action-btn:hover{background:var(--b1);color:var(--t1);transform:translateY(-1px);}
.action-btn:active{transform:scale(.95);}
.action-btn.liked{background:rgba(244,63,94,.10);border-color:rgba(244,63,94,.22);color:var(--rose);}
.action-btn .cnt{font-variant-numeric:tabular-nums;}

/* FAB — bound cleanly into shell context */
.fab{
  position:absolute;
  right:16px;
  bottom:calc(var(--nav-h) + 16px + env(safe-area-inset-bottom,0px));
  z-index:300;width:56px;height:56px;border-radius:18px;
  background:linear-gradient(135deg,var(--p),var(--p3));color:#fff;
  display:grid;place-items:center;font-size:22px;
  box-shadow:var(--shb),0 8px 28px rgba(99,102,241,.40);
  border:2px solid rgba(255,255,255,.18);
  transition:transform .2s var(--spring),box-shadow .2s;
}
.fab:hover{transform:scale(1.08);box-shadow:var(--shb),0 12px 36px rgba(99,102,241,.50);}
.fab:active{transform:scale(.94);}

/* BOTTOM NAV */
.bnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:var(--shell);z-index:999;height:var(--nav-h);
  background:var(--nav);
  backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);
  border-top:1px solid var(--b1);display:flex;align-items:center;
  padding:0 4px;padding-bottom:env(safe-area-inset-bottom,0px);
}
.bnav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;height:100%;border-radius:var(--r2);padding:8px 4px;position:relative;
  transition:all .12s var(--ease);
}
.bnav-btn::before{
  content:'';position:absolute;top:7px;left:50%;transform:translateX(-50%);
  width:0;height:2.5px;background:linear-gradient(90deg,var(--p),var(--acc));
  border-radius:99px;transition:width .2s var(--spring);
}
.bnav-btn.active::before{width:26px;}
.bnav-icon{font-size:21px;line-height:1;transition:transform .15s var(--spring);}
.bnav-btn.active .bnav-icon{transform:scale(1.1);}
.bnav-btn:active .bnav-icon{transform:scale(.88);}
.bnav-label{font-size:10px;font-weight:700;color:var(--tm);transition:color .12s;}
.bnav-btn.active .bnav-label{color:var(--p);}

/* LOCKED */
.locked-box{display:none;place-items:center;min-height:60dvh;padding:24px;}
.locked-box.visible{display:grid;}
.locked-card{
  width:100%;max-width:300px;background:var(--card);border:1px solid var(--bc);
  border-radius:var(--r4);padding:30px 22px;text-align:center;box-shadow:var(--sh);
}
.locked-icon{
  width:56px;height:56px;margin:0 auto 14px;border-radius:var(--r3);
  display:grid;place-items:center;font-size:24px;
  background:rgba(244,63,94,.10);border:1px solid rgba(244,63,94,.20);
}
.locked-card h2{font-family:var(--font-display);font-size:18px;font-weight:800;color:var(--err);margin-bottom:8px;}
.locked-card p{font-size:13px;color:var(--t2);line-height:1.65;margin-bottom:20px;}
.login-btn{
  width:100%;min-height:44px;border-radius:var(--r2);
  font-size:14px;font-weight:800;color:#fff;
  background:linear-gradient(135deg,var(--p),var(--p3));
  box-shadow:var(--shb);transition:opacity .15s,transform .15s;
}
.login-btn:active{transform:scale(.98);}

/* MODALS */
.modal-ov{
  position:fixed;inset:0;z-index:9000;
  display:flex;align-items:flex-end;justify-content:center;
  background:rgba(0,0,0,.48);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  opacity:0;visibility:hidden;transition:opacity .22s,visibility .22s;
}
.modal-ov.open {opacity:1;visibility:visible;}
.modal-card{
  width:100%;max-width:var(--shell);background:var(--surface);
  border-radius:var(--r4) var(--r4) 0 0;
  border:1px solid var(--bc);border-bottom:none;box-shadow:var(--she);
  transform:translateY(100%);transition:transform .30s var(--spring);
  display:flex;flex-direction:column;max-height:90dvh;overflow:hidden;
}
.modal-ov.open .modal-card{transform:translateY(0);}
.modal-drag{width:36px;height:4px;background:var(--bi);border-radius:99px;margin:10px auto 0;}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 12px;border-bottom:1px solid var(--b1);flex-shrink:0;
}
.modal-head h3{font-family:var(--font-display);font-size:16px;font-weight:800;color:var(--t1);}
.modal-head p{
  font-size:11.5px;color:var(--tm);margin-top:2px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:250px;
}
.modal-close{
  width:30px;height:30px;border-radius:var(--r1);
  background:var(--grp);display:grid;place-items:center;
  font-size:18px;color:var(--tm);transition:background .12s;
}
.modal-close:hover{background:var(--b1);}
.modal-body{padding:14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex:1;}
textarea.compose{
  width:100%;resize:none;outline:none;border-radius:var(--r2);padding:12px 14px;
  font-size:13.5px;line-height:1.68;font-weight:400;color:var(--t1);
  background:var(--inp);border:1.5px solid var(--bc);font-family:var(--font-body);
  transition:border-color .15s,box-shadow .15s,background .15s;min-height:120px;
}
textarea.compose:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(99,102,241,.12);background:var(--surface);}
textarea.compose.over{border-color:var(--err);box-shadow:0 0 0 3px rgba(239,68,68,.10);}
.compose-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0;}
.compose-foot span{font-size:12px;font-weight:700;color:var(--tm);}
.compose-foot .warn{color:var(--err);}
.submit-btn{
  height:40px;padding:0 20px;border-radius:var(--r2);
  font-size:13px;font-weight:800;color:#fff;
  background:linear-gradient(135deg,var(--p),var(--p3));
  box-shadow:0 3px 14px rgba(99,102,241,.28);
  transition:opacity .12s,transform .12s;letter-spacing:.01em;
}
.submit-btn:hover{opacity:.92;}
.submit-btn:active{transform:scale(.96);}
.submit-btn:disabled{opacity:.32;cursor:not-allowed;box-shadow:none;}

/* COMMENTS */
.comments-list{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:10px;min-height:60px;}
.comment-input-area{padding:10px 14px 14px;border-top:1px solid var(--b1);flex-shrink:0;display:flex;flex-direction:column;gap:8px;}
.cmt-card{background:var(--inp);border:1px solid var(--b1);border-radius:var(--r2);padding:11px;transition:border-color .15s;}
.cmt-card:hover{border-color:var(--bc);}
.cmt-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;}
.cmt-info strong{font-size:12.5px;font-weight:700;color:var(--t1);display:block;}
.cmt-info small{font-size:10.5px;color:var(--tm);margin-top:1px;display:block;}
.cmt-text{font-size:13px;line-height:1.65;color:var(--t2);white-space:pre-wrap;word-break:break-word;margin-bottom:8px;}
.cmt-actions{display:flex;align-items:center;gap:6px;}
.cmt-btn{
  height:27px;padding:0 10px;border-radius:var(--rf);font-size:11px;font-weight:700;
  color:var(--tm);background:var(--grp);border:1px solid var(--b1);
  display:flex;align-items:center;gap:4px;transition:all .13s var(--ease);
}
.cmt-btn:hover{background:var(--b1);color:var(--t2);}
.cmt-btn.liked{background:rgba(244,63,94,.10);border-color:rgba(244,63,94,.20);color:var(--rose);}
.view-replies-btn{
  font-size:11.5px;font-weight:700;color:var(--p);background:none;border:none;cursor:pointer;
  margin-top:7px;display:inline-flex;align-items:center;gap:4px;transition:opacity .12s;
}
.view-replies-btn:hover{opacity:.75;}
.replies-wrap{margin:8px 0 0 10px;padding-left:12px;border-left:2px solid var(--bc);display:flex;flex-direction:column;}
.reply-row{padding:7px 0;border-bottom:1px solid var(--b1);}
.reply-row:last-child{border-bottom:none;}

/* ACTION MENU */
.menu-sheet{
  width:100%;max-width:var(--shell);background:var(--surface);
  border-radius:var(--r4) var(--r4) 0 0;
  padding:6px 10px calc(22px + env(safe-area-inset-bottom,0px));
  border:1px solid var(--bc);border-bottom:none;box-shadow:var(--she);
  transform:translateY(100%);transition:transform .30s var(--spring);
}
.modal-ov.open .menu-sheet{transform:translateY(0);}
.menu-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--tm);padding:8px 8px 4px;}
.menu-sheet button{
  width:100%;min-height:46px;border-radius:var(--r2);font-size:13.5px;font-weight:700;margin-bottom:4px;
  color:var(--t2);background:var(--grp);display:flex;align-items:center;gap:10px;padding:0 14px;
  transition:background .12s,transform .12s;border:1px solid transparent;
}
.menu-sheet button:hover{background:var(--b1);border-color:var(--b1);}
.menu-sheet button:active{transform:scale(.98);}
.menu-sheet button.danger{color:var(--err);background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.10);}
.menu-sheet button.danger:hover{background:rgba(239,68,68,.13);}

/* TOAST */
.toast-wrap{
  position:fixed;left:50%;bottom:calc(var(--nav-h) + 14px);
  transform:translateX(-50%);z-index:99999;
  width:min(90vw,400px);pointer-events:none;
}
.toast{
  display:flex;align-items:flex-start;gap:10px;background:var(--surface);color:var(--t1);
  border:1px solid var(--bc);border-radius:14px;padding:11px 14px;
  box-shadow:var(--she);animation:toastIn .22s ease;pointer-events:auto;
}
.toast-ok{border-left:4px solid var(--ok);}
.toast-err{border-left:4px solid var(--err);}
.toast-info{border-left:4px solid var(--p);}
.toast-body{flex:1;}
.toast-title{font-size:12.5px;font-weight:800;margin-bottom:1px;}
.toast-msg{font-size:11.5px;color:var(--t2);}
.toast-x{font-size:16px;color:var(--tm);cursor:pointer;}
@keyframes toastIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

.hidden{display:none!important;}
html,body,*{-webkit-user-select:none;-moz-user-select:none;user-select:none;-webkit-touch-callout:none;}
textarea.compose{-webkit-user-select:text;-moz-user-select:text;user-select:text;}
</style>
</head>
<body>
<div class="shell" id="shell">

  <header class="hdr" id="hdr">
    <div class="hdr-left">
      <div class="hdr-info">
        <div class="hdr-title">Community</div>
        <div class="hdr-sub hidden" id="hdrPosting">Posting as Student</div>
      </div>
    </div>

<script>
/* ── CACHE ── */
const CACHE_KEY    = 'af_nx_posts_cache_v2';
const CACHE_TTL_MS = 5 * 60 * 1000;

/* ── SUPABASE ── */
const STUDENT_URL = "https://afooyyydhlwngzssgqih.supabase.co";
const STUDENT_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmb295eXlkaGx3bmd6c3NncWloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NDQxMjgsImV4cCI6MjA5NDIyMDEyOH0.KG0XO0oP_2MpewHoIwTtbrKg5FkyOYRUtVzLH1MSJiE";
let _sb = null;
function loadSupabaseSDK(){
  return new Promise((res,rej)=>{
    if(typeof supabase!=='undefined'){res();return;}
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
    s.onload=res; s.onerror=()=>rej(new Error('Supabase SDK failed.'));
    document.head.appendChild(s);
  });
}
function getSb(){
  if(_sb) return _sb;
  if(typeof supabase!=='undefined') _sb=supabase.createClient(STUDENT_URL,STUDENT_KEY);
  return _sb;
}

/* ── HELPERS ── */
const $    = id => document.getElementById(id);
const show = id => $(id)&&$(id).classList.remove('hidden');
const hide = id => $(id)&&$(id).classList.add('hidden');
const isLoggedIn = ()=>!!(localStorage.getItem('af_student_email')||localStorage.getItem('af_student_mobile'));
const sKey  = ()=>localStorage.getItem('af_student_email')||localStorage.getItem('af_student_mobile')||'';
const sName = ()=>localStorage.getItem('af_student_name')||'Student';
function wordCount(t){const s=String(t||'').trim();return s?s.split(/\s+/).filter(Boolean).length:0;}
function initials(n){return String(n||'AF').trim().split(/\s+/).slice(0,2).map(v=>v.charAt(0).toUpperCase()).join('');}
function esc(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function timeAgo(v){
  if(!v) return '';
  try{
    const d=Math.floor((Date.now()-new Date(v).getTime())/1000);
    if(d<60) return 'just now';
    if(d<3600) return Math.floor(d/60)+'m ago';
    if(d<86400) return Math.floor(d/3600)+'h ago';
    if(d<604800) return Math.floor(d/86400)+'d ago';
    return new Date(v).toLocaleDateString();
  }catch(e){return '';}
}

/* ── CACHE HELPERS ── */
function cacheGet(){
  try{
    const raw=localStorage.getItem(CACHE_KEY);
    if(!raw) return {posts:[],fresh:false};
    const obj=JSON.parse(raw);
    return {posts:Array.isArray(obj.data)?obj.data:[],fresh:(Date.now()-obj.ts)<CACHE_TTL_MS};
  }catch(e){return {posts:[],fresh:false};}
}
function cacheSet(posts){try{localStorage.setItem(CACHE_KEY,JSON.stringify({ts:Date.now(),data:posts||[]}));}catch(e){}}
function cacheClear(){try{localStorage.removeItem(CACHE_KEY);}catch(e){}}

/* ── TOAST ── */
let _tTimer=null;
function showToast(msg,type='info',title=''){
  const w=$('toastWrap'); w.innerHTML='';
  if(_tTimer){clearTimeout(_tTimer);_tTimer=null;}
  const labels={ok:'Done',err:'Error',info:'Notice'};
  const d=document.createElement('div');
  d.className='toast toast-'+type;
  d.innerHTML=`<div class="toast-body"><div class="toast-title">${title||labels[type]||'Info'}</div><div class="toast-msg">${msg}</div></div><span class="toast-x" onclick="this.parentElement.remove()">×</span>`;
  w.appendChild(d);
  _tTimer=setTimeout(()=>{d.style.animation='toastIn .22s ease reverse';setTimeout(()=>d.remove(),220);},2800);
}

/* ── THEME ── */
function syncTheme(){document.documentElement.setAttribute('data-theme',localStorage.getItem('af_dark_mode')==='1'?'dark':'light');}
syncTheme();
window.addEventListener('storage',e=>{if(e.key==='af_dark_mode') syncTheme();});

/* ── NAV ── */
function goToLogin(){sessionStorage.setItem('af_last_tab','student');window.location.href='../';}

/* ── EDGE CALL ── */
async function edgeCall(payload){
  try{
    if(!navigator.onLine) return {ok:false,message:'No internet connection.'};
    await loadSupabaseSDK();
    const sb=getSb();
    if(!sb) return {ok:false,message:'SDK not ready.'};
    const fp={...payload,student_key:sKey(),student_name:sName()};
    const {data,error}=await sb.functions.invoke('af-nexus-community-v2',{body:fp});
    if(error) return {ok:false,message:error.message||'Request failed.'};
    return data||{ok:false,message:'Empty response.'};
  }catch(e){return {ok:false,message:e.message||'Request failed.'};}
}

/* ── STATE ── */
let _mode='relevant',_posts=[],_curPostId=null,
    _replyParentId=null,_menuTarget=null,_myMode=false;

/* ── UI: toggle between feed view and my-posts view ── */
function setFeedMode(){
  show('filterBar'); hide('myPostsBar');
  show('btnMyPosts');
}
function setMyPostsMode(){
  hide('filterBar'); show('myPostsBar');
  hide('btnMyPosts');
}

/* ── INIT ── */
async function init(){
  $('hdrPosting').textContent='Posting as '+sName();
  if(!isLoggedIn()){
    hide('feed'); hide('filterBar'); hide('myPostsBar'); hide('fab');
    hide('hdrPosting'); hide('hdrActions');
    $('lockedBox').classList.add('visible');
    return;
  }
  show('feed'); show('fab');
  show('hdrPosting'); show('hdrActions');
  $('lockedBox').classList.remove('visible');
  setFeedMode();

  const {posts:cached,fresh}=cacheGet();
  if(cached.length){_posts=cached;renderPosts(_posts);if(fresh) return;}
  nxLoadPosts(false);
}

/* ── LOAD POSTS ── */
async function nxLoadPosts(showSpinner=true){
  if(!isLoggedIn()){init();return;}
  if(showSpinner&&!_posts.length)
    $('postsList').innerHTML='<div class="state-msg"><div class="spinner"></div><span>Loading…</span></div>';
  const res=await edgeCall({action:'fetch_posts',mode:_mode});
  if(!res||!res.ok){
    if(!_posts.length) $('postsList').innerHTML='<div class="state-msg"><div class="icon">😕</div><span>Could not load posts.</span></div>';
    return;
  }
  _posts=Array.isArray(res.posts)?res.posts:[];
  cacheSet(_posts); renderPosts(_posts);
}

/* ── REFRESH — context-aware ── */
function nxRefresh(){
  if(_myMode){
    $('postsList').innerHTML='<div class="state-msg"><div class="spinner"></div><span>Loading…</span></div>';
    nxLoadMyPosts();
    showToast('My Posts refreshed','info','↻');
  } else {
    cacheClear(); nxLoadPosts(false);
    showToast('Feed refreshed','info','↻');
  }
}

/* ── RENDER POSTS ── */
function renderPosts(posts){
  const box=$('postsList'); if(!box) return;
  if(!posts||!posts.length){
    box.innerHTML='<div class="state-msg"><div class="icon">✨</div><span>No posts yet.<br>Be the first to share!</span></div>';
    return;
  }
  const mk=sKey();
  box.innerHTML=posts.map((p,i)=>{
    const mine=String(p.student_key||'')===String(mk||'');
    const prev=esc((p.content||'').replace(/[\n\r]/g,' ').slice(0,55)).replace(/'/g,'&#39;');
    return `<div class="post-card" style="animation-delay:${i*0.04}s">
      <div class="post-top">
        <div class="post-author">
          <div class="avatar">${esc(initials(p.student_name))}</div>
          <div class="post-meta">
            <strong>${esc(p.student_name||'Student')}</strong>
            <small>${esc(timeAgo(p.created_at))}</small>
          </div>
        </div>
        <button class="menu-dot" onclick="nxOpenMenu('post',${p.id},${mine})">⋯</button>
      </div>
      <p class="post-text">${esc(p.content||'')}</p>
      <div class="post-actions">
        <button class="action-btn" onclick="nxLikePost(${p.id})">❤ <span class="cnt">${p.likes_count||0}</span></button>
        <button class="action-btn" onclick="nxOpenComments(${p.id},'${prev}')">💬 <span class="cnt">${p.comments_count||0}</span></button>
      </div>
    </div>`;
  }).join('');
}

/* ── MODE ── */
function nxSetMode(m){
  _mode=m==='recent'?'recent':'relevant';
  $('pillRelevant').classList.toggle('active',_mode==='relevant');
  $('pillRecent').classList.toggle('active',_mode==='recent');
  cacheClear(); nxLoadPosts(false);
}

/* ── SCROLL LOCK ── */
function lockScroll(){ /* Managed natively via uniform layout architecture */ }
function unlockScroll(){ /* Managed natively via uniform layout architecture */ }

/* ── COMPOSER ── */
function nxOpenComposer(){
  if(!isLoggedIn()){goToLogin();return;}
  const inp=$('postInput');
  if(inp){inp.value='';nxPostTyping();setTimeout(()=>inp.focus(),80);}
  $('composerModal').classList.add('open');lockScroll();
}
function nxCloseComposer(){$('composerModal').classList.remove('open');unlockScroll();}
function nxPostTyping(){
  const v=$('postInput').value,w=wordCount(v),ex=w>80;
  $('postCount').textContent=w+' / 80 words';
  $('postCount').classList.toggle('warn',ex);
  $('postSubmitBtn').disabled=ex||w===0;
  $('postInput').classList.toggle('over',ex);
}
async function nxCreatePost(){
  const inp=$('postInput'),content=inp.value.trim();
  if(!content||wordCount(content)>80) return;
  $('postSubmitBtn').disabled=true;
  const res=await edgeCall({action:'create_post',content});
  if(!res||!res.ok){showToast(res?.message||'Could not post.','err','Error');$('postSubmitBtn').disabled=false;return;}
  inp.value=''; nxCloseComposer();
  if(res.post){_posts=[res.post,...(_posts||[])];cacheSet(_posts);renderPosts(_posts);}
  nxLoadPosts(false);
  showToast('Posted successfully!','ok','✓');
}

/* ── LIKE POST ── */
async function nxLikePost(pid){
  if(!sKey()) return;
  _posts=_posts.map(p=>String(p.id)!==String(pid)?p:{...p,likes_count:Number(p.likes_count||0)+1});
  cacheSet(_posts); renderPosts(_posts);
  await edgeCall({action:'toggle_post_like',post_id:pid});
  nxLoadPosts(false);
}

/* ── COMMENTS ── */
function nxOpenComments(pid,preview){
  _curPostId=pid;
  const inp=$('commentInput');
  if(inp){inp.value='';nxCommentTyping();}
  $('commentsPreview').textContent=preview?preview+'…':'Join the discussion';
  $('commentsModal').classList.add('open');lockScroll();
  nxLoadComments(pid);
}
function nxCloseComments(){$('commentsModal').classList.remove('open');_curPostId=null;unlockScroll();}
async function nxLoadComments(pid){
  const box=$('commentsList'); if(!box) return;
  box.innerHTML='<div class="state-msg"><div class="spinner"></div></div>';
  const res=await edgeCall({action:'fetch_comments',post_id:pid});
  if(!res||!res.ok){box.innerHTML='<div class="state-msg"><span>Could not load.</span></div>';return;}
  renderComments(Array.isArray(res.comments)?res.comments:[]);
}
function renderComments(list){
  const box=$('commentsList'); if(!box) return;
  if(!list||!list.length){box.innerHTML='<div class="state-msg"><div class="icon">💬</div><span>No comments yet.</span></div>';return;}
  const byP={};
  list.forEach(c=>{const k=c.parent_comment_id?String(c.parent_comment_id):'root';if(!byP[k])byP[k]=[];byP[k].push(c);});
  const root=byP.root||[]; const mk=sKey();
  box.innerHTML=root.map(c=>{
    const mine=String(c.student_key||'')===String(mk||'');
    const replies=byP[String(c.id)]||[];
    const prev=esc((c.content||'').slice(0,45)).replace(/'/g,'&#39;');
    return `<div class="cmt-card">
      <div class="cmt-top">
        <div class="cmt-info"><strong>${esc(c.student_name||'Student')}</strong><small>${esc(timeAgo(c.created_at))}</small></div>
        <button class="menu-dot" style="width:26px;height:26px;font-size:14px;" onclick="nxOpenMenu('comment',${c.id},${mine})">⋯</button>
      </div>
      <p class="cmt-text">${esc(c.content||'')}</p>
      <div class="cmt-actions">
        <button class="cmt-btn" onclick="nxLikeComment(${c.id})">❤ ${c.likes_count||0}</button>
        <button class="cmt-btn" onclick="nxOpenReply(${c.id},'${prev}')">Reply</button>
      </div>
      ${replies.length?`
        <button class="view-replies-btn" onclick="nxToggleReplies(${c.id})">▸ ${replies.length} repl${replies.length===1?'y':'ies'}</button>
        <div id="rep-${c.id}" class="replies-wrap hidden">
          ${replies.map(r=>{
            const rm=String(r.student_key||'')===String(mk||'');
            const rp=esc((r.content||'').slice(0,45)).replace(/'/g,'&#39;');
            return `<div class="reply-row">
              <div class="cmt-top">
                <div class="cmt-info"><strong>${esc(r.student_name||'Student')}</strong><small>${esc(timeAgo(r.created_at))}</small></div>
                <button class="menu-dot" style="width:26px;height:26px;font-size:14px;" onclick="nxOpenMenu('comment',${r.id},${rm})">⋯</button>
              </div>
              <p class="cmt-text">${esc(r.content||'')}</p>
              <div class="cmt-actions">
                <button class="cmt-btn" onclick="nxLikeComment(${r.id})">❤ ${r.likes_count||0}</button>
                <button class="cmt-btn" onclick="nxOpenReply(${r.id},'${rp}')">Reply</button>
              </div>
            </div>`;
          }).join('')}
        </div>`:''}
    </div>`;
  }).join('');
}
function nxToggleReplies(cId){
  const b=$('rep-'+cId); if(!b) return;
  b.classList.toggle('hidden');
  const btn=b.previousElementSibling;
  if(btn){const h=b.classList.contains('hidden'),m=btn.textContent.match(/\d+/),n=m?m[0]:'';btn.textContent=(h?'▸ ':'▾ ')+n+' repl'+(Number(n)===1?'y':'ies');}
}
function nxCommentTyping(){
  const v=$('commentInput').value,w=wordCount(v),ex=w>80;
  $('commentCount').textContent=w+' / 80 words';
  $('commentSubmitBtn').disabled=ex||w===0;
  $('commentInput').classList.toggle('over',ex);
}
async function nxCreateComment(){
  const inp=$('commentInput'),content=inp.value.trim();
  if(!content||wordCount(content)>80||!_curPostId) return;
  $('commentSubmitBtn').disabled=true;
  const res=await edgeCall({action:'create_comment',post_id:_curPostId,parent_comment_id:null,content});
  if(!res||!res.ok){showToast(res?.message||'Could not comment.','err','Error');$('commentSubmitBtn').disabled=false;return;}
  inp.value=''; nxCommentTyping();
  _posts=_posts.map(p=>String(p.id)===String(_curPostId)?{...p,comments_count:Number(p.comments_count||0)+1}:p);
  cacheSet(_posts); renderPosts(_posts);
  nxLoadComments(_curPostId); nxLoadPosts(false);
}
async function nxLikeComment(cId){
  if(!sKey()) return;
  await edgeCall({action:'toggle_comment_like',comment_id:cId});
  if(_curPostId) nxLoadComments(_curPostId);
}

/* ── REPLY ── */
function nxOpenReply(pid,preview){
  _replyParentId=pid;
  $('replyTarget').textContent=preview?'Replying to: '+preview:'Reply to comment';
  const inp=$('replyInput'); if(inp){inp.value='';nxReplyTyping();setTimeout(()=>inp.focus(),80);}
  $('replyModal').classList.add('open');lockScroll();
}
function nxCloseReply(){$('replyModal').classList.remove('open');_replyParentId=null;unlockScroll();}
function nxReplyTyping(){
  const v=$('replyInput').value,w=wordCount(v),ex=w>80;
  $('replyCount').textContent=w+' / 80 words';
  $('replySubmitBtn').disabled=ex||w===0;
  $('replyInput').classList.toggle('over',ex);
}
async function nxCreateReply(){
  const inp=$('replyInput'),content=inp.value.trim();
  if(!content||wordCount(content)>80||!_curPostId||!_replyParentId) return;
  $('replySubmitBtn').disabled=true;
  const res=await edgeCall({action:'create_comment',post_id:_curPostId,parent_comment_id:_replyParentId,content});
  if(!res||!res.ok){showToast(res?.message||'Could not reply.','err','Error');$('replySubmitBtn').disabled=false;return;}
  nxCloseReply();
  _posts=_posts.map(p=>String(p.id)===String(_curPostId)?{...p,comments_count:Number(p.comments_count||0)+1}:p);
  cacheSet(_posts); renderPosts(_posts);
  nxLoadComments(_curPostId); nxLoadPosts(false);
}

/* ── MY POSTS ── */
function nxOpenMyPosts(){
  _myMode=true;
  setMyPostsMode();
  $('postsList').innerHTML='<div class="state-msg"><div class="spinner"></div><span>Loading…</span></div>';
  nxLoadMyPosts();
}
function nxCloseMyPosts(){
  _myMode=false;
  setFeedMode();
  renderPosts(_posts);
}
async function nxLoadMyPosts(){
  const res=await edgeCall({action:'my_posts'});
  if(!res||!res.ok){$('postsList').innerHTML='<div class="state-msg"><span>Could not load.</span></div>';return;}
  renderPosts(Array.isArray(res.posts)?res.posts:[]);
}

/* ── MENU ── */
function nxOpenMenu(type,id,mine){
  _menuTarget={type,id,isMine:!!mine};
  $('menuDeleteBtn').style.display=mine?'flex':'none';
  $('menuModal').classList.add('open');lockScroll();
}
function nxCloseMenu(){$('menuModal').classList.remove('open');_menuTarget=null;unlockScroll();}
async function nxDeleteTarget(){
  if(!_menuTarget||!_menuTarget.isMine){nxCloseMenu();return;}
  const t=_menuTarget; let res=null;
  if(t.type==='post')    res=await edgeCall({action:'delete_post',post_id:t.id});
  if(t.type==='comment') res=await edgeCall({action:'delete_comment',comment_id:t.id});
  if(!res||!res.ok){showToast(res?.message||'Could not delete.','err','Error');return;}
  nxCloseMenu();
  if(t.type==='post'){_posts=_posts.filter(p=>String(p.id)!==String(t.id));cacheSet(_posts);renderPosts(_posts);}
  if(_curPostId) nxLoadComments(_curPostId);
  nxLoadPosts(false);
  if(_myMode) nxLoadMyPosts();
  showToast('Deleted','ok','✓');
}

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  if(e.key!=='Escape') return;
  if($('menuModal').classList.contains('open'))    {nxCloseMenu();return;}
  if($('replyModal').classList.contains('open'))   {nxCloseReply();return;}
  if($('commentsModal').classList.contains('open')){nxCloseComments();return;}
  if($('composerModal').classList.contains('open')){nxCloseComposer();return;}
});

/* ── BOOT ── */
document.addEventListener('DOMContentLoaded',init);
window.addEventListener('storage',e=>{
  if(['af_student_email','af_student_mobile','af_student_name'].includes(e.key)) init();
});
</script>
