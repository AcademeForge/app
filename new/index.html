<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function(){
  var dark = localStorage.getItem('af_dark_mode') === '1';
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
})();
</script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#4f46e5"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>AcademeForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="icon" type="image/jpeg" href="/IMG/AF%20LOGO%202.jpeg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Sora:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════════════════════
   TOKENS — unchanged from the original Explore / Dashboard
   pages so every existing screen keeps its exact identity.
   ════════════════════════════════════════════════════════ */
:root {
  --p:#4f46e5; --p2:#3730a3; --pl:#818cf8; --p-soft:rgba(79,70,229,.10);
  --acc:#06b6d4; --acc2:#f59e0b;
  --err:#ef4444; --ok:#22c55e;
  --bg:#f0f2ff; --shell:#fff;
  --card:rgba(255,255,255,.85); --card-s:#fff;
  --nav:rgba(255,255,255,.94); --hdr:rgba(255,255,255,.97);
  --inp:#f4f5fb; --grp:rgba(79,70,229,.06);
  --t1:#0f0e2a; --t2:#4b5563; --tm:#9ca3af;
  --b1:rgba(79,70,229,.12); --bc:rgba(79,70,229,.18);
  --sh:0 2px 12px rgba(79,70,229,.08),0 1px 3px rgba(0,0,0,.04);
  --she:0 8px 32px rgba(79,70,229,.14);
  --shell-border:#c7cbea;
  --nav-h:60px;
  --hdr-h:56px;
  --fd:'Sora',sans-serif;
  --fb:'Inter',sans-serif;
  --ok-soft:rgba(34,197,94,.12); --ok-b:rgba(34,197,94,.28);
  --prog-soft:rgba(245,158,11,.12); --prog-b:rgba(245,158,11,.28);
}
[data-theme="dark"] {
  --bg:#0c0b1d; --shell:#120f2a;
  --card:rgba(30,27,60,.82); --card-s:#1e1b3c;
  --nav:rgba(18,15,42,.97); --hdr:rgba(18,15,42,.98);
  --inp:#1e1b3c; --grp:rgba(129,140,248,.08);
  --t1:#f0eeff; --t2:#a5a3c2; --tm:#6b6a8a;
  --b1:rgba(129,140,248,.14); --bc:rgba(129,140,248,.22);
  --sh:0 2px 12px rgba(0,0,0,.32); --she:0 8px 32px rgba(0,0,0,.44);
  --shell-border:#202637;
  --p-soft:rgba(129,140,248,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:15px;-webkit-text-size-adjust:100%}
html,body{height:100%;min-height:100dvh}
body{
  font-family:var(--fb); background:var(--bg); color:var(--t1);
  -webkit-font-smoothing:antialiased;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;height:100dvh;
}
[data-theme="light"]{color-scheme:light}
[data-theme="dark"]{color-scheme:dark}
button{font-family:var(--fb);cursor:pointer;border:none;background:none;color:inherit}
a{text-decoration:none;color:inherit}
img{display:block;max-width:100%}
ul{list-style:none}
*,body,html{-webkit-user-select:none;-moz-user-select:none;user-select:none}
input,textarea{-webkit-user-select:text;-moz-user-select:text;user-select:text}

/* ── SHELL / device frame (preserved) ── */
.af-shell{width:min(100%,460px);height:100dvh;background:var(--shell);position:relative;display:flex;flex-direction:column;overflow:hidden}
@media(min-width:520px){
  body{background:var(--bg)}
  .af-shell{height:min(900px,calc(100dvh - 32px));border:8px solid var(--shell-border);border-radius:44px;box-shadow:0 30px 90px rgba(0,0,0,.28)}
  [data-theme="dark"] .af-shell{box-shadow:0 30px 90px rgba(0,0,0,.75)}
}

/* ════════════════════════════════════════════════════════
   SHARED APP HEADER — one header, content swaps per tab
   ════════════════════════════════════════════════════════ */
.af-header{
  flex-shrink:0;min-height:var(--hdr-h);background:var(--hdr);
  backdrop-filter:blur(16px) saturate(160%);-webkit-backdrop-filter:blur(16px) saturate(160%);
  border-bottom:1px solid var(--b1);
  display:flex;flex-direction:column;justify-content:center;
  padding:8px 14px;gap:8px;z-index:200;position:relative;
}
.af-header-row{display:flex;align-items:center;gap:10px;height:36px}
.af-header-title{font-family:var(--fd);font-size:15px;font-weight:800;color:var(--t1);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.af-icon-btn{width:32px;height:32px;border-radius:10px;background:var(--grp);border:1px solid var(--b1);color:var(--t1);font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.af-icon-btn:active{opacity:.7}
.af-icon-btn.accent{background:var(--p);border-color:var(--p);color:#fff}

/* search row (Explore) */
.af-search-row{display:flex;align-items:center;gap:8px}
.af-search-box{flex:1;height:36px;border-radius:11px;background:var(--inp);border:1.5px solid var(--b1);display:flex;align-items:center;gap:8px;padding:0 12px;min-width:0}
.af-search-box input{flex:1;min-width:0;background:none;border:none;outline:none;color:var(--t1);font-size:13px;font-weight:500;font-family:var(--fb)}
.af-search-box input::placeholder{color:var(--tm)}
.af-search-ic{font-size:13px;color:var(--tm);flex-shrink:0}

/* dashboard profile row */
.af-dash-profile{display:flex;align-items:center;gap:10px}
.af-dash-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--p2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.af-dash-name{font-family:var(--fd);font-size:14px;font-weight:800;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.af-dash-namewrap{flex:1;min-width:0}
.af-dash-sub{font-size:10.5px;color:var(--tm);font-weight:600;margin-top:1px}
.af-cert-badge{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--p);background:var(--p-soft);border:1px solid var(--bc);border-radius:99px;padding:5px 11px;flex-shrink:0}

/* ════════════════════════════════════════════════════════
   CAROUSEL — horizontal swipe between primary sections
   ════════════════════════════════════════════════════════ */
.af-carousel-viewport{flex:1;min-height:0;overflow:hidden;position:relative}
.af-carousel{display:flex;height:100%;width:500%;will-change:transform}
.af-carousel.animating{transition:transform .3s cubic-bezier(.22,.61,.36,1)}
.af-slot{width:20%;height:100%;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;position:relative}

.af-redirect-slot{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--tm)}
.af-redirect-slot .spin-ic{width:26px;height:26px;border:2.5px solid var(--bc);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite}
.af-redirect-slot span.lbl{font-size:12.5px;font-weight:700}

.af-page{
  flex:1;overflow-y:scroll;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain; min-height:0;
  padding-bottom:calc(var(--nav-h) + 18px + env(safe-area-inset-bottom,0px));
}
.af-page::-webkit-scrollbar{width:2px}
.af-page::-webkit-scrollbar-thumb{background:var(--bc);border-radius:99px}

/* ── BOTTOM NAV (shared, single instance) ── */
.af-bnav{
  position:absolute;bottom:0;left:0;right:0;z-index:999;height:var(--nav-h);
  background:var(--nav);border-top:1px solid var(--b1);
  display:flex;align-items:center;padding:0 4px;padding-bottom:env(safe-area-inset-bottom,0px);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
}
.af-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;height:100%;border-radius:10px;padding:6px 4px;position:relative;transition:transform .15s ease}
.af-nav-btn::before{content:'';position:absolute;top:5px;left:50%;transform:translateX(-50%);width:0;height:2px;background:var(--p);border-radius:99px;transition:width .15s ease}
.af-nav-btn.active::before{width:20px}
.af-nav-btn.active{transform:translateY(-1px)}
.af-nav-icon{font-size:18px;line-height:1}
.af-nav-label{font-size:9.5px;font-weight:700;color:var(--tm)}
.af-nav-btn.active .af-nav-label{color:var(--p)}
.af-nav-btn.active .af-nav-icon{filter:saturate(1.3)}

/* Loading skeleton */
.af-skel{background:linear-gradient(90deg,var(--grp) 25%,var(--b1) 50%,var(--grp) 75%);background-size:200% 100%;animation:skel 1.4s ease infinite;border-radius:14px}
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite}

.af-empty{padding:40px 20px;text-align:center;color:var(--tm);font-size:13px;display:flex;flex-direction:column;align-items:center;gap:10px}
.af-empty span{font-size:30px}
.af-empty strong{color:var(--t2);font-size:13.5px}
</style>
</head>
<body>
<style>
/* ════════════════════════════════════════════════════════
   EXPLORE — filter dropdown, sort tabs, course cards
   ════════════════════════════════════════════════════════ */
.af-body{padding:12px 14px 14px;display:flex;flex-direction:column;gap:12px}

.af-filter-menu{
  position:absolute;left:14px;right:14px;z-index:250;
  background:var(--card-s);border:1.5px solid var(--b1);border-radius:14px;
  box-shadow:var(--she);max-height:280px;overflow-y:auto;display:none;
}
.af-filter-menu.open{display:block}
.af-filter-opt{padding:12px 16px;font-size:13.5px;font-weight:600;color:var(--t1);border-bottom:1px solid var(--b1)}
.af-filter-opt:last-child{border-bottom:none}
.af-filter-opt.sel{background:var(--p-soft);color:var(--p)}
.af-filter-opt:active{background:var(--grp)}

.af-tabs{display:flex;flex-direction:column;gap:7px}
.af-tabs-row{display:flex}
.af-tab-btn{flex:1;text-align:center;font-size:12.5px;font-weight:700;color:var(--tm);padding-bottom:7px}
.af-tab-btn.active{color:var(--t1)}
.af-tabs-track{height:3px;background:var(--b1);border-radius:99px;display:flex;overflow:hidden}
.af-tabs-indicator{height:100%;width:50%;background:linear-gradient(90deg,var(--p),var(--acc));border-radius:99px;transition:transform .25s ease}

.af-chip-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.af-chip-row::-webkit-scrollbar{display:none}
.af-chip{flex-shrink:0;font-size:11.5px;font-weight:700;padding:7px 13px;border-radius:99px;background:var(--inp);border:1.5px solid var(--b1);color:var(--t2);display:flex;align-items:center;gap:5px;white-space:nowrap}
.af-chip.sel{background:var(--p);border-color:var(--p);color:#fff}

.af-course-card{
  border-radius:15px;overflow:hidden;background:var(--card-s);
  border:1.5px solid var(--bc);box-shadow:var(--sh);width:100%;text-align:left;
  display:flex;gap:0;
}
.af-course-card:active{opacity:.92}
.af-course-img{width:92px;flex-shrink:0;aspect-ratio:1;object-fit:cover;background:var(--grp)}
.af-course-body{padding:11px 12px;display:flex;flex-direction:column;gap:5px;min-width:0;justify-content:center}
.af-course-cat{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--tm)}
.af-course-title{font-family:var(--fd);font-size:13.5px;font-weight:800;color:var(--t1);line-height:1.25;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.af-course-pills{display:flex;gap:6px;margin-top:2px;flex-wrap:wrap}
.af-pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px}
.af-pill-done{background:var(--ok-soft);color:#15803d}
[data-theme="dark"] .af-pill-done{color:#4ade80}
.af-pill-progress{background:rgba(245,158,11,.14);color:#b45309}
[data-theme="dark"] .af-pill-progress{color:#fbbf24}
.af-pill-offline{background:var(--grp);color:var(--t2);display:flex;align-items:center;gap:4px}

/* ── COURSE DETAIL ── */
.af-detail-hero{width:100%;aspect-ratio:16/9;object-fit:cover;flex-shrink:0}
.af-detail-body{padding:16px 16px 26px;display:flex;flex-direction:column;gap:13px}
.af-detail-cat{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--pl)}
.af-detail-title{font-family:var(--fd);font-size:21px;font-weight:900;color:var(--t1);line-height:1.15;letter-spacing:-.02em}
.af-detail-sub{font-size:13px;color:var(--t2);line-height:1.55}
.af-meta-list{display:flex;flex-direction:column;gap:7px;padding:12px 13px;background:var(--grp);border:1px solid var(--b1);border-radius:13px}
.af-meta-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t2);font-weight:600}
.af-meta-item span.ic{font-size:14px}
.af-btn-primary{
  width:100%;height:50px;border-radius:14px;border:none;
  background:linear-gradient(135deg,var(--p) 0%,var(--p2) 100%);
  color:#fff;font-size:14.5px;font-weight:700;box-shadow:0 4px 16px rgba(79,70,229,.35);
}
.af-btn-primary:active{transform:scale(.98);opacity:.9}
.af-completed-banner{
  display:flex;align-items:flex-start;gap:11px;padding:13px 13px;
  background:var(--ok-soft);border:1.5px solid var(--ok-b);border-radius:14px;
}
.af-completed-banner .ic{
  width:25px;height:25px;border-radius:50%;background:var(--ok);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0;margin-top:1px;
}
.af-completed-title{font-size:13px;font-weight:800;color:var(--t1)}
.af-completed-sub{font-size:11.5px;color:var(--t2);line-height:1.5;margin-top:3px}
.af-btn-secondary-outline{
  width:100%;height:48px;border-radius:14px;background:transparent;
  border:1.5px solid var(--bc);color:var(--t1);font-size:14px;font-weight:700;
}
.af-btn-secondary-outline:active{background:var(--grp)}
.af-progress-wrap{display:flex;flex-direction:column;gap:6px}
.af-progress-track{height:6px;background:var(--b1);border-radius:99px;overflow:hidden}
.af-progress-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--acc));border-radius:99px;transition:width .3s ease}
.af-progress-label{font-size:11px;color:var(--tm);font-weight:600;display:flex;justify-content:space-between}
.af-detail-desc{font-size:13px;color:var(--t2);line-height:1.7}
.af-section-h{font-family:var(--fd);font-size:14.5px;font-weight:800;color:var(--t1);margin-top:2px}

/* ── MODULE LIST ── */
.af-mod-head{padding:14px 16px 4px;display:flex;flex-direction:column;gap:9px;flex-shrink:0}
.af-mod-progress-top{height:5px;background:var(--b1);border-radius:99px;overflow:hidden}
.af-mod-progress-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--acc));border-radius:99px;transition:width .3s ease}
.af-mod-progress-text{font-size:11px;color:var(--tm);font-weight:700;text-align:right}
.af-mod-course-card{display:flex;gap:11px;align-items:center;padding:10px 0}
.af-mod-course-thumb{width:50px;height:50px;border-radius:12px;object-fit:cover;flex-shrink:0;background:var(--grp)}
.af-mod-course-title{font-family:var(--fd);font-size:14px;font-weight:800;color:var(--t1);line-height:1.25}
.af-mod-count{font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--tm);padding:9px 0 5px;border-top:1px solid var(--b1);margin-top:3px}
.af-mod-list{padding:0 16px 24px;display:flex;flex-direction:column}
.af-mod-row{display:flex;align-items:flex-start;gap:11px;padding:12px 0;border-bottom:1px solid var(--b1);width:100%;text-align:left}
.af-mod-row:last-child{border-bottom:none}
.af-mod-radio{
  width:20px;height:20px;border-radius:50%;border:2px solid var(--bc);flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;
}
.af-mod-radio.done{background:var(--ok);border-color:var(--ok)}
.af-mod-radio.done::after{content:'✓';color:#fff;font-size:10.5px;font-weight:900}
.af-mod-icon{font-size:14px;color:var(--tm);flex-shrink:0;margin-top:1px;width:17px;text-align:center}
.af-mod-row-title{font-size:13.5px;font-weight:600;color:var(--t1);line-height:1.4;flex:1}
.af-mod-row.locked .af-mod-row-title{color:var(--tm)}
.af-mod-optional{font-size:9.5px;font-weight:700;color:var(--tm);background:var(--grp);padding:2px 8px;border-radius:99px;margin-left:6px;flex-shrink:0}

/* ── LESSON PLAYER ── */
.af-lesson-progress-row{display:flex;align-items:center;gap:10px;padding:9px 16px;flex-shrink:0;border-bottom:1px solid var(--b1)}
.af-lesson-progress-track{flex:1;height:5px;background:var(--b1);border-radius:99px;overflow:hidden}
.af-lesson-progress-fill2{height:100%;background:linear-gradient(90deg,var(--p),var(--acc));border-radius:99px;transition:width .3s ease}
.af-lesson-progress-pct{font-size:11px;font-weight:700;color:var(--tm);flex-shrink:0}

.af-lesson-banner{width:100%;aspect-ratio:16/8;object-fit:cover;flex-shrink:0}
.af-lesson-body{padding:18px 16px 10px;display:flex;flex-direction:column;gap:14px}
.af-block-heading{font-family:var(--fd);font-size:19px;font-weight:800;color:var(--t1);line-height:1.25}
.af-block-paragraph{font-size:13.5px;color:var(--t2);line-height:1.75}
.af-block-callout{
  background:var(--p-soft);border:1.5px solid var(--bc);border-radius:13px;
  padding:13px 14px;font-size:13px;color:var(--t1);line-height:1.6;font-weight:500;
}
.af-block-image{width:100%;border-radius:13px;object-fit:cover;max-height:220px}
.af-block-list{display:flex;flex-direction:column;gap:8px;padding-left:2px}
.af-block-list-item{display:flex;gap:10px;font-size:13px;color:var(--t2);line-height:1.55}
.af-block-list-item::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--p);flex-shrink:0;margin-top:6px}

/* ── CHECK WIDGET ── */
.af-check-card{
  margin:6px 16px 0;padding:16px 15px;border-radius:16px;
  background:linear-gradient(160deg,var(--p-soft),transparent);
  border:1.5px solid var(--bc);display:flex;flex-direction:column;gap:13px;
}
.af-check-title{font-size:12.5px;font-weight:700;color:var(--t1)}
.af-check-equation{
  font-family:var(--fd);font-size:24px;font-weight:800;color:var(--t1);
  display:flex;align-items:center;justify-content:center;gap:9px;
}
.af-check-input{
  width:68px;height:50px;border-radius:13px;border:2px solid var(--bc);
  background:var(--inp);text-align:center;font-size:20px;font-weight:800;
  color:var(--t1);font-family:var(--fd);outline:none;
}
.af-check-input:focus{border-color:var(--p)}
.af-check-input.wrong{border-color:var(--err);animation:shake .3s}
.af-check-input.right{border-color:var(--ok)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.af-check-btn{
  height:42px;border-radius:12px;background:var(--t1);color:var(--shell);
  font-size:13px;font-weight:700;
}
.af-check-btn:active{opacity:.85}
.af-check-msg{font-size:12px;font-weight:600;text-align:center;min-height:16px}
.af-check-msg.err{color:var(--err)}
.af-check-msg.ok{color:var(--ok)}

.af-lesson-footer{padding:16px 16px 24px;flex-shrink:0}
.af-btn-continue{
  width:100%;height:50px;border-radius:14px;border:none;
  background:linear-gradient(135deg,var(--p) 0%,var(--p2) 100%);
  color:#fff;font-size:14.5px;font-weight:700;box-shadow:0 4px 16px rgba(79,70,229,.35);
  transition:opacity .2s,transform .2s;
}
.af-btn-continue:active{transform:scale(.98)}
.af-btn-continue:disabled{opacity:.4;pointer-events:none}
.af-btn-continue.ready{animation:pulseGlow 1.6s ease infinite}
@keyframes pulseGlow{0%,100%{box-shadow:0 4px 16px rgba(79,70,229,.35)}50%{box-shadow:0 4px 24px rgba(79,70,229,.6)}}
.af-lock-hint{text-align:center;font-size:11px;color:var(--tm);margin-top:8px;font-weight:600}

/* Survey / poll */

      <div class="af-search-row">
        <div class="af-search-box">
          <span class="af-search-ic">🔍</span>
          <input
            id="exploreSearchInput"
            type="text"
            placeholder="Search courses"
            value="${esc(_searchQuery)}"
            oninput="onSearchInput(this.value)"
          />
        </div>
        <button class="af-icon-btn" id="filterBtn" onclick="toggleFilterMenu()">⚙</button>
      </div>`;
  } else {
    const titles = {
      home:'Home',
      batches:'Batches',
      community:'Community',
      settings:'Settings'
    };

    hdr.innerHTML = `
      <div class="af-header-row">
        <div class="af-header-title">${titles[tab] || ''}</div>
      </div>`;
  }
}

function goToIndex(idx, animate){
  idx = Math.max(0, Math.min(TABS.length-1, idx));

  const tab = TABS[idx];

  _tabIndex = idx;
  _carouselWidth = carouselSlotWidth();

  applyCarouselTransform(-idx*_carouselWidth, animate);

  updateBnavActive(tab);
  renderHeader(tab);

  if(tab==='explore' && !_exploreLoaded){
    _exploreLoaded = true;
    loadCourses();
  }

  if(ROUTES[tab]){
    const delay = animate ? 360 : 0;

    setTimeout(()=>{
      window.location.href = ROUTES[tab];
    }, delay);
  }
}

function navTap(tab){
  const idx = TABS.indexOf(tab);

  if(idx===-1) return;

  if(ROUTES[tab]){
    window.location.href = ROUTES[tab];
    return;
  }

  goToIndex(idx, true);
}

window.navTap = navTap;

/* ── SWIPE GESTURE — horizontal only, never fights vertical scroll ── */

(function initSwipe(){

  let active = false;
  let locked = null;
  let x0 = 0;
  let y0 = 0;
  let startPx = 0;

  const THRESHOLD_RATIO = 0.16;

  function overlayOpen(){
    return document.querySelector('.af-overlay.open') !== null;
  }

  viewport.addEventListener('touchstart', e=>{

    if(overlayOpen()) return;

    const t = e.touches[0];

    x0 = t.clientX;
    y0 = t.clientY;

    active = true;
    locked = null;

    _carouselWidth = carouselSlotWidth();
    startPx = -_tabIndex * _carouselWidth;

  }, {passive:true});

  viewport.addEventListener('touchmove', e=>{

    if(!active || overlayOpen()) return;

    const t = e.touches[0];

    const dx = t.clientX - x0;
    const dy = t.clientY - y0;

    if(locked===null){
      if(Math.abs(dx)>8 || Math.abs(dy)>8){
        locked = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
      }
    }

    if(locked==='h'){

      if(e.cancelable) e.preventDefault();

      let next = startPx + dx;

      const min = -(TABS.length-1) * _carouselWidth;
      const max = 0;

      if(next > max){
        next = max + (next-max)*0.35;
      }

      if(next < min){
        next = min + (next-min)*0.35;
      }

      applyCarouselTransform(next, false);
    }

  }, {passive:false});

  viewport.addEventListener('touchend', e=>{

    if(!active) return;

    active = false;

    if(locked!=='h'){
      locked = null;
      return;
    }

    const t = e.changedTouches[0];
    const dx = t.clientX - x0;

    let targetIdx = _tabIndex;

    if(Math.abs(dx) > _carouselWidth * THRESHOLD_RATIO){
      targetIdx += dx < 0 ? 1 : -1;
    }

    goToIndex(targetIdx, true);

    locked = null;

  }, {passive:true});

  window.addEventListener('resize', ()=>{

    _carouselWidth = carouselSlotWidth();

    applyCarouselTransform(
      -_tabIndex * _carouselWidth,
      false
    );

  });

})();

/* ════════════════════════════════════════════════════════
   EXPLORE — catalog, filter, search, sort
   (data-fetching logic, payload shapes & action names are
   byte-identical to the original course-catalog-af calls)

let _categories = ['All Courses'];
let _selectedCategory = 'All Courses';
let _sortMode = 'newest'; // newest | popular
let _allCourses = [];
let _searchQuery = '';

function onSearchInput(val){
  _searchQuery = val;
  renderCourseList();
}
window.onSearchInput = onSearchInput;

function toggleFilterMenu(){
  const menu = $('filterMenu');
  const opening = !menu.classList.contains('open');
  if(opening){
    const hdr = $('afHeader');
    const shellTop = $('afShell').getBoundingClientRect().top;
    const hdrBottom = hdr.getBoundingClientRect().bottom;
    menu.style.top = (hdrBottom - shellTop + 8) + 'px';
  }
  menu.classList.toggle('open', opening);
  $('filterBtn') && $('filterBtn').classList.toggle('open', opening);
}
window.toggleFilterMenu = toggleFilterMenu;

function renderFilterMenu(){
  const menu = $('filterMenu');
  menu.innerHTML = _categories.map(c =>
    `<div class="af-filter-opt ${c===_selectedCategory?'sel':''}" onclick="selectCategory('${c.replace(/'/g,"\\'")}')">${c}</div>`
  ).join('');
  renderActiveFilterRow();
}

function renderActiveFilterRow(){
  const row = $('activeFilterRow');
  if(!row) return;
  if(_selectedCategory === 'All Courses'){ row.style.display='none'; row.innerHTML=''; return; }
  row.style.display='flex';
  row.style.gap='7px';
  row.innerHTML = `<button class="af-chip sel" onclick="selectCategory('All Courses')">${escapeHtml(_selectedCategory)} ✕</button>`;
}

function selectCategory(cat){
  _selectedCategory = cat;
  toggleFilterMenu();
  loadCourses();
}
window.selectCategory = selectCategory;

function setSort(mode){
  _sortMode = mode;
  $('tabNewest').classList.toggle('active', mode==='newest');
  $('tabPopular').classList.toggle('active', mode==='popular');
  $('tabsIndicator').style.transform = mode==='newest' ? 'translateX(0%)' : 'translateX(100%)';
  renderCourseList();
}
window.setSort = setSort;

async function loadCourses(){
  $('courseList').innerHTML = '<div class="af-skel" style="height:90px"></div><div class="af-skel" style="height:90px"></div>';
  const data = await callCatalog('list_courses', {
    category: _selectedCategory,
    student_id: getStudentId()
  });
  if(!data.ok){
    $('courseList').innerHTML = `<div class="af-empty"><span>⚠️</span>${escapeHtml(data.message||'Could not load courses.')}</div>`;
    return;
  }
  _categories = ['All Courses', ...(data.categories||[])];
  renderFilterMenu();
  _allCourses = data.courses || [];
  renderCourseList();
}

function renderCourseList(){
  let list = [..._allCourses];

  if(_searchQuery.trim()){
    const q = _searchQuery.trim().toLowerCase();
    list = list.filter(c => (c.title||'').toLowerCase().includes(q) || (c.category||'').toLowerCase().includes(q));
  }

  if(_sortMode === 'newest'){
    list.sort((a,b)=> new Date(b.created_at) - new Date(a.created_at));
  } else {
    const rank = s => s==='completed'?0:s==='in_progress'?1:2;
    list.sort((a,b)=> rank(a.status)-rank(b.status) || a.sort_order-b.sort_order);
  }

  if(list.length===0){
    $('courseList').innerHTML = `<div class="af-empty"><span>📭</span>${_searchQuery.trim() ? 'No courses match your search.' : 'No courses in this category yet.'}</div>`;
    return;
  }

  $('courseList').innerHTML = list.map(c => `
    <button class="af-course-card" onclick="openCourse('${c.id}')">
      <img class="af-course-img" src="${c.cover_image_url||fallbackImg()}" alt="${escapeHtml(c.title)}" loading="lazy"/>
      <div class="af-course-body">
        <div class="af-course-cat">${escapeHtml(c.category)}</div>
        <div class="af-course-title">${escapeHtml(c.title)}</div>
        <div class="af-course-pills">
          ${c.status==='completed' ? '<span class="af-pill af-pill-done">Completed</span>' : ''}
          ${c.status==='in_progress' ? '<span class="af-pill af-pill-progress">'+c.percent+'%</span>' : ''}
          <span class="af-pill af-pill-offline">☁ Certificate</span>
        </div>
      </div>
    </button>
  `).join('');
}

   COURSE DETAIL
   ════════════════════════════════════════════════════════ */
let _currentCourse = null;
let _currentModules = [];

async function openCourse(courseId){
  openOverlay('overlayDetail');
  $('detailPage').innerHTML = `<div style="padding:14px"><div class="af-skel" style="aspect-ratio:16/9;margin-bottom:16px"></div><div class="af-skel" style="height:18px;width:60%;margin-bottom:10px"></div><div class="af-skel" style="height:28px;width:90%;margin-bottom:16px"></div></div>`;

  _currentCourse = data.course;

  $('detailPage').innerHTML = `

      <div class="af-meta-list">

        <div class="af-meta-item"><span class="ic">📍</span> Pace: ${escapeHtml(_currentCourse.pace)}</div>
      </div>

      ${isStarted ? `
        <div class="af-progress-wrap">
          <div class="af-progress-track"><div class="af-progress-fill" style="width:${percent}%"></div></div>
          <div class="af-progress-label"><span>${percent}% complete</span><span>${progress.modules_done}/${progress.modules_total} modules</span></div>
        </div>
      ` : ''}

      ${percent>=100 ? `
        <div class="af-completed-banner">
          <span class="ic">✓</span>
          <div>
            <div class="af-completed-title">Course already completed</div>
            <div class="af-completed-sub">You finished this course${progress?.completed_at ? ' on '+formatDate(progress.completed_at) : ''}. ${_currentCourse.has_certificate ? 'Your certificate is in My Dashboard.' : ''}</div>
          </div>
        </div>
        <button class="af-btn-secondary-outline" onclick="enterModuleList()">Review course content</button>
      ` : `
        <button class="af-btn-primary" onclick="enterModuleList()">${percent>0 ? 'Continue course' : 'Start course'}</button>
      `}

      <p class="af-detail-desc">${escapeHtml(_currentCourse.description||'')}</p>

window.openCourse = openCourse;

function enterModuleList(){
  openOverlay('overlayModules');
  renderModuleList();
}
window.enterModuleList = enterModuleList;

const MOD_ICON = { lesson:'📄', survey:'📊', resource:'📄' };

function renderModuleList(){
  const total = _currentModules.length;
  const doneCount = _currentModules.filter(m=>m.is_done).length;
  const percent = total>0 ? Math.round((doneCount/total)*100) : 0;

  $('modulesPage').innerHTML = `
    <div class="af-mod-head">
      <div class="af-mod-progress-top"><div class="af-mod-progress-fill" style="width:${percent}%"></div></div>

      <div class="af-mod-count">Modules — ${doneCount}/${total}</div>
    </div>
    <div class="af-mod-list">
      ${_currentModules.map((m,i)=>{
        const locked = i>0 && !_currentModules[i-1].is_done && !m.is_done;

        <button class="af-mod-row ${locked?'locked':''}" onclick="${locked? '' : `openModule('${m.id}')`}">
          <div class="af-mod-radio ${m.is_done?'done':''}"></div>
          <span class="af-mod-icon">${MOD_ICON[m.module_type]||'📄'}</span>
          <span class="af-mod-row-title">${escapeHtml(m.title)}</span>
          ${m.is_optional ? '<span class="af-mod-optional">Optional</span>' : ''}

  `;
}

/* ════════════════════════════════════════════════════════
   LESSON PLAYER
   ════════════════════════════════════════════════════════ */
let _currentModule = null;
let _currentCheck = null;
let _checkPassed = false;
let _isReviewMode = false;

function _isCourseCompleted(){
  return _currentModules.length>0 && _currentModules.every(m=>m.is_done);
}

async function openModule(moduleId){
  openOverlay('overlayLesson');
  $('lessonPage').innerHTML = `<div style="padding:20px"><div class="af-skel" style="aspect-ratio:16/8;margin-bottom:16px"></div><div class="af-skel" style="height:24px;width:70%;margin-bottom:10px"></div><div class="af-skel" style="height:80px"></div></div>`;
  $('lessonProgFill').style.width='0%'; $('lessonProgPct').textContent='Progress: 0%';

  const data = await callCatalog('get_module', { module_id: moduleId, student_id: getStudentId() });
  if(!data.ok){
    $('lessonPage').innerHTML = `<div class="af-empty"><span>⚠️</span>${escapeHtml(data.message||'Could not load this lesson.')}</div>`;
    return;
  }
  _currentModule = data.module;
  _currentCheck = data.check;
  _checkPassed = !!data.is_done || !data.check;
  _currentModule._next = data.next_module;
  _isReviewMode = _isCourseCompleted();

  const pct = data.module_total>0 ? Math.round(((data.module_index-1)/data.module_total)*100) : 0;
  $('lessonProgFill').style.width = pct+'%';
  $('lessonProgPct').textContent = 'Progress: '+pct+'%';

  if(_currentModule.module_type === 'survey'){
    renderSurvey(data.survey_questions||[], data.survey_answers||{});
  } else {
    renderLessonBlocks(data.blocks||[]);
  }
}
window.openModule = openModule;

function renderLessonBlocks(blocks){
  let html = '';
  let bannerHtml = '';

  blocks.forEach(b=>{
    if(b.block_type==='banner'){
      bannerHtml = `<img class="af-lesson-banner" src="${b.content}" alt=""/>`;
    } else if(b.block_type==='heading'){
      html += `<div class="af-block-heading">${escapeHtml(b.content)}</div>`;
    } else if(b.block_type==='paragraph'){
      html += `<p class="af-block-paragraph">${escapeHtml(b.content)}</p>`;
    } else if(b.block_type==='callout'){
      html += `<div class="af-block-callout">${escapeHtml(b.content)}</div>`;
    } else if(b.block_type==='image'){
      html += `<img class="af-block-image" src="${b.content}" alt=""/>`;
    } else if(b.block_type==='list'){
      const items = b.list_items || [];
      html += `<div class="af-block-list">${items.map(it=>`<div class="af-block-list-item">${escapeHtml(it)}</div>`).join('')}</div>`;
    }
  });

  $('lessonPage').innerHTML = `
    ${bannerHtml}
    <div class="af-lesson-body">${html || '<p class="af-block-paragraph">No content yet for this lesson.</p>'}</div>
    <div id="checkSlot"></div>
    <div class="af-lesson-footer">
      <button class="af-btn-continue" id="continueBtn" ${(_checkPassed||_isReviewMode)?'':'disabled'} onclick="handleContinue()">${_isReviewMode?'Next':(_currentModule.module_type==='resource'?'Mark as complete':'Continue')}</button>
      <div class="af-lock-hint" id="lockHint" style="${(_checkPassed||_isReviewMode)?'display:none':''}">Solve the quick check above to unlock Continue</div>
    </div>
  `;

  if(_isReviewMode){ _checkPassed = true; }
  renderCheckWidget();
}

/* ════════════════════════════════════════════════════════
   SURVEY / POLL
   ════════════════════════════════════════════════════════ */
let _surveyAnswers = {};
let _surveyQuestions = [];

function renderSurvey(questions, existingAnswers){
  _surveyQuestions = questions;
  _surveyAnswers = { ...existingAnswers };
  const alreadyDone = _checkPassed;

  if(questions.length === 0){
    $('lessonPage').innerHTML = `<div class="af-empty"><span>📊</span>This survey isn't set up yet.</div>`;
    return;
  }

  $('lessonPage').innerHTML = `
    <div class="af-survey-intro">
      <div class="af-block-heading">Tell us about your experience</div>
      <p class="af-block-paragraph">Before you finish, we'd love your honest feedback — it takes less than a minute and helps us improve AcademeForge for everyone.</p>
    </div>
    <div id="surveyList" class="af-survey-list"></div>
    <div class="af-lesson-footer">
      <button class="af-btn-continue" id="surveySubmitBtn" onclick="submitSurvey()" ${alreadyDone?'':'disabled'}>${alreadyDone ? 'Already submitted' : 'Submit feedback & finish course'}</button>
      <div class="af-lock-hint" id="surveyHint" style="${alreadyDone?'display:none':''}">Answer all ${questions.length} questions to finish</div>
    </div>
  `;

  renderSurveyList(alreadyDone);
}

function renderSurveyList(locked){
  $('surveyList').innerHTML = _surveyQuestions.map((q,i)=>`
    <div class="af-poll-card">
      <div class="af-poll-q"><span class="af-poll-num">${i+1}</span>${escapeHtml(q.question_text)}</div>
      <div class="af-poll-opts">
        ${(q.options||[]).map(opt=>{
          const sel = _surveyAnswers[q.id]===opt;
          return `<button class="af-poll-opt ${sel?'sel':''}" ${locked?'disabled':''} onclick="selectPollOption('${q.id}', ${JSON.stringify(opt).replace(/"/g,'&quot;')})">${escapeHtml(opt)}</button>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

function selectPollOption(questionId, option){
  _surveyAnswers[questionId] = option;
  renderSurveyList(false);
  updateSurveySubmitState();
}
window.selectPollOption = selectPollOption;

function updateSurveySubmitState(){
  const allAnswered = _surveyQuestions.every(q => !!_surveyAnswers[q.id]);
  $('surveySubmitBtn').disabled = !allAnswered;
  $('surveyHint').style.display = allAnswered ? 'none' : '';
  if(allAnswered) $('surveySubmitBtn').classList.add('ready');
}

async function submitSurvey(){
  const sid = getStudentId();
  if(!sid){
    afToast('Please log in to submit feedback and complete the course.', 'err');
    return;
  }
  const allAnswered = _surveyQuestions.every(q => !!_surveyAnswers[q.id]);
  if(!allAnswered){ afToast('Please answer every question first.', 'err'); return; }

  const btn = $('surveySubmitBtn');
  btn.disabled = true; btn.textContent = 'Submitting…';

  const answers = _surveyQuestions.map(q => ({ question_id: q.id, selected_option: _surveyAnswers[q.id] }));
  const data = await callCatalog('submit_survey', {
    student_id: sid, module_id: _currentModule.id, course_id: _currentCourse.id, answers
  });

  if(!data.ok){
    afToast(data.message || 'Could not submit feedback. Please try again.', 'err');
    btn.disabled = false; btn.textContent = 'Submit feedback & finish course';
    return;
  }

  const idx = _currentModules.findIndex(m=>m.id===_currentModule.id);
  if(idx>=0) _currentModules[idx].is_done = true;

  afToast('Thanks for your feedback!', 'ok');
  showCompletionScreen();
}
window.submitSurvey = submitSurvey;

/* ════════════════════════════════════════════════════════
   QUICK CHECK WIDGET
   ════════════════════════════════════════════════════════ */
function renderCheckWidget(){
  const slot = $('checkSlot');
  if(!_currentCheck || _checkPassed){
    slot.innerHTML = '';
    return;
  }
  const c = _currentCheck;
  slot.innerHTML = `
    <div class="af-check-card">
      <div class="af-check-title">${escapeHtml(c.prompt_text||'Quick check before you continue:')}</div>
      <div class="af-check-equation">
        <span>${c.operand_a}</span><span>${c.symbol}</span><span>${c.operand_b}</span><span>=</span>
        <input type="number" inputmode="numeric" class="af-check-input" id="checkInput" placeholder="?"/>
      </div>
      <button class="af-check-btn" onclick="submitCheck()">Check answer</button>
      <div class="af-check-msg" id="checkMsg"></div>
    </div>
  `;
  $('checkInput').addEventListener('keydown', e=>{ if(e.key==='Enter') submitCheck(); });
}

async function submitCheck(){
  const input = $('checkInput');
  const val = input.value;
  if(val===''){
    $('checkMsg').className='af-check-msg err'; $('checkMsg').textContent='Enter a number first.';
    return;
  }
  const data = await callCatalog('submit_check', { module_id: _currentModule.id, answer: val });
  if(!data.ok){
    $('checkMsg').className='af-check-msg err'; $('checkMsg').textContent='Could not check that. Try again.';
    return;
  }
  if(data.correct){
    input.classList.remove('wrong'); input.classList.add('right');
    $('checkMsg').className='af-check-msg ok'; $('checkMsg').textContent='Correct! Continue is unlocked.';
    _checkPassed = true;
    $('continueBtn').disabled = false;
    $('continueBtn').classList.add('ready');
    $('lockHint').style.display='none';
    const card = $('checkSlot').querySelector('.af-check-card');
    if(card){
      card.style.transition = 'opacity .35s ease, max-height .35s ease, margin .35s ease';
      setTimeout(()=>{
        card.style.opacity='0';
        card.style.maxHeight='0px';
        card.style.overflow='hidden';
        card.style.marginTop='0';
        card.style.marginBottom='0';
        card.style.paddingTop='0';
        card.style.paddingBottom='0';
        setTimeout(()=>{ $('checkSlot').innerHTML=''; }, 380);
      }, 550);
    }
  } else {
    input.classList.remove('right'); input.classList.add('wrong');
    $('checkMsg').className='af-check-msg err'; $('checkMsg').textContent='Not quite — try again.';
  }
}
window.submitCheck = submitCheck;

async function handleContinue(){
  if(!_isReviewMode){
    const sid = getStudentId();
    if(sid){
      await callCatalog('complete_module', { student_id: sid, module_id: _currentModule.id, course_id: _currentCourse.id });
      const idx = _currentModules.findIndex(m=>m.id===_currentModule.id);
      if(idx>=0) _currentModules[idx].is_done = true;
    } else {
      afToast('Log in to save your progress permanently.', 'err');
    }
  }

  if(_currentModule._next){
    openModule(_currentModule._next.id);
  } else {
    showCompletionScreen();
  }
}
window.handleContinue = handleContinue;

function showCompletionScreen(){
  $('lessonPage').innerHTML = `
    <div class="af-complete-wrap">
      <div class="af-complete-badge">🎉</div>
      <div class="af-complete-title">Course complete!</div>
      <div class="af-complete-sub">You've finished every module in <strong>${escapeHtml(_currentCourse.title)}</strong>.${_currentCourse.has_certificate? ' Your certificate is ready in My Dashboard.':''}</div>
      <button class="af-btn-primary" style="margin-top:10px" onclick="finishToDetail()">Back to course</button>
    </div>
  `;
  $('lessonProgFill').style.width='100%'; $('lessonProgPct').textContent='Progress: 100%';
}

function finishToDetail(){
  closeOverlay('overlayLesson');
  closeOverlay('overlayModules');
  openCourse(_currentCourse.id);
}
window.finishToDetail = finishToDetail;

function backFromLesson(){
  closeOverlay('overlayLesson');
}
window.backFromLesson = backFromLesson;

function openModuleListFromLesson(){
  closeOverlay('overlayLesson');
  renderModuleList();
}
window.openModuleListFromLesson = openModuleListFromLesson;
