<!DOCTYPE html>
<html lang="en">
<head>
<script>
!function(){
  document.documentElement.setAttribute('data-theme',
    localStorage.getItem('af_dark_mode')==='1'?'dark':'light');
}();
</script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#4f46e5"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Timezy · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Sora:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --p:#4f46e5;--p2:#3730a3;--pl:#818cf8;
  --acc:#06b6d4;--ok:#22c55e;--err:#ef4444;--warn:#f59e0b;
  --high:#ef4444;--med:#f59e0b;--low:#22c55e;
  --bg:#eef0fb;--surface:#fff;--card:rgba(255,255,255,0.90);
  --nav:rgba(255,255,255,0.95);--inp:#f4f5fb;
  --grp:rgba(79,70,229,0.07);--grph:rgba(79,70,229,0.13);
  --t1:#0f0e2a;--t2:#4b5563;--tm:#9ca3af;
  --b1:rgba(79,70,229,0.13);--bc:rgba(79,70,229,0.18);
  --sh:0 2px 14px rgba(79,70,229,0.09),0 1px 4px rgba(0,0,0,0.05);
  --she:0 12px 40px rgba(79,70,229,0.15);
  --shb:0 6px 20px rgba(79,70,229,0.30);
  --r2:12px;--r3:18px;--r4:24px;--rf:9999px;
  --fd:'Sora',sans-serif;--fb:'Nunito',sans-serif;
  --nav-h:64px;--shell:430px;
  --dur:180ms;--ease:cubic-bezier(0.22,1,0.36,1);--spring:cubic-bezier(0.34,1.56,0.64,1);
}
[data-theme="dark"]{
  --bg:#0b0a1e;--surface:#100e26;--card:rgba(24,21,52,0.92);
  --nav:rgba(14,12,34,0.97);--inp:#1a1735;
  --grp:rgba(129,140,248,0.09);--grph:rgba(129,140,248,0.16);
  --t1:#ede9ff;--t2:#a09dbf;--tm:#635f83;
  --b1:rgba(129,140,248,0.13);--bc:rgba(129,140,248,0.20);
  --sh:0 2px 14px rgba(0,0,0,0.32),0 1px 4px rgba(0,0,0,0.20);
  --she:0 12px 40px rgba(0,0,0,0.50);
  --shb:0 6px 20px rgba(79,70,229,0.45);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:15px;-webkit-text-size-adjust:100%;height:100%;height:100dvh;}
body{font-family:var(--fb);background:var(--bg);color:var(--t1);height:100%;height:100dvh;display:flex;justify-content:center;overflow:hidden;transition:background .18s,color .18s;}
button{font-family:var(--fb);cursor:pointer;border:none;background:none;color:inherit;}
a{text-decoration:none;color:inherit;}
input,select,textarea{font-family:var(--fb);}
html,body,*{-webkit-user-select:none;-moz-user-select:none;user-select:none;-webkit-touch-callout:none;}
input,textarea,select{-webkit-user-select:text;-moz-user-select:text;user-select:text;}
.shell{width:100%;max-width:var(--shell);height:100%;height:100dvh;background:var(--surface);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 0 1px var(--b1),var(--she);transition:background .18s;}
@media(min-width:700px){
  body{padding:28px 0 44px;height:auto;min-height:100dvh;overflow-y:auto;}
  .shell{border-radius:36px;height:calc(100dvh - 72px);max-height:900px;overflow:hidden;box-shadow:0 0 0 1px var(--bc),0 32px 80px rgba(0,0,0,.20),0 8px 24px rgba(79,70,229,.14);}
}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;height:58px;background:var(--nav);backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;}
.hdr-back{width:34px;height:34px;border-radius:10px;background:var(--grp);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;font-size:18px;transition:transform var(--dur) var(--spring),background var(--dur);flex-shrink:0;}
.hdr-back:hover{background:var(--grph);}
.hdr-back:active{transform:scale(.92);}
.hdr-title{flex:1;font-family:var(--fd);font-size:15px;font-weight:800;color:var(--t1);}
.add-btn{padding:8px 14px;border-radius:var(--rf);background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;font-weight:800;font-size:12px;box-shadow:0 3px 10px rgba(79,70,229,.35);transition:transform var(--dur) var(--spring);}
.add-btn:active{transform:scale(.94);}

/* PAGE */
.page{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;overscroll-behavior-y:contain;-webkit-overflow-scrolling:touch;padding:12px 13px calc(var(--nav-h)+24px+env(safe-area-inset-bottom,0px));}
.page::-webkit-scrollbar{width:2px;}
.page::-webkit-scrollbar-thumb{background:var(--bc);border-radius:99px;}

/* LOGIN REQUIRED */
.login-required{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;height:100%;padding:32px 24px;text-align:center;}
.lr-icon{width:72px;height:72px;border-radius:24px;background:rgba(239,68,68,.10);border:1px solid rgba(239,68,68,.2);display:flex;align-items:center;justify-content:center;font-size:32px;}
.lr-title{font-family:var(--fd);font-size:22px;font-weight:900;color:var(--t1);}
.lr-sub{font-size:13.5px;color:var(--t2);font-weight:600;line-height:1.6;max-width:280px;}
.lr-btn{padding:14px 28px;border-radius:var(--r2);background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;font-weight:900;font-size:14px;box-shadow:var(--shb);transition:transform var(--dur) var(--spring);}
.lr-btn:active{transform:scale(.97);}

/* STATS BAR */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;animation:up .30s var(--ease) both;}
.stat-pill{border-radius:var(--r2);background:var(--card);border:1px solid var(--bc);box-shadow:var(--sh);padding:12px 10px;text-align:center;}
.stat-pill-val{font-family:var(--fd);font-size:22px;font-weight:900;color:var(--t1);}
.stat-pill-lbl{font-size:10px;font-weight:800;color:var(--tm);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
.progress-strip{border-radius:var(--r2);background:var(--card);border:1px solid var(--bc);box-shadow:var(--sh);padding:12px 14px;margin-bottom:12px;animation:up .32s var(--ease) .02s both;}
.ps-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.ps-label{font-size:12px;font-weight:800;color:var(--t2);}
.ps-pct{font-family:var(--fd);font-size:14px;font-weight:900;color:var(--p);}
.bar-bg{height:6px;background:var(--grp);border-radius:var(--rf);overflow:hidden;}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--acc));border-radius:var(--rf);transition:width .7s var(--ease);}

/* SEARCH + FILTER */
.controls{display:flex;gap:8px;margin-bottom:12px;animation:up .33s var(--ease) .03s both;}
.search-wrap{flex:1;position:relative;}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}
.search-input{width:100%;padding:10px 12px 10px 32px;border-radius:var(--r2);background:var(--inp);border:1.5px solid var(--bc);color:var(--t1);font-size:13px;font-weight:700;outline:none;transition:border-color var(--dur);}
.search-input:focus{border-color:var(--p);}
.filter-btn{padding:10px 13px;border-radius:var(--r2);background:var(--grp);border:1.5px solid var(--bc);font-size:13px;font-weight:800;color:var(--t2);transition:background var(--dur);white-space:nowrap;}
.filter-btn.active{background:rgba(79,70,229,.15);border-color:var(--p);color:var(--p);}

/* FILTER CHIPS */
.filter-chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none;}
.filter-chips::-webkit-scrollbar{display:none;}
.chip{padding:6px 13px;border-radius:var(--rf);background:var(--grp);border:1px solid var(--b1);font-size:11.5px;font-weight:800;color:var(--tm);white-space:nowrap;transition:all var(--dur);flex-shrink:0;}
.chip.active{background:rgba(79,70,229,.14);border-color:var(--p);color:var(--p);}
.chip.high.active{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:var(--high);}
.chip.medium.active{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);color:var(--med);}
.chip.low.active{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.3);color:var(--low);}

/* TASK ITEMS */
.task-list{display:flex;flex-direction:column;gap:8px;}
.task-card{border-radius:var(--r3);background:var(--card);border:1px solid var(--bc);box-shadow:var(--sh);overflow:hidden;animation:up .28s var(--ease) both;transition:box-shadow var(--dur);}
.task-card:hover{box-shadow:var(--she);}
.tc-main{display:flex;align-items:flex-start;gap:11px;padding:13px 14px;}
.tc-check{width:24px;height:24px;border-radius:8px;border:2px solid var(--bc);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:all .18s;margin-top:1px;}
.tc-check.done{background:var(--ok);border-color:var(--ok);color:#fff;}
.tc-body{flex:1;min-width:0;}
.tc-title{font-size:13.5px;font-weight:800;color:var(--t1);margin-bottom:4px;line-height:1.4;word-break:break-word;}
.tc-title.done{color:var(--tm);text-decoration:line-through;}
.tc-desc{font-size:11.5px;color:var(--t2);margin-bottom:6px;line-height:1.5;font-weight:600;}
.tc-meta{display:flex;flex-wrap:wrap;align-items:center;gap:5px;}
.priority-tag{font-size:9.5px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:var(--rf);}
.priority-tag.high{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:var(--high);}
.priority-tag.medium{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25);color:var(--med);}
.priority-tag.low{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);color:var(--low);}
.due-tag{font-size:10px;font-weight:800;color:var(--tm);background:var(--grp);padding:3px 8px;border-radius:var(--rf);border:1px solid var(--b1);}
.due-tag.overdue{color:var(--err);background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2);}
.tc-actions{display:flex;gap:6px;padding:0 14px 12px;border-top:1px solid var(--b1);padding-top:10px;margin-top:2px;}
.tc-act-btn{flex:1;padding:8px 0;border-radius:9px;font-size:11.5px;font-weight:800;transition:transform var(--dur) var(--spring),background var(--dur);}
.tc-act-btn:active{transform:scale(.94);}
.tc-act-edit{background:rgba(79,70,229,.10);border:1px solid rgba(79,70,229,.2);color:var(--p);}
.tc-act-edit:hover{background:rgba(79,70,229,.16);}
.tc-act-del{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.18);color:var(--err);}
.tc-act-del:hover{background:rgba(239,68,68,.14);}
.tc-act-done{background:rgba(34,197,94,.10);border:1px solid rgba(34,197,94,.22);color:var(--ok);}
.tc-act-done:hover{background:rgba(34,197,94,.16);}

/* EMPTY + LOADING */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:44px 20px;text-align:center;}
.empty-icon{font-size:48px;opacity:.6;}
.empty-title{font-family:var(--fd);font-size:17px;font-weight:900;color:var(--t1);}
.empty-sub{font-size:13px;color:var(--tm);font-weight:700;max-width:220px;line-height:1.6;}
.empty-cta{padding:12px 22px;border-radius:var(--r2);background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;font-weight:900;font-size:13px;box-shadow:var(--shb);transition:transform var(--dur) var(--spring);}
.empty-cta:active{transform:scale(.97);}
.loading-skeleton{display:flex;flex-direction:column;gap:8px;}
.skel{height:88px;border-radius:var(--r3);background:linear-gradient(90deg,var(--grp) 25%,var(--grph) 50%,var(--grp) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:var(--shell);z-index:999;height:var(--nav-h);background:var(--nav);backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);border-top:1px solid var(--b1);display:flex;align-items:center;padding:0 4px;padding-bottom:env(safe-area-inset-bottom,0px);}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;height:100%;border-radius:var(--r2);padding:7px 4px;position:relative;}
.bnav-btn::before{content:'';position:absolute;top:7px;left:50%;transform:translateX(-50%);width:0;height:2px;background:var(--p);border-radius:99px;transition:width .18s var(--spring);}
.bnav-btn.active::before{width:24px;}
.bnav-icon{font-size:20px;line-height:1;transition:transform var(--dur) var(--spring);}
.bnav-btn.active .bnav-icon{transform:scale(1.10);}
.bnav-btn:active .bnav-icon{transform:scale(.90);}
.bnav-label{font-size:10px;font-weight:700;color:var(--tm);transition:color var(--dur);}
.bnav-btn.active .bnav-label{color:var(--p);}

/* MODALS */
.modal-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.60);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:0;}
@media(min-width:480px){.modal-overlay{align-items:center;padding:20px;}}
.modal-sheet{width:100%;max-width:460px;border-radius:22px 22px 0 0;background:var(--surface);border:1px solid var(--bc);box-shadow:var(--she);overflow:hidden;animation:sheetUp .28s var(--spring) both;max-height:92vh;display:flex;flex-direction:column;}
@media(min-width:480px){.modal-sheet{border-radius:22px;animation:modalIn .26s var(--spring) both;}}
@keyframes sheetUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes modalIn{from{opacity:0;transform:scale(.93);}to{opacity:1;transform:scale(1);}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--b1);flex-shrink:0;}
.modal-head h4{font-family:var(--fd);font-size:15px;font-weight:900;color:var(--t1);}
.modal-close{font-size:26px;color:var(--tm);cursor:pointer;line-height:1;background:none;border:none;}
.modal-body{padding:16px 18px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;}
.field-label{font-size:12px;font-weight:800;color:var(--t1);margin-bottom:5px;display:block;}
.field-input{width:100%;padding:12px 14px;border-radius:var(--r2);background:var(--inp);border:1.5px solid var(--bc);color:var(--t1);font-size:13.5px;font-weight:700;outline:none;transition:border-color var(--dur);}
.field-input:focus{border-color:var(--p);}
.field-textarea{resize:vertical;min-height:80px;}
.priority-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.priority-opt{padding:10px 6px;border-radius:var(--r2);border:2px solid var(--bc);text-align:center;cursor:pointer;transition:all var(--dur);}
.priority-opt.high.sel{border-color:var(--high);background:rgba(239,68,68,.10);}
.priority-opt.medium.sel{border-color:var(--med);background:rgba(245,158,11,.10);}
.priority-opt.low.sel{border-color:var(--low);background:rgba(34,197,94,.10);}
.priority-opt-icon{font-size:18px;display:block;margin-bottom:3px;}
.priority-opt-lbl{font-size:11px;font-weight:900;color:var(--t2);}
.modal-msg{font-size:12px;font-weight:700;min-height:14px;}
.modal-save{width:100%;padding:13px;border-radius:var(--r2);background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;font-weight:900;font-size:14px;box-shadow:var(--shb);transition:transform var(--dur) var(--spring);}
.modal-save:active{transform:scale(.98);}
.modal-save:disabled{opacity:.6;cursor:not-allowed;}

/* DELETE CONFIRM */
.del-overlay{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);}
.del-card{width:100%;max-width:320px;border-radius:22px;background:var(--surface);border:1px solid var(--bc);padding:22px;box-shadow:var(--she);animation:modalIn .26s var(--spring) both;text-align:center;}
.del-card-icon{font-size:40px;margin-bottom:10px;}
.del-card-title{font-family:var(--fd);font-size:16px;font-weight:900;color:var(--t1);margin-bottom:6px;}
.del-card-sub{font-size:13px;color:var(--t2);font-weight:600;line-height:1.5;margin-bottom:18px;}
.del-card-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.del-cancel-btn{padding:12px;border-radius:var(--r2);border:1px solid var(--bc);background:transparent;color:var(--t1);font-weight:700;font-size:13.5px;}
.del-confirm-btn{padding:12px;border-radius:var(--r2);background:linear-gradient(135deg,var(--err),#dc2626);color:#fff;font-weight:900;font-size:13.5px;transition:transform var(--dur) var(--spring);}
.del-confirm-btn:active{transform:scale(.97);}

/* TOAST */
.toast-wrap{position:fixed;left:50%;bottom:calc(var(--nav-h)+12px);transform:translateX(-50%);z-index:999999;width:min(92vw,400px);pointer-events:none;}
.toast{display:flex;align-items:flex-start;gap:10px;background:var(--surface);color:var(--t1);border:1px solid var(--bc);border-radius:14px;padding:11px 13px;box-shadow:0 4px 22px rgba(0,0,0,.14);pointer-events:auto;animation:toastIn .22s var(--ease) both;}
.toast.ok{border-left:3px solid var(--ok);}
.toast.info{border-left:3px solid var(--p);}
.toast.err{border-left:3px solid var(--err);}
.toast-body p:first-child{font-size:12px;font-weight:800;}
.toast-body p:last-child{font-size:11px;color:var(--t2);margin-top:1px;}
.toast-x{font-size:16px;color:var(--tm);cursor:pointer;margin-left:auto;}

@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes toastIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.hidden{display:none!important;}
</style>
</head>
<body>
<div class="shell">
  <header class="hdr">
    <button class="hdr-back" onclick="window.history.back()">←</button>
    <span class="hdr-title">⏱ Task Dashboard</span>
    <button class="add-btn" onclick="openTaskModal()">+ New Task</button>
  </header>

  <!-- LOGIN REQUIRED -->
  <div id="loginRequired" class="login-required hidden">
    <div class="lr-icon">🔒</div>
    <div class="lr-title">Login Required</div>
    <div class="lr-sub">You must login to AcademeForge before using Task Management.</div>
    <button class="lr-btn" onclick="window.location.href='../student/index.html'">Go To Login</button>
  </div>

  <div id="mainContent" class="page hidden">

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-pill"><div class="stat-pill-val" id="sTotal">—</div><div class="stat-pill-lbl">Total</div></div>
      <div class="stat-pill"><div class="stat-pill-val" id="sDone" style="color:var(--ok)">—</div><div class="stat-pill-lbl">Done</div></div>
      <div class="stat-pill"><div class="stat-pill-val" id="sPend" style="color:var(--warn)">—</div><div class="stat-pill-lbl">Pending</div></div>
    </div>
    <div class="progress-strip">
      <div class="ps-top">
        <span class="ps-label">Completion Progress</span>
        <span class="ps-pct" id="psPct">0%</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="psFill" style="width:0%"></div></div>
    </div>

    <!-- SEARCH + FILTER -->
    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" type="text" placeholder="Search tasks…" oninput="applyFilters()"/>
      </div>
    </div>
    <div class="filter-chips">
      <button class="chip active" data-filter="all"    onclick="setFilter('all',this)">All</button>
      <button class="chip"        data-filter="pending" onclick="setFilter('pending',this)">Pending</button>
      <button class="chip"        data-filter="done"    onclick="setFilter('done',this)">Completed</button>
      <button class="chip high"   data-filter="high"   onclick="setFilter('high',this)">🔴 High</button>
      <button class="chip medium" data-filter="medium" onclick="setFilter('medium',this)">🟡 Medium</button>
      <button class="chip low"    data-filter="low"    onclick="setFilter('low',this)">🟢 Low</button>
    </div>

    <!-- TASK LIST -->
    <div id="taskListWrap">
      <div class="loading-skeleton">
        <div class="skel"></div><div class="skel"></div><div class="skel"></div>
      </div>
    </div>

  </div><!-- /mainContent -->

  <nav class="bnav">
    <button class="bnav-btn" onclick="window.location.href='../index.html'">
      <span class="bnav-icon">🏠</span><span class="bnav-label">Home</span>
    </button>
    <button class="bnav-btn active">
      <span class="bnav-icon">✏️</span><span class="bnav-label">Tasks</span>
    </button>
    <button class="bnav-btn" onclick="window.location.href='../planner/index.html'">
      <span class="bnav-icon">📅</span><span class="bnav-label">Planner</span>
    </button>
  </nav>
</div>

<!-- TASK MODAL -->
<div id="taskModal" class="modal-overlay hidden">
  <div class="modal-sheet">
    <div class="modal-head">
      <h4 id="modalTitle">New Task</h4>
      <button class="modal-close" onclick="closeTaskModal()">×</button>
    </div>
    <div class="modal-body">
      <div>
        <label class="field-label">Task Title *</label>
        <input id="mTitle" class="field-input" type="text" placeholder="What do you need to do?" maxlength="200"/>
      </div>
      <div>
        <label class="field-label">Description</label>
        <textarea id="mDesc" class="field-input field-textarea" placeholder="Optional details…" maxlength="1000"></textarea>
      </div>
      <div>
        <label class="field-label">Priority</label>
        <div class="priority-row">
          <div class="priority-opt high sel" onclick="setPriority('high',this)">
            <span class="priority-opt-icon">🔴</span>
            <span class="priority-opt-lbl">High</span>
          </div>
          <div class="priority-opt medium" onclick="setPriority('medium',this)">
            <span class="priority-opt-icon">🟡</span>
            <span class="priority-opt-lbl">Medium</span>
          </div>
          <div class="priority-opt low" onclick="setPriority('low',this)">
            <span class="priority-opt-icon">🟢</span>
            <span class="priority-opt-lbl">Low</span>
          </div>
        </div>
      </div>
      <div>
        <label class="field-label">Due Date (optional)</label>
        <input id="mDue" class="field-input" type="datetime-local"/>
      </div>
      <div id="mMsg" class="modal-msg"></div>
      <button id="mSaveBtn" class="modal-save" onclick="submitTask()">Save Task</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div id="delModal" class="del-overlay hidden">
  <div class="del-card">
    <div class="del-card-icon">🗑</div>
    <div class="del-card-title">Delete Task?</div>
    <div class="del-card-sub">This action is permanent and cannot be undone.</div>
    <div class="del-card-btns">
      <button class="del-cancel-btn" onclick="closeDelModal()">Cancel</button>
      <button class="del-confirm-btn" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
'use strict';
const SUPA_URL = "https://afooyyydhlwngzssgqih.supabase.co";
const FN_URL   = SUPA_URL + "/functions/v1/timezy-tasks-af";
const CACHE_KEY = 'af_timezy_dash_v1';
const CACHE_TTL = 5 * 60 * 1000;

function cacheGet(k){try{const r=localStorage.getItem(k);if(!r)return null;const o=JSON.parse(r);if(Date.now()-o.ts>CACHE_TTL)return null;return o.data;}catch{return null;}}
function cacheSet(k,d){try{localStorage.setItem(k,JSON.stringify({ts:Date.now(),data:d}));}catch{}}
function cacheClear(k){try{localStorage.removeItem(k);}catch{}}

const $=id=>document.getElementById(id);
const esc=t=>String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const safe=(v,fb='')=>(v===null||v===undefined||v==='') ? fb : v;

function syncTheme(){document.documentElement.setAttribute('data-theme',localStorage.getItem('af_dark_mode')==='1'?'dark':'light');}
syncTheme();
window.addEventListener('storage',e=>{if(e.key==='af_dark_mode')syncTheme();});

let _tt=null;
function showToast(msg,type='info',title=''){
  const w=$('toastWrap');w.innerHTML='';if(_tt){clearTimeout(_tt);_tt=null;}
  const lbls={ok:'Done',info:'Info',err:'Error'};
  const el=document.createElement('div');el.className='toast '+type;
  el.innerHTML=`<div class="toast-body"><p>${title||lbls[type]}</p><p>${msg}</p></div><span class="toast-x" onclick="this.parentElement.remove()">×</span>`;
  w.appendChild(el);_tt=setTimeout(()=>el&&el.remove(),2800);
}

/* STATE */
let allTasks=[];
let filterMode='all';
let editId=null;
let selectedPriority='high';
let deleteId=null;
const studentUuid=()=>localStorage.getItem('af_student_uuid')||'';
const studentName=()=>safe(localStorage.getItem('af_student_name'),'');

/* API CALL */
async function api(body){
  const res=await fetch(FN_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...body,student_uuid:studentUuid()})});
  const data=await res.json();
  if(!data.ok) throw new Error(data.message||'Failed');
  return data;
}

/* STATS */
function updateStats(){
  const total=allTasks.length, done=allTasks.filter(t=>t.completed).length, pend=total-done;
  const pct=total?Math.round((done/total)*100):0;
  $('sTotal').textContent=total;$('sDone').textContent=done;$('sPend').textContent=pend;
  $('psPct').textContent=pct+'%';$('psFill').style.width=pct+'%';
}

/* FILTERS */
function setFilter(f,el){
  filterMode=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderTasks();
}

function applyFilters(){renderTasks();}

function getFiltered(){
  const q=($('searchInput').value||'').toLowerCase().trim();
  return allTasks.filter(t=>{
    if(filterMode==='pending' && t.completed) return false;
    if(filterMode==='done'    && !t.completed) return false;
    if(['high','medium','low'].includes(filterMode) && t.priority!==filterMode) return false;
    if(q && !t.title.toLowerCase().includes(q) && !(t.description||'').toLowerCase().includes(q)) return false;
    return true;
  });
}

/* RENDER */
function formatDue(d){
  if(!d) return null;
  const dt=new Date(d),now=new Date();
  const diff=Math.round((dt-now)/(1000*60*60*24));
  if(diff<0) return{txt:Math.abs(diff)+'d overdue',overdue:true};
  if(diff===0) return{txt:'Due today',overdue:false};
  if(diff===1) return{txt:'Due tomorrow',overdue:false};
  return{txt:`Due in ${diff}d`,overdue:false};
}

function renderTasks(){
  const box=$('taskListWrap');
  const filtered=getFiltered();
  if(!filtered.length){
    const noTask=allTasks.length===0;
    box.innerHTML=`<div class="empty-state">
      <div class="empty-icon">${noTask?'📋':'🔍'}</div>
      <div class="empty-title">${noTask?'No Tasks Yet':'No Matches'}</div>
      <div class="empty-sub">${noTask?'Create your first task and start being productive!':'Try changing your search or filter.'}</div>
      ${noTask?`<button class="empty-cta" onclick="openTaskModal()">+ Create Task</button>`:''}
    </div>`;
    return;
  }
  box.innerHTML=`<div class="task-list">${filtered.map(t=>{
    const due=t.due_date?formatDue(t.due_date):null;
    const pr=t.priority||'medium';
    return`<div class="task-card" id="tc-${t.id}">
      <div class="tc-main">
        <div class="tc-check${t.completed?' done':''}" onclick="toggleTask('${t.id}',${!t.completed})">
          ${t.completed?'✓':''}
        </div>
        <div class="tc-body">
          <div class="tc-title${t.completed?' done':''}">${esc(t.title)}</div>
          ${t.description?`<div class="tc-desc">${esc(t.description)}</div>`:''}
          <div class="tc-meta">
            <span class="priority-tag ${pr}">${pr.toUpperCase()}</span>
            ${due?`<span class="due-tag${due.overdue?' overdue':''}">${due.txt}</span>`:''}
          </div>
        </div>
      </div>
      <div class="tc-actions">
        <button class="tc-act-btn tc-act-done" onclick="toggleTask('${t.id}',${!t.completed})">
          ${t.completed?'↩ Undo':'✓ Done'}
        </button>
        <button class="tc-act-btn tc-act-edit" onclick="openEditModal('${t.id}')">✎ Edit</button>
        <button class="tc-act-btn tc-act-del" onclick="openDelModal('${t.id}')">🗑</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

/* LOAD */
async function loadTasks(){
  const uuid=studentUuid();
  if(!uuid){$('taskListWrap').innerHTML='<p style="text-align:center;padding:20px;color:var(--tm);font-weight:700;">Session not found.</p>';return;}
  const cached=cacheGet(CACHE_KEY);
  if(cached){allTasks=cached;updateStats();renderTasks();return;}
  try{
    const d=await api({action:'get_tasks'});
    allTasks=d.tasks||[];
    cacheSet(CACHE_KEY,allTasks);
    updateStats();renderTasks();
  }catch(e){
    $('taskListWrap').innerHTML='<p style="text-align:center;padding:20px;color:var(--err);font-weight:700;">Could not load tasks.</p>';
  }
}

/* TOGGLE */
async function toggleTask(id,completed){
  const t=allTasks.find(x=>x.id===id);if(!t)return;
  t.completed=completed;
  updateStats();renderTasks();
  try{
    await api({action:'toggle_complete',task_id:id,completed});
    cacheSet(CACHE_KEY,allTasks);
    showToast(completed?'Task completed!':'Task reopened.',completed?'ok':'info');
    clearHomeCache();
  }catch(e){
    t.completed=!completed;updateStats();renderTasks();
    showToast('Could not update task.','err');
  }
}

/* PRIORITY SELECT */
function setPriority(p,el){
  selectedPriority=p;
  document.querySelectorAll('.priority-opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
}

/* CREATE / EDIT MODAL */
function openTaskModal(){
  editId=null;selectedPriority='high';
  $('modalTitle').textContent='New Task';
  $('mTitle').value='';$('mDesc').value='';$('mDue').value='';
  $('mMsg').textContent='';
  document.querySelectorAll('.priority-opt').forEach(o=>{o.classList.remove('sel');if(o.classList.contains('high'))o.classList.add('sel');});
  $('mSaveBtn').textContent='Save Task';
  $('taskModal').classList.remove('hidden');
  setTimeout(()=>$('mTitle').focus(),80);
}

function openEditModal(id){
  const t=allTasks.find(x=>x.id===id);if(!t)return;
  editId=id;selectedPriority=t.priority||'medium';
  $('modalTitle').textContent='Edit Task';
  $('mTitle').value=t.title;
  $('mDesc').value=t.description||'';
  $('mDue').value=t.due_date?new Date(t.due_date).toISOString().slice(0,16):'';
  $('mMsg').textContent='';
  document.querySelectorAll('.priority-opt').forEach(o=>{o.classList.remove('sel');if(o.classList.contains(selectedPriority))o.classList.add('sel');});
  $('mSaveBtn').textContent='Save Changes';
  $('taskModal').classList.remove('hidden');
  setTimeout(()=>$('mTitle').focus(),80);
}

function closeTaskModal(){$('taskModal').classList.add('hidden');}

async function submitTask(){
  const title=($('mTitle').value||'').trim();
  const msg=$('mMsg');
  if(!title||title.length<2){msg.textContent='Enter a task title (min. 2 characters).';msg.style.color='var(--err)';return;}
  const btn=$('mSaveBtn');btn.disabled=true;
  msg.textContent='Saving…';msg.style.color='var(--tm)';
  try{
    if(editId){
      const d=await api({action:'update_task',task_id:editId,title,description:$('mDesc').value.trim(),priority:selectedPriority,due_date:$('mDue').value||null});
      const idx=allTasks.findIndex(x=>x.id===editId);
      if(idx>-1) allTasks[idx]=d.task;
      showToast('Task updated!','ok');
    }else{
      const d=await api({action:'create_task',title,description:$('mDesc').value.trim(),priority:selectedPriority,due_date:$('mDue').value||null,student_name:studentName()});
      allTasks.unshift(d.task);
      showToast('Task created!','ok');
    }
    cacheSet(CACHE_KEY,allTasks);
    clearHomeCache();
    updateStats();renderTasks();
    msg.textContent='✓ Saved!';msg.style.color='var(--ok)';
    setTimeout(closeTaskModal,600);
  }catch(e){
    msg.textContent=e.message||'Save failed.';msg.style.color='var(--err)';
  }finally{btn.disabled=false;}
}

/* DELETE */
function openDelModal(id){deleteId=id;$('delModal').classList.remove('hidden');}
function closeDelModal(){$('delModal').classList.add('hidden');deleteId=null;}
async function confirmDelete(){
  if(!deleteId)return;
  try{
    await api({action:'delete_task',task_id:deleteId});
    allTasks=allTasks.filter(x=>x.id!==deleteId);
    cacheSet(CACHE_KEY,allTasks);
    clearHomeCache();
    updateStats();renderTasks();
    showToast('Task deleted.','ok');
  }catch(e){showToast('Could not delete task.','err');}
  closeDelModal();
}

function clearHomeCache(){
  try{localStorage.removeItem('af_timezy_home_v1');}catch{}
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeTaskModal();closeDelModal();}
});

document.getElementById('taskModal')?.addEventListener('click',function(e){if(e.target===this)closeTaskModal();});
document.getElementById('delModal')?.addEventListener('click',function(e){if(e.target===this)closeDelModal();});
document.addEventListener('contextmenu',e=>e.preventDefault());

document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('af_student_logged_in')!=='true'){
    $('loginRequired').classList.remove('hidden');return;
  }
  $('mainContent').classList.remove('hidden');
  loadTasks();
});
</script>
</body>
</html>
