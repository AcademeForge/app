<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>AcademeForge AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg:          #0d0f14;
    --surface:     #161921;
    --surface2:    #1e2230;
    --border:      #2a2f3d;
    --text:        #e8eaf0;
    --text-muted:  #7a8099;
    --af-accent:   #4f8aff;
    --dev-accent:  #f97316;
    --user-bg:     #1e2d4a;
    --ai-bg:       #181c27;
    --radius:      14px;
    --input-h:     130px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 780px;
    margin: 0 auto;
  }

  /* ── Header ── */
  header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: relative;
    z-index: 10;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 34px;
    height: 34px;
    border-radius: 9px;
    background: linear-gradient(135deg, #4f8aff 0%, #a855f7 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .logo-text {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    display: block;
    margin-top: -2px;
  }

  /* ── Usage bar ── */
  .usage-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }

  .usage-label {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .usage-bar-track {
    width: 72px;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .usage-bar-fill {
    height: 100%;
    background: var(--af-accent);
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 100%;
  }

  /* ── Chat window ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 0 12px;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* ── Welcome ── */
  #welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    text-align: center;
    gap: 12px;
  }

  .welcome-icon {
    width: 60px;
    height: 60px;
    border-radius: 16px;
    background: linear-gradient(135deg, #4f8aff 0%, #a855f7 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    margin-bottom: 4px;
  }

  #welcome h2 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.4px;
  }

  #welcome p {
    font-size: 14px;
    color: var(--text-muted);
    max-width: 300px;
    line-height: 1.55;
  }

  .welcome-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }

  .welcome-tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 5px 13px;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ── Messages ── */
  .msg-row {
    display: flex;
    padding: 10px 0;
    gap: 10px;
  }

  .msg-row.user {
    flex-direction: row-reverse;
  }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 9px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    align-self: flex-start;
    margin-top: 2px;
  }

  .avatar.ai {
    background: linear-gradient(135deg, #4f8aff 0%, #a855f7 100%);
    color: #fff;
  }

  .avatar.user {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
  }

  .bubble {
    max-width: 82%;
    padding: 11px 14px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg-row.user .bubble {
    background: var(--user-bg);
    border: 1px solid #2a4070;
    border-bottom-right-radius: 4px;
    color: #cdd8f0;
  }

  .msg-row.ai .bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .msg-meta {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.3px;
    padding: 0 2px;
  }

  .msg-row.user .msg-meta { text-align: right; }

  .mode-badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    margin-right: 4px;
  }

  .mode-badge.af24  { background: rgba(79,138,255,0.15); color: #4f8aff; }
  .mode-badge.dev39 { background: rgba(249,115,22,0.15); color: #f97316; }

  /* ── Thinking indicator ── */
  .thinking-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
  }

  .thinking-bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
    padding: 11px 14px;
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
  }

  /* ── Input area ── */
  #input-area {
    flex-shrink: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 10px 12px 14px;
  }

  /* ── Mode selector ── */
  .mode-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 9px;
  }

  .mode-btn {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    text-align: left;
    color: var(--text-muted);
  }

  .mode-btn .mode-name {
    font-size: 13px;
    font-weight: 600;
    display: block;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -0.3px;
  }

  .mode-btn .mode-desc {
    font-size: 10.5px;
    display: block;
    margin-top: 1px;
    opacity: 0.7;
  }

  .mode-btn.active-af {
    border-color: var(--af-accent);
    background: rgba(79,138,255,0.08);
    color: var(--text);
  }

  .mode-btn.active-af .mode-name { color: var(--af-accent); }

  .mode-btn.active-dev {
    border-color: var(--dev-accent);
    background: rgba(249,115,22,0.08);
    color: var(--text);
  }

  .mode-btn.active-dev .mode-name { color: var(--dev-accent); }

  /* ── Textarea row ── */
  .textarea-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 8px 8px 8px 12px;
    transition: border-color 0.15s;
  }

  .textarea-row:focus-within {
    border-color: var(--af-accent);
  }

  .textarea-row.dev-focus:focus-within {
    border-color: var(--dev-accent);
  }

  #question {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 42px;
    max-height: 120px;
    overflow-y: auto;
  }

  #question::placeholder { color: var(--text-muted); }

  #send-btn {
    width: 36px;
    height: 36px;
    border-radius: 9px;
    border: none;
    background: var(--af-accent);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, opacity 0.15s;
  }

  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #send-btn.dev-mode { background: var(--dev-accent); }

  #send-btn svg { width: 16px; height: 16px; fill: currentColor; }

  .char-hint {
    font-size: 10px;
    color: var(--text-muted);
    text-align: right;
    margin-top: 5px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── Limit warning ── */
  #limit-notice {
    display: none;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    color: #f87171;
    text-align: center;
    margin-bottom: 8px;
  }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 18px;
    font-size: 13px;
    color: var(--text);
    z-index: 999;
    display: none;
    white-space: nowrap;
  }

  /* ── Responsive ── */
  @media (min-width: 640px) {
    header { padding: 16px 20px; }
    #chat   { padding: 0 20px; }
    #input-area { padding: 12px 20px 18px; }
    .bubble { font-size: 15px; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-mark">AF</div>
      <div>
        <span class="logo-text">AcademeForge</span>
        <span class="logo-sub">AI Assistant</span>
      </div>
    </div>
    <div class="usage-wrap">
      <div class="usage-label" id="usage-label">— / 5 left</div>
      <div class="usage-bar-track">
        <div class="usage-bar-fill" id="usage-bar"></div>
      </div>
    </div>
  </header>

  <!-- Chat window -->
  <div id="chat">
    <!-- Welcome -->
    <div id="welcome">
      <div class="welcome-icon">🎓</div>
      <h2>AcademeForge AI</h2>
      <p>Your personal mentor for learning, building, and growing. Ask anything.</p>
      <div class="welcome-tags">
        <span class="welcome-tag">Coding</span>
        <span class="welcome-tag">AI Skills</span>
        <span class="welcome-tag">Career</span>
        <span class="welcome-tag">Projects</span>
        <span class="welcome-tag">Design</span>
      </div>
    </div>
  </div>

  <!-- Input area -->
  <div id="input-area">
    <div id="limit-notice">Daily limit reached. Come back tomorrow.</div>

    <!-- Mode selector -->
    <div class="mode-selector">
      <button class="mode-btn active-af" id="btn-af24" onclick="setMode('af24')">
        <span class="mode-name">AF 2.4</span>
        <span class="mode-desc">Student Mentor</span>
      </button>
      <button class="mode-btn" id="btn-dev39" onclick="setMode('dev39')">
        <span class="mode-name">Dev 3.9 Pro</span>
        <span class="mode-desc">Founder Mode</span>
      </button>
    </div>

    <!-- Textarea -->
    <div class="textarea-row" id="textarea-wrap">
      <textarea
        id="question"
        placeholder="Ask AcademeForge AI..."
        rows="1"
        maxlength="500"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div class="char-hint" id="char-hint">0 / 500</div>
  </div>

</div>

<div id="toast"></div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const ENDPOINT  = 'https://YOUR_SUPABASE_PROJECT.supabase.co/functions/v1/af-ask-ai';
const AF_KEY    = 'YOUR_AF_STUDENT_KEY'; // replace or set dynamically
const DAILY_LIMIT = 5;

// ── State ──────────────────────────────────────────────────────────────────
let currentMode   = 'af24';
let remaining     = DAILY_LIMIT;
let isLoading     = false;

// ── Elements ───────────────────────────────────────────────────────────────
const chat         = document.getElementById('chat');
const welcome      = document.getElementById('welcome');
const questionEl   = document.getElementById('question');
const sendBtn      = document.getElementById('send-btn');
const usageLabel   = document.getElementById('usage-label');
const usageBar     = document.getElementById('usage-bar');
const limitNotice  = document.getElementById('limit-notice');
const charHint     = document.getElementById('char-hint');
const textareaWrap = document.getElementById('textarea-wrap');
const toast        = document.getElementById('toast');

// ── Init ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadHistory();
  autoResize();
  questionEl.addEventListener('input', () => {
    autoResize();
    charHint.textContent = `${questionEl.value.length} / 500`;
  });
  questionEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
});

// ── Mode ───────────────────────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-af24').className  = 'mode-btn' + (mode === 'af24'  ? ' active-af'  : '');
  document.getElementById('btn-dev39').className = 'mode-btn' + (mode === 'dev39' ? ' active-dev' : '');
  sendBtn.className = mode === 'dev39' ? 'dev-mode' : '';
  textareaWrap.className = mode === 'dev39' ? 'textarea-row dev-focus' : 'textarea-row';
  questionEl.placeholder = mode === 'dev39'
    ? 'Founder mode — what are you building?'
    : 'Ask AcademeForge AI...';
}

// ── Load history ───────────────────────────────────────────────────────────
async function loadHistory() {
  try {
    const res = await apiFetch({ action: 'history' });
    const history = res.history || [];
    if (history.length > 0) {
      hideWelcome();
      history.forEach(msg => renderMessage(msg.role, msg.content, msg.mode || 'af24', false));
      scrollBottom();
    }
  } catch (e) {
    console.error('History load failed:', e);
  }
}

// ── Send message ───────────────────────────────────────────────────────────
async function sendMessage() {
  const question = questionEl.value.trim();
  if (!question || isLoading) return;
  if (remaining <= 0) { showLimitNotice(); return; }

  isLoading = true;
  sendBtn.disabled = true;
  questionEl.value = '';
  charHint.textContent = '0 / 500';
  autoResize();
  hideWelcome();

  renderMessage('user', question, currentMode, true);
  const thinkingEl = showThinking();

  try {
    const data = await apiFetch({ action: 'ask', question, mode: currentMode });

    removeThinking(thinkingEl);

    if (data.error) {
      if (data.limitReached) {
        remaining = 0;
        updateUsage(DAILY_LIMIT, DAILY_LIMIT);
        showLimitNotice();
      } else {
        showToast(data.error);
      }
      return;
    }

    renderMessage('assistant', data.answer, currentMode, true);
    if (typeof data.remaining !== 'undefined') {
      remaining = data.remaining;
      updateUsage(data.used, data.limit || DAILY_LIMIT);
    }
    scrollBottom();
  } catch (e) {
    removeThinking(thinkingEl);
    showToast('Network error. Please try again.');
  } finally {
    isLoading = false;
    sendBtn.disabled = false;
  }
}

// ── Render message ─────────────────────────────────────────────────────────
function renderMessage(role, content, mode, scroll) {
  const isUser = role === 'user';
  const row = document.createElement('div');
  row.className = `msg-row ${isUser ? 'user' : 'ai'}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${isUser ? 'user' : 'ai'}`;
  avatar.textContent = isUser ? 'U' : 'AF';

  const right = document.createElement('div');

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = content;

  const meta = document.createElement('div');
  meta.className = 'msg-meta';

  if (!isUser) {
    const badge = document.createElement('span');
    badge.className = `mode-badge ${mode}`;
    badge.textContent = mode === 'dev39' ? 'DEV39' : 'AF24';
    meta.appendChild(badge);
    const label = document.createTextNode('AcademeForge AI');
    meta.appendChild(label);
  } else {
    meta.textContent = 'You';
  }

  right.appendChild(bubble);
  right.appendChild(meta);
  row.appendChild(avatar);
  row.appendChild(right);
  chat.appendChild(row);

  if (scroll) scrollBottom();
}

// ── Thinking ───────────────────────────────────────────────────────────────
function showThinking() {
  const row = document.createElement('div');
  row.className = 'thinking-row';

  const avatar = document.createElement('div');
  avatar.className = 'avatar ai';
  avatar.textContent = 'AF';

  const bubble = document.createElement('div');
  bubble.className = 'thinking-bubble';
  bubble.textContent = 'AcademeForge AI is thinking...';

  row.appendChild(avatar);
  row.appendChild(bubble);
  chat.appendChild(row);
  scrollBottom();
  return row;
}

function removeThinking(el) {
  if (el && el.parentNode) el.parentNode.removeChild(el);
}

// ── API ────────────────────────────────────────────────────────────────────
async function apiFetch(body) {
  const res = await fetch(ENDPOINT, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-af-student-key': AF_KEY,
    },
    body: JSON.stringify(body),
  });
  return res.json();
}

// ── Usage display ──────────────────────────────────────────────────────────
function updateUsage(used, limit) {
  const rem = Math.max(0, limit - used);
  remaining = rem;
  usageLabel.textContent = `${rem} / ${limit} left`;
  usageBar.style.width = `${Math.max(0, (rem / limit) * 100)}%`;
  usageBar.style.background = rem <= 1
    ? '#ef4444'
    : rem <= 2
    ? '#f97316'
    : 'var(--af-accent)';
  if (rem === 0) showLimitNotice();
}

// ── UI helpers ─────────────────────────────────────────────────────────────
function hideWelcome() {
  if (welcome) welcome.style.display = 'none';
}

function showLimitNotice() {
  limitNotice.style.display = 'block';
  sendBtn.disabled = true;
  questionEl.disabled = true;
}

function showToast(msg) {
  toast.textContent = msg;
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 3500);
}

function scrollBottom() {
  chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
}

function autoResize() {
  questionEl.style.height = 'auto';
  questionEl.style.height = Math.min(questionEl.scrollHeight, 120) + 'px';
}
</script>
</body>
</html>
