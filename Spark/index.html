<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<script>
/* ── Instant theme restore (before paint) ── */
(function(){
  var t = localStorage.getItem("af_appearance") || "Dark";
  if (t === "Light")  document.documentElement.setAttribute("data-theme","light");
  else if (t === "AMOLED") document.documentElement.setAttribute("data-theme","amoled");
  else document.documentElement.setAttribute("data-theme","dark");
})();
</script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#090b12"/>
<title>AcademeForge</title>
<style>
/* ══════════════════════════════════════════════════
   TOKENS
══════════════════════════════════════════════════ */
:root {
  --radius-card: 18px;
  --trans: 250ms cubic-bezier(.4,0,.2,1);
  /* accent — overridden by JS */
  --primary: #3b82f6;
  --glow:    rgba(59,130,246,.35);
  --glow-int: 0.35;
}

/* Dark (default) */
[data-theme="dark"], :root {
  --background: #0f1117;
  --surface:    #1a1d27;
  --card:       #1e2130;
  --text:       #f0f2f8;
  --muted:      #6b7280;
  --border:     rgba(255,255,255,.08);
  --body-bg:    #060810;
}
[data-theme="amoled"] {
  --background: #000000;
  --surface:    #0a0a0a;
  --card:       #111111;
  --text:       #f0f2f8;
  --muted:      #6b7280;
  --border:     rgba(255,255,255,.07);
  --body-bg:    #000000;
}
[data-theme="light"] {
  --background: #f0f4fb;
  --surface:    #ffffff;
  --card:       #ffffff;
  --text:       #111827;
  --muted:      #6b7280;
  --border:     rgba(0,0,0,.08);
  --body-bg:    #e2e6f4;
}

/* ══════════════════════════════════════════════════
   RESET + BASE
══════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
button,input{font:inherit;color:inherit}

/* ── Body shell – centers the 390px app ── */
body {
  background: var(--body-bg);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  transition: background var(--trans);
}

/* ── App container ── */
#app {
  width: 390px;
  min-width: 390px;
  min-height: 100vh;
  max-height: 100dvh;
  background: var(--background);
  color: var(--text);
  position: relative;
  overflow-y: auto;
  overflow-x: hidden;
  transition: background var(--trans), color var(--trans);
  scrollbar-width: none;
}
#app::-webkit-scrollbar{display:none}

/* desktop frame */
@media(min-width:460px){
  body{align-items:center}
  #app{
    min-height:min(900px,calc(100dvh - 32px));
    max-height:min(900px,calc(100dvh - 32px));
    border:8px solid rgba(255,255,255,.06);
    border-radius:44px;
    box-shadow:0 30px 90px rgba(0,0,0,.6);
  }
}

.scroll-content{padding-bottom:36px}

/* ══════════════════════════════════════════════════
   TOP BAR
══════════════════════════════════════════════════ */
.top-bar{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px 12px;
  background:linear-gradient(to bottom,var(--background) 80%,transparent);
}

.icon-btn{
  width:42px;height:42px;
  border-radius:50%;
  background:var(--surface);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:all var(--trans);
  font-size:18px;line-height:1;
  flex-shrink:0;
}
.icon-btn:active{transform:scale(.9);box-shadow:0 0 14px var(--glow)}

.top-logo{
  font-size:15px;font-weight:800;letter-spacing:.3px;
  background:linear-gradient(135deg,var(--primary),#a5c4ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ══════════════════════════════════════════════════
   BANNER
══════════════════════════════════════════════════ */
.header{padding:4px 20px 18px;display:flex;justify-content:center}

.banner-wrap{
  width:100%;position:relative;border-radius:20px;
  animation:floatBanner 4s ease-in-out infinite;
}
.no-anim .banner-wrap{animation:none}

.banner-glow{
  position:absolute;inset:-8px;border-radius:28px;
  background:var(--primary);
  opacity:calc(var(--glow-int)*.55);
  filter:blur(20px);z-index:0;
  transition:opacity var(--trans),background var(--trans);
}
.banner-img{
  position:relative;z-index:1;
  width:100%;height:155px;object-fit:cover;
  border-radius:20px;display:block;
}
.banner-fallback{
  position:relative;z-index:1;
  width:100%;height:155px;border-radius:20px;
  background:linear-gradient(135deg,
    color-mix(in srgb,var(--primary) 28%,var(--surface)),
    color-mix(in srgb,var(--primary) 8%,var(--background))
  );
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  overflow:hidden;
}
.banner-fallback::before{
  content:'';position:absolute;width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,var(--primary) 0%,transparent 70%);
  opacity:.13;top:-60px;right:-60px;
}
.banner-title{
  font-size:27px;font-weight:800;letter-spacing:-.5px;
  background:linear-gradient(135deg,#fff 30%,var(--primary));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.banner-sub{font-size:12px;color:rgba(255,255,255,.45);letter-spacing:1.5px;text-transform:uppercase}

@keyframes floatBanner{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-5px)}
}

/* ══════════════════════════════════════════════════
   SEARCH
══════════════════════════════════════════════════ */
.search-section{padding:0 18px 22px}
.search-wrap{position:relative}

.search-bar{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:13px 16px;
  transition:all var(--trans);
  backdrop-filter:blur(8px);
  box-shadow:0 4px 20px rgba(0,0,0,.2);
}
.search-bar:focus-within{
  border-color:var(--primary);
  box-shadow:0 0 0 3px var(--glow),0 8px 28px rgba(0,0,0,.25);
}
/* search style variants */
.search-pill .search-bar{border-radius:9999px!important}
.search-rounded .search-bar{border-radius:20px!important}
.search-floating .search-bar{
  border-radius:9999px!important;
  box-shadow:0 8px 32px rgba(0,0,0,.35),0 0 0 1px var(--border)!important;
  transform:translateY(-2px);
}

.search-bar input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:15px;
}
.search-bar input::placeholder{color:var(--muted)}

.s-icon-btn{
  background:none;border:none;outline:none;
  color:var(--muted);cursor:pointer;
  display:flex;align-items:center;
  font-size:17px;line-height:1;padding:2px;
  border-radius:8px;transition:color var(--trans);
}
.s-icon-btn:hover{color:var(--primary)}

/* suggestions dropdown */
.search-suggestions{
  position:absolute;left:0;right:0;top:calc(100% + 6px);
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.3);
  z-index:60;display:none;
}
.search-suggestions.visible{display:block}
.sug-item{
  display:flex;align-items:center;gap:11px;
  padding:11px 15px;cursor:pointer;
  transition:background var(--trans);
  font-size:13px;color:var(--text);
}
.sug-item:hover{background:var(--card)}
.sug-em{font-size:15px;flex-shrink:0}
.sug-label{flex:1}
.sug-type{font-size:11px;color:var(--muted)}

/* ══════════════════════════════════════════════════
   QUICK LINKS
══════════════════════════════════════════════════ */
.quick-section{padding:0 18px 26px}
.section-label{
  font-size:11px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:var(--muted);margin-bottom:14px;
}
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

.quick-item{
  display:flex;flex-direction:column;align-items:center;gap:7px;
  text-decoration:none;cursor:pointer;
}
.quick-icon-card{
  width:56px;height:56px;border-radius:50%;
  background:var(--card);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;line-height:1;
  transition:all var(--trans);
  position:relative;overflow:hidden;
}
.quick-item:active .quick-icon-card{
  box-shadow:0 0 18px var(--glow);
  transform:scale(.9);
  border-color:var(--primary);
}

/* card style variants */
.glass-card .quick-icon-card,
.glass-card .recent-card{
  background:rgba(255,255,255,.05)!important;
  backdrop-filter:blur(16px)!important;
  border:1px solid rgba(255,255,255,.12)!important;
}
.neon-card .quick-icon-card,
.neon-card .recent-card{
  border:1px solid var(--primary)!important;
  box-shadow:0 0 8px var(--glow)!important;
}

.quick-label{
  font-size:11px;font-weight:500;color:var(--muted);
  text-align:center;line-height:1.2;
}

/* ══════════════════════════════════════════════════
   CONTINUE LEARNING
══════════════════════════════════════════════════ */
.recent-section{padding:0 18px 26px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:16px;font-weight:700;color:var(--text)}
.see-all{font-size:12px;font-weight:500;color:var(--primary);text-decoration:none;opacity:.85}
.see-all:hover{opacity:1}

.recent-cards{display:flex;flex-direction:column;gap:11px}

.recent-card{
  display:flex;align-items:center;gap:13px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius-card);
  padding:13px 15px;
  text-decoration:none;
  transition:all var(--trans);
  position:relative;overflow:hidden;
  cursor:pointer;
}
.recent-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:var(--primary);border-radius:0 3px 3px 0;
  transition:background var(--trans);
}
.recent-card:active{
  transform:translateX(3px);
  box-shadow:0 4px 24px rgba(0,0,0,.25),0 0 12px var(--glow);
  border-color:var(--primary);
}

.recent-icon{
  width:44px;height:44px;border-radius:12px;
  background:color-mix(in srgb,var(--primary) 14%,transparent);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;line-height:1;flex-shrink:0;
  transition:background var(--trans);
}
.recent-info{flex:1;min-width:0}
.recent-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recent-meta{font-size:12px;color:var(--muted);margin-top:3px}
.recent-badge{
  font-size:10px;font-weight:700;
  color:var(--primary);
  background:color-mix(in srgb,var(--primary) 12%,transparent);
  border:1px solid color-mix(in srgb,var(--primary) 28%,transparent);
  padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;
  transition:all var(--trans);
}

/* ══════════════════════════════════════════════════
   FOOTER
══════════════════════════════════════════════════ */
.footer{
  text-align:center;padding:2px 0 18px;
  font-size:11px;color:var(--muted);opacity:.55;letter-spacing:.5px;
}

/* ══════════════════════════════════════════════════
   COMPACT MODE
══════════════════════════════════════════════════ */
.compact .banner-fallback,.compact .banner-img{height:100px}
.compact .quick-icon-card{width:46px;height:46px;font-size:18px}
.compact .quick-label{font-size:10px}
.compact .recent-card{padding:9px 13px}

/* ══════════════════════════════════════════════════
   DRAWER OVERLAY
══════════════════════════════════════════════════ */
.drawer-overlay{
  position:absolute;inset:0;
  background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
  z-index:90;
  opacity:0;visibility:hidden;
  transition:opacity var(--trans),visibility var(--trans);
}
.drawer-overlay.open{opacity:1;visibility:visible}

/* ══════════════════════════════════════════════════
   CUSTOMIZE AF DRAWER
══════════════════════════════════════════════════ */
.drawer{
  position:absolute;top:0;right:0;bottom:0;
  width:300px;
  background:var(--surface);
  border-left:1px solid var(--border);
  z-index:100;
  transform:translateX(100%);
  transition:transform var(--trans);
  overflow-y:auto;scrollbar-width:none;
  padding-bottom:40px;
}
.drawer::-webkit-scrollbar{display:none}
.drawer.open{transform:translateX(0)}

.drawer-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 18px 15px;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--surface);z-index:1;
}
.drawer-title{font-size:16px;font-weight:800;color:var(--text)}
.drawer-badge{
  font-size:10px;font-weight:700;letter-spacing:.8px;
  color:var(--primary);
  background:color-mix(in srgb,var(--primary) 12%,transparent);
  border:1px solid color-mix(in srgb,var(--primary) 28%,transparent);
  padding:2px 8px;border-radius:20px;
}

.d-section{padding:18px 18px 0}
.d-section-title{
  font-size:10px;font-weight:700;letter-spacing:1.1px;
  text-transform:uppercase;color:var(--muted);margin-bottom:13px;
}

/* color dots */
.color-grid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:2px}
.color-dot{
  width:34px;height:34px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:all var(--trans);position:relative;
}
.color-dot::after{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  border:2px solid transparent;transition:border-color var(--trans);
}
.color-dot.active::after{border-color:var(--text)}
.color-dot:hover{transform:scale(1.15)}

/* pill buttons */
.pill-group{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:2px}
.pill-opt{
  font-size:12px;font-weight:600;padding:7px 14px;border-radius:9999px;
  background:var(--card);border:1px solid var(--border);color:var(--muted);
  cursor:pointer;transition:all var(--trans);
}
.pill-opt.active,.pill-opt:hover{
  background:color-mix(in srgb,var(--primary) 14%,transparent);
  border-color:var(--primary);color:var(--primary);
}

/* slider */
.slider-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.slider-val{font-size:13px;font-weight:700;color:var(--primary)}
input[type=range]{
  -webkit-appearance:none;width:100%;height:4px;border-radius:2px;
  background:var(--border);outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:18px;height:18px;border-radius:50%;
  background:var(--primary);box-shadow:0 0 6px var(--glow);cursor:pointer;
  transition:box-shadow var(--trans);
}

/* toggle switch */
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.toggle-label{font-size:14px;font-weight:500;color:var(--text)}
.toggle{position:relative;width:46px;height:26px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{
  position:absolute;inset:0;border-radius:999px;
  background:var(--border);border:1px solid var(--border);
  transition:background var(--trans);
}
.toggle input:checked~.toggle-track{background:var(--primary)}
.toggle-thumb{
  position:absolute;top:3px;left:3px;
  width:20px;height:20px;border-radius:50%;
  background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.3);
  transition:transform var(--trans);pointer-events:none;
}
.toggle input:checked~.toggle-thumb{transform:translateX(20px)}

.d-divider{height:1px;background:var(--border);margin:18px 0 0}

/* ══════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════ */
.af-toast{
  position:absolute;bottom:72px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-size:13px;font-weight:500;
  padding:10px 20px;border-radius:999px;
  box-shadow:0 4px 24px rgba(0,0,0,.35);
  z-index:200;opacity:0;
  transition:all 250ms ease;pointer-events:none;white-space:nowrap;
}
.af-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══════════════════════════════════════════════════
   ENTRANCE ANIMATIONS
══════════════════════════════════════════════════ */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
.anim-1{animation:fadeUp .4s ease both .05s}
.anim-2{animation:fadeUp .4s ease both .12s}
.anim-3{animation:fadeUp .4s ease both .20s}
.anim-4{animation:fadeUp .4s ease both .28s}
.anim-5{animation:fadeUp .4s ease both .36s}
.no-anim .anim-1,.no-anim .anim-2,.no-anim .anim-3,
.no-anim .anim-4,.no-anim .anim-5{animation:none}

  /* IMPORTANT — Banner Fix */
.banner-wrap{
  overflow:hidden !important;
}

.banner-img{
  height:auto !important;
  object-fit:contain !important;
}

.banner-glow{
  inset:-6px !important;
}
</style>
</head>
<body>

<div id="app">
  <div class="scroll-content">

    <!-- TOP BAR -->
    <div class="top-bar anim-1">
      <button class="icon-btn" id="backBtn" aria-label="Go back">◀</button>
      <span class="top-logo">AcademeForge</span>
      <button class="icon-btn" id="menuBtn" aria-label="Customize">☰</button>
    </div>

    <!-- BANNER -->
    <div class="header anim-2">
      <div class="banner-wrap">
        <div class="banner-glow"></div>
        <img class="banner-img" src="../IMG/banner.png" alt="AcademeForge"
          onerror="this.style.display='none';document.querySelector('.banner-fallback').style.display='flex'"/>
        <div class="banner-fallback">
          <div class="banner-title">AcademeForge</div>
          <div class="banner-sub">Learn · Build · Excel</div>
        </div>
      </div>
    </div>

    <!-- SEARCH -->
    <div class="search-section anim-3">
      <div class="search-wrap">
        <div class="search-bar">
          <button class="s-icon-btn" id="searchBtn" aria-label="Search">🔍</button>
          <input type="text" id="searchInput" placeholder="Search AcademeForge..." autocomplete="off"/>
          <button class="s-icon-btn" id="voiceBtn" aria-label="Voice search">🎤</button>
        </div>
        <div class="search-suggestions" id="searchSugg"></div>
      </div>
    </div>

    <!-- QUICK LINKS -->
    <div class="quick-section anim-4">
      <div class="section-label">Quick Access</div>
      <div class="quick-grid" id="quickGrid"></div>
    </div>

    <!-- HISTORY -->
    <div class="recent-section anim-5" id="historySection">
      <div class="section-header">
        <div class="section-title">History</div>
        <button class="see-all" id="clearHistoryBtn" style="background:none;border:none;cursor:pointer;">Clear all</button>
      </div>
      <div class="recent-cards" id="recentCards"></div>
      <div class="history-empty" id="historyEmpty" style="display:none">
        <div style="font-size:36px;margin-bottom:10px">🕓</div>
        <div style="font-size:13px;color:var(--muted);line-height:1.6">No history yet.<br>Visit a page and it'll appear here.</div>
      </div>
    </div>

    <div class="footer">Powered by AcademeForge</div>
  </div>

  <!-- TOAST -->
  <div class="af-toast" id="toast"></div>

  <!-- DRAWER OVERLAY -->
  <div class="drawer-overlay" id="drawerOverlay"></div>

  <!-- CUSTOMIZE AF DRAWER -->
  <div class="drawer" id="drawer" role="dialog" aria-label="Customize AF">
    <div class="drawer-header">
      <span class="drawer-title">Customize AF</span>
      <span class="drawer-badge">BETA</span>
    </div>

    <div class="d-section">
      <div class="d-section-title">Theme Color</div>
      <div class="color-grid" id="colorGrid"></div>
    </div>
    <div class="d-divider"></div>

    <div class="d-section">
      <div class="d-section-title">Appearance</div>
      <div class="pill-group" id="appearanceGroup"></div>
    </div>
    <div class="d-divider"></div>

    <div class="d-section">
      <div class="d-section-title">Card Style</div>
      <div class="pill-group" id="cardStyleGroup"></div>
    </div>
    <div class="d-divider"></div>

    <div class="d-section">
      <div class="d-section-title">Search Style</div>
      <div class="pill-group" id="searchStyleGroup"></div>
    </div>
    <div class="d-divider"></div>

    <div class="d-section">
      <div class="d-section-title">Glow Intensity</div>
      <div class="slider-row">
        <span style="font-size:12px;color:var(--muted)">Intensity</span>
        <span class="slider-val" id="glowVal">50</span>
      </div>
      <input type="range" id="glowSlider" min="0" max="100" value="50"/>
    </div>
    <div class="d-divider"></div>

    <div class="d-section" style="margin-top:18px">
      <div class="toggle-row">
        <span class="toggle-label">Show Animations</span>
        <label class="toggle">
          <input type="checkbox" id="animToggle" checked/>
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
    </div>
    <div class="d-divider"></div>

    <div class="d-section" style="margin-top:18px">
      <div class="toggle-row">
        <span class="toggle-label">Compact Mode</span>
        <label class="toggle">
          <input type="checkbox" id="compactToggle"/>
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════
   LINK CONFIG — AcademeForge Services
══════════════════════════════════════════════════ */
const links = [
  { label:"Main Website",         href:"https://academeforge.in",                        emoji:"🌐" },
  { label:"AI Assistant",         href:"https://ai.academeforge.in",                     emoji:"🤖" },
  { label:"Articles",             href:"http://Zenopulsky.academeforge.in",              emoji:"📰" },
  { label:"Test Arena",           href:"https://app.academeforge.in/T/index.html",       emoji:"🎯" },
  { label:"Sudoku Master",        href:"https://app.academeforge.in/SM/index.html",      emoji:"🧩" },
  { label:"Certificate Verify",   href:"https://app.academeforge.in/V/index.html",       emoji:"🏆" },
  { label:"Update App",           href:"https://download.academeforge.in",               emoji:"⬇️" },
  { label:"Mail Us",              href:"https://info.academeforge.in",                   emoji:"📧" },
];

const recentItems = [
  {
    name:"AI Assistant",
    meta:"Smart AI tools and productivity features",
    badge:"Open",
    emoji:"🤖",
    href:"https://ai.academeforge.in"
  },
  {
    name:"Latest Articles",
    meta:"Tutorials, insights and learning resources",
    badge:"Read",
    emoji:"📰",
    href:"http://Zenopulsky.academeforge.in"
  },
  {
    name:"Test Arena",
    meta:"Practice tests, challenges and assessments",
    badge:"Launch",
    emoji:"🎯",
    href:"https://app.academeforge.in/T/index.html"
  },
];

/* Search routes — internal pages first, else Google (same tab) */
const searchRoutes = {
  "academeforge":             "https://academeforge.in",
  "website":                  "https://academeforge.in",
  "home":                     "https://academeforge.in",

  "ai":                       "https://ai.academeforge.in",
  "ai assistant":             "https://ai.academeforge.in",

  "articles":                 "http://Zenopulsky.academeforge.in",
  "blog":                     "http://Zenopulsky.academeforge.in",

  "sudoku":                   "https://app.academeforge.in/SM/index.html",
  "sudoku master":            "https://app.academeforge.in/SM/index.html",

  "test":                     "https://app.academeforge.in/T/index.html",
  "test arena":               "https://app.academeforge.in/T/index.html",

  "certificate":              "https://app.academeforge.in/V/index.html",
  "verify certificate":       "https://app.academeforge.in/V/index.html",
  "certificate verification": "https://app.academeforge.in/V/index.html",

  "download":                 "https://download.academeforge.in",
  "update app":               "https://download.academeforge.in",

  "mail":                     "https://info.academeforge.in",
  "contact":                  "https://info.academeforge.in",
  "support":                  "https://info.academeforge.in"
};

/* ══════════════════════════════════════════════════
   THEME PALETTES
══════════════════════════════════════════════════ */
const themes = [
  { name:"Blue",    primary:"#3b82f6", glow:"rgba(59,130,246,.35)"  },
  { name:"Purple",  primary:"#a855f7", glow:"rgba(168,85,247,.35)"  },
  { name:"Emerald", primary:"#10b981", glow:"rgba(16,185,129,.35)"  },
  { name:"Orange",  primary:"#f97316", glow:"rgba(249,115,22,.35)"  },
  { name:"Red",     primary:"#ef4444", glow:"rgba(239,68,68,.35)"   },
  { name:"Pink",    primary:"#ec4899", glow:"rgba(236,72,153,.35)"  },
  { name:"Cyan",    primary:"#06b6d4", glow:"rgba(6,182,212,.35)"   },
  { name:"Gold",    primary:"#f59e0b", glow:"rgba(245,158,11,.35)"  },
];

/* ══════════════════════════════════════════════════
   STATE — loaded from localStorage
══════════════════════════════════════════════════ */
const state = {
  theme:       localStorage.getItem("af_theme")      || "Blue",
  appearance:  localStorage.getItem("af_appearance") || "Dark",
  cardStyle:   localStorage.getItem("af_card")       || "Default",
  searchStyle: localStorage.getItem("af_search")     || "Rounded",
  glowInt:     parseInt(localStorage.getItem("af_glow")  || "50"),
  animations:  localStorage.getItem("af_anim")       !== "false",
  compact:     localStorage.getItem("af_compact")    === "true",
};

/* ══════════════════════════════════════════════════
   APPLY STATE
══════════════════════════════════════════════════ */
function applyState() {
  const root = document.documentElement;
  const app  = document.getElementById("app");
  const themeObj = themes.find(t => t.name === state.theme) || themes[0];

  /* accent */
  root.style.setProperty("--primary", themeObj.primary);
  root.style.setProperty("--glow",    themeObj.glow);
  root.style.setProperty("--glow-int", (state.glowInt / 100).toFixed(2));

  /* appearance — same pattern as AI page */
  if (state.appearance === "Light")       root.setAttribute("data-theme","light");
  else if (state.appearance === "AMOLED") root.setAttribute("data-theme","amoled");
  else                                    root.setAttribute("data-theme","dark");
  localStorage.setItem("af_appearance", state.appearance);

  /* card style */
  app.classList.remove("glass-card","neon-card");
  if (state.cardStyle === "Glass") app.classList.add("glass-card");
  else if (state.cardStyle === "Neon") app.classList.add("neon-card");

  /* search style */
  app.classList.remove("search-pill","search-rounded","search-floating");
  if (state.searchStyle === "Pill")      app.classList.add("search-pill");
  else if (state.searchStyle === "Rounded")  app.classList.add("search-rounded");
  else if (state.searchStyle === "Floating") app.classList.add("search-floating");

  /* toggles */
  app.classList.toggle("no-anim",   !state.animations);
  app.classList.toggle("compact",    state.compact);

  syncDrawerUI();
}

function saveState() {
  localStorage.setItem("af_theme",      state.theme);
  localStorage.setItem("af_appearance", state.appearance);
  localStorage.setItem("af_card",       state.cardStyle);
  localStorage.setItem("af_search",     state.searchStyle);
  localStorage.setItem("af_glow",       state.glowInt);
  localStorage.setItem("af_anim",       state.animations);
  localStorage.setItem("af_compact",    state.compact);
}

/* ══════════════════════════════════════════════════
   BUILD UI
══════════════════════════════════════════════════ */
function buildQuickLinks() {
  document.getElementById("quickGrid").innerHTML = links.map(l => `
    <a href="${l.href}" class="quick-item">
      <div class="quick-icon-card">${l.emoji}</div>
      <span class="quick-label">${l.label}</span>
    </a>`).join("");
}

function buildRecentCards() {
  document.getElementById("recentCards").innerHTML = recentItems.map(item => `
    <a href="${item.href}" class="recent-card">
      <div class="recent-icon">${item.emoji}</div>
      <div class="recent-info">
        <div class="recent-name">${item.name}</div>
        <div class="recent-meta">${item.meta}</div>
      </div>
      <span class="recent-badge">${item.badge}</span>
    </a>`).join("");
}

/* ══════════════════════════════════════════════════
   DRAWER
══════════════════════════════════════════════════ */
function buildDrawer() {
  /* Colors */
  const cg = document.getElementById("colorGrid");
  cg.innerHTML = themes.map(t => `
    <div class="color-dot${state.theme===t.name?" active":""}"
         style="background:${t.primary}" title="${t.name}"
         data-theme="${t.name}"></div>`).join("");
  cg.querySelectorAll(".color-dot").forEach(d =>
    d.addEventListener("click", () => { state.theme = d.dataset.theme; saveState(); applyState(); }));

  buildPillGroup("appearanceGroup",  ["Dark","AMOLED","Light"], "appearance");
  buildPillGroup("cardStyleGroup",   ["Default","Glass","Neon"],  "cardStyle");
  buildPillGroup("searchStyleGroup", ["Rounded","Pill","Floating"],"searchStyle");

  const slider = document.getElementById("glowSlider");
  const gv     = document.getElementById("glowVal");
  slider.value = state.glowInt;
  gv.textContent = state.glowInt;
  slider.addEventListener("input", () => {
    state.glowInt = +slider.value;
    gv.textContent = state.glowInt;
    saveState(); applyState();
  });

  const at = document.getElementById("animToggle");
  const ct = document.getElementById("compactToggle");
  at.checked = state.animations;
  ct.checked = state.compact;
  at.addEventListener("change", () => { state.animations = at.checked; saveState(); applyState(); });
  ct.addEventListener("change", () => { state.compact    = ct.checked; saveState(); applyState(); });
}

function buildPillGroup(id, opts, key) {
  const g = document.getElementById(id);
  g.innerHTML = opts.map(o =>
    `<button class="pill-opt${state[key]===o?" active":""}" data-val="${o}">${o}</button>`).join("");
  g.querySelectorAll(".pill-opt").forEach(b =>
    b.addEventListener("click", () => { state[key] = b.dataset.val; saveState(); applyState(); }));
}

function syncDrawerUI() {
  document.querySelectorAll(".color-dot").forEach(d =>
    d.classList.toggle("active", d.dataset.theme === state.theme));
  syncPills("appearanceGroup",  state.appearance);
  syncPills("cardStyleGroup",   state.cardStyle);
  syncPills("searchStyleGroup", state.searchStyle);
  const sl = document.getElementById("glowSlider");
  if (sl) { sl.value = state.glowInt; document.getElementById("glowVal").textContent = state.glowInt; }
  const at = document.getElementById("animToggle");
  const ct = document.getElementById("compactToggle");
  if (at) at.checked = state.animations;
  if (ct) ct.checked = state.compact;
}

function syncPills(id, val) {
  document.querySelectorAll(`#${id} .pill-opt`).forEach(b =>
    b.classList.toggle("active", b.dataset.val === val));
}

/* ══════════════════════════════════════════════════
   DRAWER OPEN / CLOSE
══════════════════════════════════════════════════ */
const drawer  = document.getElementById("drawer");
const overlay = document.getElementById("drawerOverlay");

function openDrawer()  { drawer.classList.add("open");    overlay.classList.add("open"); }
function closeDrawer() { drawer.classList.remove("open"); overlay.classList.remove("open"); }

document.getElementById("menuBtn").addEventListener("click", openDrawer);
overlay.addEventListener("click", closeDrawer);

/* swipe to close drawer */
let swipeStartX = 0;
drawer.addEventListener("touchstart", e => { swipeStartX = e.touches[0].clientX; }, { passive:true });
drawer.addEventListener("touchend",   e => {
  if (e.changedTouches[0].clientX - swipeStartX > 60) closeDrawer();
}, { passive:true });

/* ══════════════════════════════════════════════════
   SMART SEARCH — same tab for Google
══════════════════════════════════════════════════ */
function handleSearch(query) {
  const q = query.trim().toLowerCase();
  if (!q) return;
  const matchKey = Object.keys(searchRoutes).find(k => q === k || q.includes(k) || k.includes(q));
  if (matchKey) {
    const url = searchRoutes[matchKey];
    if (url && url !== "#") { window.location.href = url; }
    else showToast("Opening " + matchKey.charAt(0).toUpperCase() + matchKey.slice(1) + "…");
  } else {
    /* same tab — no _blank */
    window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(query.trim());
  }
}

const searchInput = document.getElementById("searchInput");
const sugBox      = document.getElementById("searchSugg");
const internalKeys = Object.keys(searchRoutes);

searchInput.addEventListener("input", () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { sugBox.classList.remove("visible"); return; }
  const matches = internalKeys.filter(k => k.includes(q));
  let html = matches.slice(0,4).map(k => `
    <div class="sug-item" data-key="${k}">
      <span class="sug-em">🏫</span>
      <span class="sug-label">${k.charAt(0).toUpperCase()+k.slice(1)}</span>
      <span class="sug-type">AcademeForge</span>
    </div>`).join("");
  if (q.length > 1) html += `
    <div class="sug-item" data-google="${q}">
      <span class="sug-em">🔍</span>
      <span class="sug-label">${q}</span>
      <span class="sug-type">Google Search</span>
    </div>`;
  sugBox.innerHTML = html;
  sugBox.classList.toggle("visible", !!html);
  sugBox.querySelectorAll(".sug-item").forEach(el =>
    el.addEventListener("click", () => {
      sugBox.classList.remove("visible");
      el.dataset.google ? handleSearch(el.dataset.google)
                        : (searchInput.value = el.dataset.key, handleSearch(el.dataset.key));
    }));
});

searchInput.addEventListener("keydown", e => {
  if (e.key === "Enter")  { sugBox.classList.remove("visible"); handleSearch(searchInput.value); }
  if (e.key === "Escape") sugBox.classList.remove("visible");
});

document.getElementById("searchBtn").addEventListener("click", () => handleSearch(searchInput.value));

document.addEventListener("click", e => {
  if (!e.target.closest(".search-wrap")) sugBox.classList.remove("visible");
});

/* Voice search */
document.getElementById("voiceBtn").addEventListener("click", () => {
  if (!("webkitSpeechRecognition" in window || "SpeechRecognition" in window)) {
    showToast("Voice not supported in this browser"); return;
  }
  const SR  = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  rec.lang = "en-US"; rec.interimResults = false;
  rec.start(); showToast("🎤 Listening…");
  rec.onresult = e => {
    const t = e.results[0][0].transcript;
    searchInput.value = t; handleSearch(t);
  };
  rec.onerror = () => showToast("Voice search failed");
});

/* ══════════════════════════════════════════════════
   BACK BUTTON
══════════════════════════════════════════════════ */
document.getElementById("backBtn").addEventListener("click", () => window.history.back());

/* ══════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  clearTimeout(toastTimer);
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  toastTimer = setTimeout(() => t.classList.remove("show"), 2400);
}

/* ══════════════════════════════════════════════════
   CROSS-TAB THEME SYNC (matches AI page pattern)
══════════════════════════════════════════════════ */
window.addEventListener("storage", e => {
  if (e.key === "af_appearance") {
    state.appearance = e.newValue || "Dark";
    applyState();
  }
  if (e.key === "af_theme") {
    state.theme = e.newValue || "Blue";
    applyState();
  }
});

/* ══════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════ */
buildQuickLinks();
buildRecentCards();
buildDrawer();
applyState();

  /* ══════════════════════════════════════════════════
   IMPORTANT — AUTO FIT BANNER (NO CROPPING)
══════════════════════════════════════════════════ */

(function () {
  const banner = document.querySelector(".banner-img");
  const glow   = document.querySelector(".banner-glow");

  if (!banner) return;

  banner.style.height = "auto";
  banner.style.objectFit = "contain";
  banner.style.display = "block";

  banner.onload = function () {
    const ratio = banner.naturalHeight / banner.naturalWidth;
    const width = banner.offsetWidth;
    const realHeight = width * ratio;

    banner.style.height = realHeight + "px";

    if (glow) {
      glow.style.height = realHeight + "px";
      glow.style.borderRadius = "24px";
    }
  };

  if (banner.complete) {
    banner.onload();
  }
})();
</script>
