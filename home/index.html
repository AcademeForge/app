<!DOCTYPE html>
<html lang="en">
<head>
<script>
!function(){
  document.documentElement.setAttribute('data-theme',
    localStorage.getItem('af_dark_mode')==='1'?'dark':'light');
}();
</script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#1a1a2e"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Timezy · Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
:root{
  /* Palette: warm off-white base, deep ink navy, sage accent, amber highlight */
  --ink:#1a1a2e;
  --ink2:#3d3d5c;
  --ink3:#8888aa;
  --sage:#4caf82;
  --sage2:#3a9068;
  --sage-faint:rgba(76,175,130,0.10);
  --sage-mid:rgba(76,175,130,0.18);
  --amber:#f5a623;
  --amber-faint:rgba(245,166,35,0.12);
  --err:#e05252;
  --bg:#f5f4ef;
  --surface:#ffffff;
  --card:#ffffff;
  --card2:rgba(255,255,255,0.82);
  --nav:rgba(245,244,239,0.96);
  --inp:#eeede8;
  --b1:rgba(26,26,46,0.08);
  --bc:rgba(26,26,46,0.12);
  --sh:0 2px 12px rgba(26,26,46,0.07),0 1px 3px rgba(26,26,46,0.04);
  --she:0 8px 32px rgba(26,26,46,0.12);
  --shg:0 4px 18px rgba(76,175,130,0.22);
  --r1:10px;--r2:16px;--r3:22px;--r4:28px;--rf:9999px;
  --fd:'Instrument Serif',Georgia,serif;
  --fb:'DM Sans',system-ui,sans-serif;
  --nav-h:68px;--shell:430px;
  --dur:160ms;--ease:cubic-bezier(0.22,1,0.36,1);--spring:cubic-bezier(0.34,1.56,0.64,1);
}
[data-theme="dark"]{
  --ink:#ede9e0;
  --ink2:#a8a4b8;
  --ink3:#5c5878;
  --bg:#111118;
  --surface:#18181f;
  --card:#1e1e28;
  --card2:rgba(30,30,40,0.90);
  --nav:rgba(17,17,24,0.97);
  --inp:#24242e;
  --b1:rgba(237,233,224,0.07);
  --bc:rgba(237,233,224,0.11);
  --sh:0 2px 12px rgba(0,0,0,0.28),0 1px 3px rgba(0,0,0,0.18);
  --she:0 8px 32px rgba(0,0,0,0.40);
  --shg:0 4px 18px rgba(76,175,130,0.28);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:15px;-webkit-text-size-adjust:100%;height:100%;height:100dvh;}
body{font-family:var(--fb);background:var(--bg);color:var(--ink);height:100%;height:100dvh;display:flex;justify-content:center;overflow:hidden;transition:background .2s,color .2s;}
button{font-family:var(--fb);cursor:pointer;border:none;background:none;color:inherit;}
a{text-decoration:none;color:inherit;}
html,body,*{-webkit-user-select:none;-moz-user-select:none;user-select:none;-webkit-touch-callout:none;}
input,textarea,select{-webkit-user-select:text;-moz-user-select:text;user-select:text;}

.shell{width:100%;max-width:var(--shell);height:100%;height:100dvh;background:var(--surface);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 0 1px var(--b1),var(--she);transition:background .2s;}
@media(min-width:700px){
  body{padding:28px 0 44px;height:auto;min-height:100dvh;overflow-y:auto;}
  .shell{border-radius:36px;height:calc(100dvh - 72px);max-height:900px;box-shadow:0 0 0 1px var(--bc),0 32px 80px rgba(0,0,0,.16),0 8px 24px rgba(76,175,130,.10);}
}

/* HEADER */
.hdr{height:56px;background:var(--nav);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0;transition:background .2s;}
.hdr-brand{display:flex;align-items:center;gap:8px;flex:1;}
.hdr-dot{width:10px;height:10px;border-radius:50%;background:var(--sage);box-shadow:0 0 0 3px var(--sage-mid);}
.hdr-name{font-family:var(--fd);font-size:18px;font-style:italic;color:var(--ink);letter-spacing:-.01em;}
.hdr-actions{display:flex;gap:8px;}
.hdr-icon-btn{width:34px;height:34px;border-radius:var(--r1);background:var(--inp);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;font-size:16px;transition:background var(--dur);}
.hdr-icon-btn:active{transform:scale(.93);}

/* PAGE */
.page{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;overscroll-behavior-y:contain;-webkit-overflow-scrolling:touch;padding:0 0 calc(var(--nav-h)+20px+env(safe-area-inset-bottom,0px));}
.page::-webkit-scrollbar{width:2px;}
.page::-webkit-scrollbar-thumb{background:var(--bc);border-radius:99px;}

/* LOGIN REQUIRED */
.login-required{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;height:100%;padding:32px 24px;text-align:center;}
.lr-icon{width:72px;height:72px;border-radius:var(--r3);background:rgba(224,82,82,.09);border:1px solid rgba(224,82,82,.18);display:flex;align-items:center;justify-content:center;font-size:32px;}
.lr-title{font-family:var(--fd);font-size:24px;font-style:italic;color:var(--ink);}
.lr-sub{font-size:14px;color:var(--ink2);line-height:1.65;max-width:260px;}
.lr-btn{padding:13px 28px;border-radius:var(--rf);background:var(--ink);color:var(--bg);font-weight:600;font-size:14px;transition:transform var(--dur) var(--spring),opacity var(--dur);}
.lr-btn:active{transform:scale(.97);}

/* GREETING BLOCK */
.greeting-block{padding:22px 18px 0;}
.gb-eyebrow{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;}
.gb-name{font-family:var(--fd);font-size:30px;font-style:italic;color:var(--ink);line-height:1.15;margin-bottom:2px;}
.gb-tagline{font-size:13px;color:var(--ink2);font-weight:500;margin-bottom:18px;}
.gb-date-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--rf);background:var(--inp);border:1px solid var(--b1);font-size:12px;font-weight:600;color:var(--ink2);}
.gb-date-pill span{font-size:14px;}

/* CREATE TASK CTA */
.create-cta{margin:18px 18px 0;border-radius:var(--r3);background:var(--ink);padding:20px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:transform var(--dur) var(--spring),box-shadow var(--dur);box-shadow:var(--she);}
.create-cta:active{transform:scale(.98);}
.create-cta-icon{width:44px;height:44px;border-radius:var(--r2);background:var(--sage);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.create-cta-body{flex:1;}
.create-cta-title{font-weight:700;font-size:15px;color:#fff;margin-bottom:2px;}
.create-cta-sub{font-size:12px;color:rgba(255,255,255,.55);}
.create-cta-arrow{font-size:20px;color:rgba(255,255,255,.35);}

/* PROGRESS STRIP */
.progress-strip{margin:14px 18px 0;border-radius:var(--r2);background:var(--card);border:1px solid var(--b1);padding:14px 16px;box-shadow:var(--sh);}
.ps-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.ps-label{font-size:12px;font-weight:600;color:var(--ink2);}
.ps-pct{font-family:var(--fd);font-size:22px;font-style:italic;color:var(--sage);}
.bar-bg{height:6px;background:var(--inp);border-radius:var(--rf);overflow:hidden;}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--sage),#6dd5a8);border-radius:var(--rf);transition:width .7s var(--ease);}
.ps-sub{margin-top:8px;font-size:11.5px;color:var(--ink3);font-weight:500;}

/* SECTION HEADING */
.sec-head{padding:20px 18px 10px;display:flex;align-items:baseline;justify-content:space-between;}
.sec-title{font-family:var(--fd);font-size:20px;font-style:italic;color:var(--ink);}
.sec-count{font-size:11px;font-weight:600;color:var(--ink3);padding:4px 10px;background:var(--inp);border-radius:var(--rf);}

/* TODAY TASKS */
.tasks-list{padding:0 18px;display:flex;flex-direction:column;gap:9px;}
.task-row{border-radius:var(--r2);background:var(--card);border:1px solid var(--b1);box-shadow:var(--sh);display:flex;align-items:center;gap:12px;padding:13px 14px;animation:up .25s var(--ease) both;transition:box-shadow var(--dur);}
.task-row:active{box-shadow:var(--she);}
.task-check{width:24px;height:24px;border-radius:8px;border:2px solid var(--bc);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .18s;}
.task-check.done{background:var(--sage);border-color:var(--sage);color:#fff;}
.task-body{flex:1;min-width:0;}
.task-title{font-size:13.5px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.task-title.done{color:var(--ink3);text-decoration:line-through;}
.task-meta{display:flex;align-items:center;gap:6px;}
.p-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.p-dot.high{background:#e05252;}
.p-dot.medium{background:var(--amber);}
.p-dot.low{background:var(--sage);}
.task-time{font-size:11px;color:var(--ink3);font-weight:500;}
.task-priority{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:var(--rf);}
.task-priority.high{background:rgba(224,82,82,.10);color:#e05252;}
.task-priority.medium{background:var(--amber-faint);color:var(--amber);}
.task-priority.low{background:var(--sage-faint);color:var(--sage2);}

/* UPCOMING */
.upcoming-list{padding:0 18px;display:flex;flex-direction:column;gap:9px;}
.upcoming-row{border-radius:var(--r2);background:var(--card);border:1px solid var(--b1);box-shadow:var(--sh);display:flex;gap:12px;padding:13px 14px;animation:up .27s var(--ease) both;}
.ur-date{width:40px;flex-shrink:0;text-align:center;}
.ur-day{font-family:var(--fd);font-size:20px;font-style:italic;color:var(--sage);line-height:1;}
.ur-mon{font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;}
.ur-divider{width:1px;background:var(--b1);flex-shrink:0;}
.ur-body{flex:1;min-width:0;}
.ur-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ur-title.done{text-decoration:line-through;color:var(--ink3);}
.ur-badge{font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:var(--rf);}
.ur-badge.high{background:rgba(224,82,82,.10);color:#e05252;}
.ur-badge.medium{background:var(--amber-faint);color:var(--amber);}
.ur-badge.low{background:var(--sage-faint);color:var(--sage2);}

/* EMPTY STATE */
.empty-today{padding:28px 18px;text-align:center;}
.empty-today-icon{font-size:38px;opacity:.5;margin-bottom:10px;}
.empty-today-title{font-family:var(--fd);font-size:17px;font-style:italic;color:var(--ink);margin-bottom:4px;}
.empty-today-sub{font-size:13px;color:var(--ink3);}

/* SKELETON */
.skel-list{padding:0 18px;display:flex;flex-direction:column;gap:9px;}
.skel{height:66px;border-radius:var(--r2);background:linear-gradient(90deg,var(--inp) 25%,var(--b1) 50%,var(--inp) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:var(--shell);z-index:999;height:var(--nav-h);background:var(--nav);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--b1);display:flex;align-items:center;padding:0 8px;padding-bottom:env(safe-area-inset-bottom,0px);transition:background .2s;}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;height:100%;padding:8px 4px;position:relative;border-radius:var(--r1);}
.bnav-btn.active{background:var(--sage-faint);}
.bnav-icon{font-size:19px;line-height:1;transition:transform var(--dur) var(--spring);}
.bnav-btn.active .bnav-icon{transform:scale(1.08);}
.bnav-btn:active .bnav-icon{transform:scale(.88);}
.bnav-label{font-size:10px;font-weight:600;color:var(--ink3);transition:color var(--dur);}
.bnav-btn.active .bnav-label{color:var(--sage2);font-weight:700;}

/* TOAST */
.toast-wrap{position:fixed;left:50%;bottom:calc(var(--nav-h)+14px);transform:translateX(-50%);z-index:999999;width:min(92vw,400px);pointer-events:none;}
.toast{display:flex;align-items:flex-start;gap:10px;background:var(--surface);color:var(--ink);border:1px solid var(--bc);border-radius:14px;padding:11px 14px;box-shadow:0 4px 22px rgba(0,0,0,.12);pointer-events:auto;animation:toastIn .22s var(--ease) both;}
.toast.ok{border-left:3px solid var(--sage);}
.toast.info{border-left:3px solid var(--ink2);}
.toast.err{border-left:3px solid var(--err);}
.toast-body p:first-child{font-size:12px;font-weight:700;}
.toast-body p:last-child{font-size:11px;color:var(--ink2);margin-top:1px;}
.toast-x{font-size:16px;color:var(--ink3);cursor:pointer;margin-left:auto;}

@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes toastIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.hidden{display:none!important;}
</style>
</head>
<body>
<div class="shell">

  <header class="hdr">
    <div class="hdr-brand">
      <div class="hdr-dot"></div>
      <span class="hdr-name">Timezy</span>
    </div>
    <div class="hdr-actions">
      <button class="hdr-icon-btn" title="Settings">⚙️</button>
    </div>
  </header>

  <!-- LOGIN REQUIRED -->
  <div id="loginRequired" class="login-required hidden">
    <div class="lr-icon">🔒</div>
    <div class="lr-title">Login Required</div>
    <div class="lr-sub">You need to be logged in to AcademeForge to use Task Management.</div>
    <button class="lr-btn" onclick="window.location.href='../student/index.html'">Go to Login</button>
  </div>

  <!-- MAIN CONTENT -->
  <div id="mainContent" class="page hidden">

    <!-- GREETING -->
    <div class="greeting-block">
      <div class="gb-eyebrow" id="gbEyebrow">Good morning</div>
      <div class="gb-name" id="gbName">Loading…</div>
      <div class="gb-tagline" id="gbTagline">Here's your day at a glance.</div>
      <div class="gb-date-pill"><span>📅</span><span id="gbDate">—</span></div>
    </div>

    <!-- CREATE CTA -->
    <div class="create-cta" onclick="window.location.href='../home/dashboard/index.html?new=1'">
      <div class="create-cta-icon">✏️</div>
      <div class="create-cta-body">
        <div class="create-cta-title">Create New Task</div>
        <div class="create-cta-sub">Tap to add something to your list</div>
      </div>
      <div class="create-cta-arrow">›</div>
    </div>

    <!-- PROGRESS -->
    <div class="progress-strip" id="progressStrip" style="display:none">
      <div class="ps-row">
        <span class="ps-label">Overall Progress</span>
        <span class="ps-pct" id="psPct">0%</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="psFill" style="width:0%"></div></div>
      <div class="ps-sub" id="psSub">Loading…</div>
    </div>

    <!-- TODAY'S TASKS -->
    <div class="sec-head">
      <span class="sec-title">Today's Tasks</span>
      <span class="sec-count" id="todayCount">—</span>
    </div>
    <div id="todayWrap">
      <div class="skel-list">
        <div class="skel"></div><div class="skel"></div>
      </div>
    </div>

    <!-- UPCOMING -->
    <div class="sec-head" id="upcomingHead" style="display:none">
      <span class="sec-title">Coming Up</span>
      <span class="sec-count" id="upcomingCount">—</span>
    </div>
    <div id="upcomingWrap"></div>

  </div><!-- /mainContent -->

  <nav class="bnav">
    <button class="bnav-btn active" onclick="window.location.href='../home/index.html'">
      <span class="bnav-icon">🏠</span><span class="bnav-label">Home</span>
    </button>
    <button class="bnav-btn" onclick="window.location.href='../home/dashboard/index.html'">
      <span class="bnav-icon">✏️</span><span class="bnav-label">Tasks</span>
    </button>
    <button class="bnav-btn" onclick="window.location.href='../home/planner/index.html'">
      <span class="bnav-icon">📅</span><span class="bnav-label">Planner</span>
    </button>
  </nav>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
'use strict';
const SUPABASE_URL = "https://afooyyydhlwngzssgqih.supabase.co";
const FN_URL = SUPABASE_URL + "/functions/v1/timezy-tasks-af";
const TASKS_CACHE_KEY = 'af_timezy_home_v1';
const CACHE_TTL = 10 * 60 * 1000;

function cacheGet(k){try{const r=localStorage.getItem(k);if(!r)return null;const o=JSON.parse(r);if(Date.now()-o.ts>CACHE_TTL)return null;return o.data;}catch{return null;}}
function cacheSet(k,d){try{localStorage.setItem(k,JSON.stringify({ts:Date.now(),data:d}));}catch{}}

const $=id=>document.getElementById(id);
const esc=t=>String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const safe=(v,fb='')=>(v===null||v===undefined||v==='') ? fb : v;

function syncTheme(){document.documentElement.setAttribute('data-theme',localStorage.getItem('af_dark_mode')==='1'?'dark':'light');}
syncTheme();
window.addEventListener('storage',e=>{if(e.key==='af_dark_mode')syncTheme();});

let _tt=null;
function showToast(msg,type='info',title=''){
  const w=$('toastWrap');w.innerHTML='';if(_tt){clearTimeout(_tt);_tt=null;}
  const lbls={ok:'Done',info:'Info',err:'Error'};
  const el=document.createElement('div');el.className='toast '+type;
  el.innerHTML=`<div class="toast-body"><p>${title||lbls[type]}</p><p>${msg}</p></div><span class="toast-x" onclick="this.parentElement.remove()">×</span>`;
  w.appendChild(el);_tt=setTimeout(()=>el&&el.remove(),2800);
}

function getGreeting(){
  const h=new Date().getHours();
  if(h>=5&&h<12)  return['Good morning','☀️'];
  if(h>=12&&h<17) return['Good afternoon','🌤'];
  if(h>=17&&h<21) return['Good evening','🌆'];
  return['Good night','🌙'];
}

function getTagline(){
  const h=new Date().getHours();
  if(h>=5&&h<12) return"Here's what's on your plate today.";
  if(h>=12&&h<17) return"Keep the momentum going.";
  if(h>=17&&h<21) return"Wind down and see what's left.";
  return"Rest up — tomorrow's tasks are ready.";
}

function toDateKey(d){
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function loadProfile(){
  const name=safe(localStorage.getItem('af_student_name'),'Student');
  const [greeting]=getGreeting();
  $('gbEyebrow').textContent=greeting;
  $('gbName').textContent=name;
  $('gbTagline').textContent=getTagline();
  $('gbDate').textContent=new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});
}

function formatTime(d){
  if(!d) return null;
  return new Date(d).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
}

function renderToday(tasks){
  const todayKey=toDateKey(new Date());
  const todayTasks=tasks.filter(t=>{
    if(!t.due_date) return false;
    return toDateKey(new Date(t.due_date))===todayKey;
  });

  $('todayCount').textContent=todayTasks.length+' task'+(todayTasks.length!==1?'s':'');

  if(!todayTasks.length){
    $('todayWrap').innerHTML=`<div class="empty-today">
      <div class="empty-today-icon">🌿</div>
      <div class="empty-today-title">Nothing scheduled today</div>
      <div class="empty-today-sub">Create a task with today's due date to see it here.</div>
    </div>`;
    return;
  }

  $('todayWrap').innerHTML=`<div class="tasks-list">${todayTasks.map(t=>{
    const pr=t.priority||'medium';
    const time=formatTime(t.due_date);
    return`<div class="task-row">
      <div class="task-check${t.completed?' done':''}">
        ${t.completed?'✓':''}
      </div>
      <div class="task-body">
        <div class="task-title${t.completed?' done':''}">${esc(t.title)}</div>
        <div class="task-meta">
          <div class="p-dot ${pr}"></div>
          <span class="task-priority ${pr}">${pr}</span>
          ${time?`<span class="task-time">⏰ ${time}</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderUpcoming(tasks){
  const todayKey=toDateKey(new Date());
  const upcoming=tasks
    .filter(t=>{
      if(!t.due_date||t.completed) return false;
      const k=toDateKey(new Date(t.due_date));
      return k>todayKey;
    })
    .sort((a,b)=>new Date(a.due_date)-new Date(b.due_date))
    .slice(0,5);

  if(!upcoming.length){
    $('upcomingHead').style.display='none';
    $('upcomingWrap').innerHTML='';
    return;
  }

  $('upcomingHead').style.display='flex';
  $('upcomingCount').textContent=upcoming.length;

  $('upcomingWrap').innerHTML=`<div class="upcoming-list">${upcoming.map(t=>{
    const dt=new Date(t.due_date);
    const day=dt.getDate();
    const mon=dt.toLocaleDateString('en-IN',{month:'short'});
    const pr=t.priority||'medium';
    return`<div class="upcoming-row">
      <div class="ur-date">
        <div class="ur-day">${day}</div>
        <div class="ur-mon">${mon}</div>
      </div>
      <div class="ur-divider"></div>
      <div class="ur-body">
        <div class="ur-title">${esc(t.title)}</div>
        <span class="ur-badge ${pr}">${pr}</span>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderProgress(tasks){
  const total=tasks.length;
  const done=tasks.filter(t=>t.completed).length;
  const pct=total?Math.round((done/total)*100):0;
  if(!total){$('progressStrip').style.display='none';return;}
  $('progressStrip').style.display='block';
  $('psPct').textContent=pct+'%';
  $('psFill').style.width=pct+'%';
  $('psSub').textContent=`${done} of ${total} tasks done · ${total-done} remaining`;
}

async function loadTasks(){
  const uuid=localStorage.getItem('af_student_uuid')||'';
  if(!uuid){
    $('todayWrap').innerHTML='<div class="empty-today"><div class="empty-today-title">No session found.</div></div>';
    return;
  }
  const cached=cacheGet(TASKS_CACHE_KEY);
  if(cached){renderProgress(cached);renderToday(cached);renderUpcoming(cached);return;}
  try{
    const res=await fetch(FN_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'get_tasks',student_uuid:uuid})});
    const data=await res.json();
    if(!data.ok) throw new Error(data.message||'Failed');
    cacheSet(TASKS_CACHE_KEY,data.tasks);
    renderProgress(data.tasks);
    renderToday(data.tasks);
    renderUpcoming(data.tasks);
  }catch(e){
    $('todayWrap').innerHTML='<div class="empty-today"><div class="empty-today-title">Could not load tasks.</div><div class="empty-today-sub">Check your connection and try again.</div></div>';
  }
}

document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('af_student_logged_in')!=='true'){
    $('loginRequired').classList.remove('hidden');return;
  }
  $('mainContent').classList.remove('hidden');
  loadProfile();
  loadTasks();
});
</script>
</body>
</html>
